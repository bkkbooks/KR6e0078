body:
  text: 第二教義攝益第二教義等者牒章前辨同別教義分齊深廣未明攝機成益故此示之此門有二先辨教義分齊後明攝益分齊先辨教義分齊者此顯三乘一乘分齊不同也後明攝益分齊三宗攝二機各有分也初中亦有二先示相後開合初中有三義一者如露地牛車自有教義謂十十無盡主伴具足如華嚴說此當別教一乘露地牛車孔目云別教者三車外別索大牛之車故也自有教義即圓果普因也即章題所謂一乘教義矣謂十十無盡主伴具足言十十者欲顯無盡故孔目曰十數之義含有二門一成圓教門二不成圓教門今將梵網經等對大經本瓔珞等十數即是單別不具一切圓故入三乘攝不具十義數亦有二種一目彼三乘令人分解二目彼一乘就彼下機相對以顯一乘今用圓數故云十十如華嚴說者示能詮教而詮上教義也雲花曰今且就此華嚴一部經宗通明法界緣起不過自體因之與果也此當下指判二者臨門三車自有教義謂界內示為教得出為義仍教義即無分此當三乘教如解深密經及瑜伽等說自有教義自宗辨也界內示為教者如握空拳以誘孺子但有言而無物也得出為義但奔火難實無三車要問云小乘佛三乘佛並是阿含佛也教義即無分者引而得出義也誘而引之教也是二不二故曰無分此當三乘教即中間三教於中雖有權實總為一三乘也餘經即大品普超三昧涅槃等經瑜伽大智彌勒所問經論等也三者以臨門三車為開方便教界外別授大牛之車為示真實義此當同教一乘如法華經說為開方便教者以三乘解行位地等皆為趣一乘方便因果等法皆是阿含施設故皆是教孔目曰又諸三乘經論所明位地及差別次第法相門等並約信解門中作如是說若據行法行解亦入解門界外等者露地等賜大車皆與記別方為示真實義此當同教一乘即前亦三亦一之同教也要問曰法華經宗義是一乘經也三乘在三界內成其行故一乘三界外與三界為見聞故吾家諸祖皆以法華為同教一乘者多矣此章自有十餘處文有謂此同教是終頓說也二開合者有二先別後總別中一乘三乘各有三句三乘三句者或具教義約三乘自宗說或唯教非義約同教一乘說或俱非教義約別教一乘說為彼所目故也如文所列為彼所目者為上聲者被也如重空三昧若為一乘目即屬一乘若為三乘目即屬於三乘今為一乘所目一一圓融與彼一乘更無異事則自宗失於教義也目者狀目詮目也桓溫在石頭謂諸公曰若能目此城者當贈二姬孔目曰教是能目之方便又曰有名之教目有名之義等云云如教分齊義一乘三句者或具教義約自別教說或唯義非教約同教說或俱非教義唯約三乘說隱彼無盡教義故諸句易解隱彼教義者三機差別小智不見聞大法故說隱也總辨者或教義俱教以三乘望一乘故或教義俱義以一乘望三乘故或具此二句約同教說或皆具教義各隨自宗差別說也總論三一也第三句云或具者具教義也三乘為教一乘為義餘文可知第二攝益者於中有三約界分內外二機攝之成益不同也一或唯攝界內機令得出世益即以為究竟此約三乘當宗說亦如瑜加等辨謂三車引出也二或攝界外機令得出出世益方為究竟此有二種約機通標也若先以三乘令其得出後乃方便得一乘者此則一乘三乘和合說故屬同教攝亦名迴三入一教此如法華經說若先於一乘已成解行後於出世身上證彼法者即屬別教一乘攝此如小相品說若先等者先同教迴三入一教同教之異名也若孔目云經云會三歸一故知是同是指教之行相非釋同教之名會三歸一則是三一共教共故名同也法華是同教一乘所依之經五教三乘通釋釋迦如來海印所現一代佛法不出一乘三乘小乘三宗收盡勿以情取若先下後別教已成解行者界內通見聞解行出世唯證入見聞入證皆約一乘故屬別教小相品者則地獄天子三重頓圓也三或通攝二機令得二益此亦有二二益者出世出出世二種益也若先以三乘引出後令得一亦是一三和合攝二機成二益故屬同教此如法華說若界內見聞出世得法出出世證成或界內通見聞解行出世唯解行出出世唯證入此等屬別教一乘此如華嚴說初門可見若界內下不與三合故屬別見聞解行證入三位就界內外并出出世為義不同耳如華嚴者所辨乘體教義攝機成益皆是所詮如經說即約能詮教也第三敘古今立教古今諸賢所立教門差別非一且略敘十家以為龜鏡古今立教者前之二章已辨所詮乘法攝機成益三一不同同別亦異將顯能詮經論詮有淺深以示所宗圓極理宜判教開宗先敘古今名範故說此門名賢俊傑開判良多且敘十家以示方軌一依菩提留支依維摩經等立一音教謂一切聖教皆是一音一味一雨等但以眾生根行不同隨根異解故有多種如尅其本唯是如來一圓音教故經云佛以一音演說法眾生隨類各得解等也菩提流支即後魏至中夏也依維摩經立一音教一音即淨名經一味一雨即法華藥草喻品謂三草二木不同同承一雨之潤五性三乘不同法雨一味無差別然此一音或名教本或謂本末鎔融一大善巧法而圭山乃謂圓教攝於前四一一同圓海中百川無非海也或名法界大宗或名無盡圓通自在宗即是華嚴全収諸教大宗也今章與探玄獨引菩提流支證一音教引維摩經前偈佛以一音演說法眾生隨類各得解皆謂如來同其語斯則神力不共法肇曰密口一音殊類異解探玄云一約類或為天眾現一天音能含餘類各別得解對人亦爾餘類皆然清涼曰如來一音同時報萬大小並陳玄文雙引流支羅什於羅什下引經次偈佛以一音演說法眾生各各隨所解普得受行獲其利斯則神力不共法肇曰佛以一音說一法眾生各隨所好而受行探玄云二約法或為眾生說施一音亦令人解戒定等清涼曰佛一圓音平等無二無思普應機聞有殊非謂音本陳大小又云初則佛音具異後自在機各得圓音一義有謂與清涼異者悞矣二依誕法師等依楞伽等經立漸頓二教謂以先習小乘後趣大乘等大由小起故名為漸亦大小俱陳故即涅槃等教是也大中小起正示漸義從小而大亦小大並陳所以得名為漸也涅槃者捃拾殘機大由小也度十仙果證羅漢所以前文判屬三乘是也如直往菩薩等大不由小故名為頓亦以無小故即華嚴教是也直往於大故不由小文無迴小之說初成頓說無權可會故云無小名頓也遠法師等後代諸德多同此說隋遠法師齊朝劉虬亦立此二三依光統律師立三種教謂漸頓圓光統即佛陁三藏高弟也大統名惠光南山宗承之律宗之祖師也常講大經有廣略二疏所立教門至相搜玄承用也此方首判華嚴為別教一乘人到于今咸受其賜非聊爾人也三教名義如本疏釋光師釋意以根未熟先說無常後說常先說空後說不空深妙之義如是漸次而說故名漸教由根未熟未堪總聞故先說等也如五時三時之次第也常無常如以般若對涅槃空不空即般若對法華等也為根熟之流於一法門具足演說一切佛法常與無常空不空俱說更無漸次故名為頓具足演說故名頓也然上二教釋義探玄周疏並作此說此乃吾祖略撮彼義以成其文若據彼疏搜玄中全用也漸教則說三藏翻名辨相彼文云如約以辨一化始終教門有三一曰漸二曰頓三曰圓初門漸內所詮三故教則為三所為二故教則為二言其三者一修多羅二毗奈耶三阿毗達磨等教則為二則說大小二藏所以如此者良由三藏詮於三學有兼有正詮此不詮彼二藏之內說大不說小說小不談大通收一代漸經故言先空後不空先無常後說常等彼又云二頓教者下經云若眾生下劣其心厭沒者示以聲聞道令出於眾苦若復有眾生諸根小明利樂於因緣法為說辟支佛若人根明利饒益於眾生有大慈悲心為說菩薩道若有無上心決定樂大事為示於佛身說無盡佛法以此文證知有一乘及頓教及三乘差別以此文中四乘頓用故云具足演說常無常空不空同時俱說此則化儀有異所說之法不別指圓覺為化儀之頓義同此也為於上達分階佛境者說於如來無礙解脫究竟果海圓極秘密自在法門故名為圓即此經是也上達兼地前也分階佛境地上也具周疏義鈔後光統門下遵統師等諸德並亦宗承大同此說遵等者即名也光師之高弟也尊嚴敬仰有過其師者四依大𮕢法師等一時諸德立四宗教以用通收一代聖教一因緣宗謂小乘薩婆多等部二假名宗謂成實經部等三不真宗謂諸部般若說即空理明一切法不直實等四真宗涅槃華嚴等明佛性法界真理等立四宗文處頗明五依護身法師立五種教三種教同前𮕢師第四名真宗教謂涅槃等經明佛性真理等第五名法界宗謂華嚴明法界自在無礙法門護身即寺名也但於前四開出華嚴為法界宗六依耆闍法師立六宗教初二同𮕢師第三不真宗者明諸大乘通說諸法如幻化等第四真宗者明說諸法真空理等第五常宗者明說真理恒沙功德常恒等義等第六圓宗者明法界自在緣起無礙德用圓備亦華嚴法門等是也耆闍亦以處標名也第三不真等但約俗諦說諸法如化第四約真諦說空理真實第五約性德常恒第六約華嚴德用圓滿故名圓宗七依南岳思禪師及天台智者禪師等立四教該攝一代東流教一名三藏教謂是小乘故彼自引法華經云不得親近小乘三藏學者故又智度論中說小乘為三藏教大乘為摩訶衍藏二名通教謂諸大乘經中說法通益三乘人等及如大品中乾慧等十地通大小者是也亦名漸教三名別教謂諸大乘經中所明道理不通小乘者是也亦名頓教四名圓教謂法界自在具足一切無盡法門一即一切一切即一等華嚴是也亦名秘密教以聲聞等不見聞故彼自引經者以此教名小監故言彼自引也四教名義略如演義廣如彼宗八依江南敏法師立二教一釋迦經謂屈曲教以逐物機隨計破著故如涅槃等二盧舍那經謂平道教以逐法性自在說故即華嚴是也立二教如演義備釋九依梁朝光宅寺雲法師立四乘教謂臨門三車為三乘四衢所授大白牛車方為第四以彼臨門中牛車亦同羊鹿俱不得故餘義同上辨義如章初廣如探玄演義後代信行禪師依此宗立二教謂一乘三乘三乘者即別解別行及三乘差別并先習小乘後趣大乘是也一乘者謂普解普行唯是一乘亦華嚴法門及直進等是也別解別行者解行一一歷別三乘差別諦緣度異也先習者謂大由小起亦大小俱陳也普解普行者一具一切故此非華嚴餘宗則無十依大唐三藏玄弉法師依深密經金光明經及瑜伽論立三種教即三法輪是也一名轉法輪謂於初時鹿野苑中轉四諦法輪即小乘法二名照法輪謂於中時於大乘內密意說言諸法空等三名持法輪謂於後時於大乘中顯了意說三性及真如不空理等一轉法輪謂三輪四諦法輪二照法輪者謂以空照有故為破遍計性密意言空未顯說有也三持法輪者謂雙持前二也三性直如皆約理說不空謂圓成是有依彼自宗但許不變湛然常存之有非隨緣有此三法輪中但攝小乘及小乘中始終二教不攝別教一乘何以故華嚴經在初時說非是小乘故彼持法輪在後時說非是華嚴故是故不攝華嚴法門也此三法輪但攝小乘等者從小之大但攝一代漸經小始終三合名為漸故又以三輪義通如真諦三藏法性宗人亦依光明等經立此三輪持則雙持性相故將三輪攝於三教非相宗意相宗但至境空心有為雙持耳此上十家立教諸德並是當時法將英悟絕倫歷代明模階位叵測只如思禪師智者禪師神異感通迹參登位靈山聽法憶在於今諸餘神應廣如僧傳又如雲法師依此開宗講法華經感天雨華等神迹亦如僧傳其餘諸德行解超倫亦如僧傳此等諸德豈夫好異但以備窮三藏覩斯異軫不得已而分之遂依教開宗務存通會使堅疑碩滯氷釋朗然聖說差異其宜各契耳第四分教開宗開宗判教者非命世之大才徹法之正眼備窮三藏囊括百家隱實托權本高跡下者豈能為哉昔可尚也正而用之理或未然別立新意前列十家周鑑不遠於中有二初就法分教教類有五後以理開宗宗乃有十就法分教者法謂能詮教法就此一代教法以類相從其流有五故次文云聖教萬差要唯有五問今家以義判教其理安在答若不約所詮之義何以知其教法有五盖由吾祖以圓通之智眼觀彼聖教詮小乘行果則分為小教權實偏圓義有不同則分為彼教故下文云此約法以分教若就法義如下別辨此分能詮五教不同下辨五類所詮差別於理照著以理開宗者約人所尚道理不同略有十也初門者聖教萬差要唯有五一小乘教二大乘始教三終教四頓教五圓教聖教萬差即東流一代部類之多也就此聖教通為五類小者相從為小不辨部帙大小卷軸多寡也餘四皆然如人持尺量絹就絹分成五段但言分絹不言尺等非不用尺今就楚法類分為五非不以義也初一即愚法二乘後一即別教一乘指經本中為善伏太子所說名為圓滿修多羅故立此名也初一即愚法二乘教謂此教中但斷煩惱以證我空不斷所知不證法空愚於諸法羅漢不識赤鹽貞元云我於凡愚不開寅等後一下指晉經本中者以章非疏故此晉經唐經名圓滿因輪修多羅故立此名者而圓教依此立也中間三者有其三義中間三者謂始終頓也探玄開二則首開別教一乘前四為三乘三中則開小為小乘中間三教為共教三乘與此全同章初以別教揀三乘以愚法在里內為小乘中間為三乘也孰云不揀終頓哉一或總為一謂一三乘教也以此皆為三人所得故如上所引說謂總合三教為一三乘教以此下釋所以何以三教總為二乘以此三教皆為三人所得故所得者修因獲得之果也良由此等大乘經典雖有權實皆是通說三法通益三機也如上所引者即三乘中大品等經共集三乘眾通說三乘法具獲三乘益獲益即所得也若云終頓三人共得一果皆得成佛或引近異遠同者皆是臆說且始教得三果終頓得一果此可釋存三泯二不同分之為二也今合為一耳二或分為二所謂漸頓於上三乘開出漸頓謂孔目問答與今教章分判諸教所依之經皆就法華之前以判如正法念經舉正解行別邪解行通三乘教涅槃經等及大品經三乘終教維摩思益大般若經那伽室利分等則當頓教金剛般若三乘始教是以今文於三乘開出頓漸復開始終也以始終二教所有解行並在言說階位次第因果相乘從微至著通名為漸以始終等者終教雖云假設地位亦在言說並不同頓教也是故二教共為漸也故楞伽云漸者如掩摩勒果漸熟非頓此之謂也頓教者言說頓絕理性頓顯解行頓成一念不生即是佛等言說頓絕如直默等理性頓顯者法性無多少長短故解行頓成者淨名云時維摩詰默然無言文殊歎曰是真入不二法門祖曰若無維摩嘿不二理則一切法不成一念不生等者一念妄心不生云何不得名佛清涼云念想都寂方曰不生寂照現前豈不名佛又真如無分別空一念即成其佛又一念所謂無念也小乘無一念成佛故楞伽云頓者如鏡中像頓現非漸此之謂也以一切法本來自正不待言說不待觀智如淨名以默顯不二等又寶積經論中亦有說名頓教修多羅故依此立名即四頓之一也菴羅果四漸之一也以一切下略示所以言說頓絕者以自正也一切解行皆不可說故不待觀智也嘿顯即真不二理也寶積下重引得名三或開為三謂於漸中開出始終二教即如上深密經等三法輪中後二是也約大乘初淺後深故開為二會深密者以三時收漸教也五時則於後開出法華涅槃常住妙典為四五時今合五作三第三時中收經甚寬又持法輪義亦通也深密經亦說真如妙有但弉師所宗宗於不變湛然有耳今約通義略分教耳依是義故法鼓經中以空門為始以不空門為終故彼經云迦葉白佛言諸摩訶衍經多說空義佛告迦葉一切空經是有餘說唯有此經是無上說非有餘說復次迦葉如波斯匿王常十一月設大施會先食餓鬼孤獨貪乞次施沙門及婆羅門甘饍眾味隨其所欲諸佛世尊亦後如是隨諸眾生種種欲樂而為演說種種經法若有眾生懈怠犯戒不懃隨順捨如來藏常住妙典好樂修學種種空經乃至廣說依是義者則依二教始終不同也以空為始不空為終是然此五教草創於帝心因循於至相脩飾於賢首也如是則開判於奘師未歸之前且竺汰之時三論新翻空性並行各符宗旨遂於大乘有性空二教聖賢繼踵權實遂分今家五教囊括諸宗故以空為大乘之初門不空為終也始者初始也終者終極也空不空乃二教所顯之理也非立名之因也然此始終且顯一理空有相望如圭峯略辨十對淺深不同雲華曰始教門者復有二種言始門者如百法明門論六種無為屬一切法攝人法二空方入空攝得知真如不及二空二空為上言終門者維摩弟子品不生不滅是無常義等金剛微塵即非微塵等又云今初教門中真如但是空義不同終教如終二門並具空有二門問弉師還自天竺執定性闡提並不成佛故以深密第二第三時合為始教有不成佛故復名分亦是大乘初門所顯之如義同百法是始之初門答以示義復次下引喻諸佛下合顯在文可見解云此則約空理有餘名為始教約如來藏常住無上名為終教有餘者尚有未盡也常住妙典方盡談故又如起信論中約頓教門顯絕言真如約漸教門說依言真如就依言中約始終二教說空不空二真如也所顯真如既有其三故教成三也有疑用論者當知經論多含隨用異耳雖開為三然皆三乘也此約法以分教若就法義如下別辨如下別辨者指下所詮差別中辨能詮教法之下辨所詮之義也義則理行果三也二以理標宗宗乃有十一我法俱有宗此有二一人天乘二小乘中犢子部等彼立三聚法一有為聚二無為聚三非二聚初二是法後一是我又立五法藏一過去二未來三現在四無為五不可說此即是我不可說是有為無為故小乘犢子二十部於六宗所計同異攝部少多備釋如演義不復更列二法有我無宗謂薩婆多等彼說諸法二種所攝一名二色或四所攝謂三世及無為或五謂一心二心所有三色四不相應五無為故一切法皆悉實有三法無去來宗謂大眾部等說有現在及無為法以過未體用無故四現通假實宗謂說假部等彼說無去來世現在世中諸法在蘊可實在界處假隨應諸法假實不定成實論等經部別師亦即此類四唯小乘五俗妄真實宗謂說出世部等世俗皆假以虗妄故出世法實非虗妄故六諸法但名宗謂一說部一切我法唯有假名都無體故此通初教之始准之演義云五六通大小五少似中論一半向前此通初教之始者真如義者漸教門中有三門一終教門二始教門三世間所知門第三復有三門始門通人天及愚法二乘言終門者論釋謂一切法但有名謂分別名思惟名等為是大乘近方便故故云初教之始七一切皆空宗謂大乘始教說一切法皆悉真空然出情外無分別故如般若等始教等者義如分教中辨然此教通分別無分別教義無分別教義者謂證真如故分別教義者謂教義即空故今就深指故云無分別也般若者指所宗經也護身衍師智光竺汰等皆此判也八真德不空宗謂終教諸經說一切法唯是真如如來藏實德故有自體故具性德故謂終教等即前常住妙典說如來藏具足無漏性德一一有體也九相想俱絕宗如頓教中絕言之教顯絕言之理等如淨名嘿理等准之如頓教等者孔目云此如絕於教義相想俱不及故十圓明具德宗謂如別教一乘主伴具足無盡自在所顯法門是也如是等如前分教中此章同探玄依五教次第亦順其義以列諸宗次第及釋義也而清涼國師七名三性空有宗八名真空絕相宗九名空有無礙宗此蓋以性揀相迴大乘法師第七為八以符法性在法性相之後為深故也少與五教不次又以性空通始終頓遂以真空絕相収於頓教又亦空有無礙徹於同教故云前淺後深若空有雙絕亦収頓教又復七八九三諸師各立欲判淺深定其權實故清涼序之與今章探玄不同也彼文云又上三宗諸師各立故今敘之其第十一宗非彼所競故不言耳第五乘教開合者於中有三乘教開合者良以諸家判立各有聖教以為依據不可全棄又聖教開合本由機異設云平道亦為化生合雖多過開亦未能全無於失是故今家開合全収無過不離故有此門初約教開合二以教攝乘三諸教相収初約教者然此五教相攝融通有其五義此即諸文判教之後總相會通也但立文小異義旨大同與探玄全同但彼開四有二說此少一門耳既云五教相攝終頓在其中矣一或總為一謂本末鎔融唯一大善巧法本末二相譬若五金大冶烹而為一故云本末融鎔唯是如來一大善巧攝生方便圭峯言圓教攝於前四一一同圓海中百川無非海也或名一圓音教或名滿藏或名無盡圓通自在宗略如同教䇿出二或開為二一本教謂別教一乘為諸教本故二末教謂小乘三乘從彼所流故又名究竟及方便以三乘小乘望一乘悉為方便故是前一中約本末開成二也一本教等者初說華嚴為諸教本清涼云將欲逐機漸施末教先示本法頓演此經二末教等者即前四也既從所流故稱為末又名究竟等者此約有果無果以分二亦名稱法本教逐機末教亦名正乘方便乘探玄云或開為二謂一乘三乘教前諸教中雖有存三泯二不同然皆通三乘趣入故名三乘教亦名共教不共教如上引智論或約同別或約大小或約權實或約曲直或約漸頓等也三或開為三謂一乘三乘小乘教以方便中開出愚法二乘故謂一乘等者探玄云或開為三謂小乘三乘一乘教智論既將此經不與二乘共名為不共即是一乘大品等為通三乘同觀得益故名為共即是三乘四阿含即是小乘清涼曰或後一是不共此三亦順四乘此上二門三乘皆備収終頓皆是方便為三人所得非究竟也若清涼圭峯分三教中於五教內初一小乘次一三乘後三一乘與今不同四或分為四謂小漸頓圓以始終二教俱在言等故謂小等者此是探玄第二義以彼分四有二義一於上共教中約存三泯二開兩教故為四一別教小乘二同教三乘如深密等存三也三同教一乘如法華等泯二也四別教一乘如華嚴等深密既第二第三時教同許定性二乘等俱不成佛許其入寂不起是始教存三也若終頓二教共談一性無有五性入寂二乘非真滅度是泯二也由此義故開入一乘宗中為同教一乘清涼曰終頓二教雖說一性一相無二無三是泯二也又云實教頓教並皆不融為同教一乘演義云不辨圓融具德故非別教貞元大疏其理一也若爾者前二門則以皆為三人故終頓總入三乘教攝第四門則取泯二故終頓入一乘攝文理甚明又皆指法華為同教一乘文亦甚多五或散為五謂如上說二以教攝乘者有二教是能詮乘約所詮乘教非一故辨此門先一乘隨教有五一別教一乘二同教一乘云云三絕想一乘如楞伽此約頓教四約佛性平等為一乘等此約終教五密義意一乘如八意等此約始教云云別教一乘同教一乘云云者建立一乘中廣顯同別不復更書三絕想一乘孔目云會彼五乘成無分別離相一乘出楞伽經第四可見五密義意者要問有八意故說一乘彼一乘是隱密相引二乘說非顯了說也二明三乘亦有五一小乘中三始別終同以俱羅漢故二始教中三始終俱別以有入寂故三終教中三始終俱同並成佛故四頓教三始終俱離云云五圓教中三始終俱同汝等所行是菩薩道等故云云小中三始別終同者探玄云謂始約因修四諦緣生六度等別終就得果三乘之人身智同滅故云俱羅漢等也二始教等者探玄有二義句彼云若據聖諦緣生六度行異亦得名為始終各別此是第二第三時教說也即是今義彼又云二始同終別三謂同聞般若同觀無性三乘之人各得自果如前所引說彼前所引者亦即大品等共教三乘若如是者始教既皆共教三乘則亦有同觀無性各得自果始同終別之句也三終等者始同者同聞般若同觀性空故終同者並成佛故探玄又有近異遠同三謂初以三乘方便引之後同以大乘令得度等名若力士經大般若等諸大乘經於中雖有權實不同皆具三乘以約始終一類此世定故如是說者則終教自具四句一始同終別三同聞般若等故始同也皆為三人所得故終別也以終教亦収入共教三乘故二始終俱別三以大品等通說三乘法通益三人則諦緣度別是三法始別也通三人得益是終別雖有權實皆具三乘此世根性定故未過八萬劫等未迴心故三始別終同三約此世根性異未至無餘位不發心須說二乘引令入道諦緣度不同始別又以八六四二萬十千劫醉三昧酒始別酒消然後覺終同也四始終俱同三始同同聞同觀也終同者以許迴心作佛也四頓教始終俱離者皆不可說故五圓教中三汝等所行釋始同皆得授記終同也三諸教相收者有二門一以本收末門二以末歸本門所以辨相收者欲顯方便正乘上下相望權實不同令知末有所歸耳然有二門並約一乘辨也本即一乘末即諸教以諸教雖有相收為本之義而本義不成以畢竟是方便故如共教中亦上下相望有共不共而皆共教也初中於圓內或唯一圓教以餘相皆盡故或具五教以攝方便故頓教中或唯一頓教亦以餘相盡故或具四教以攝方便故熟教中或一或三初教中或一或二小乘中唯一皆准上知之圓內餘相盡者本來是一乘故或具五攝前四為方便故有五也此通即不即二義如下七八二門辨頓教中亦餘相盡者一切不可說不知一故或四攝前為方便者從漸入頓故熟教亦名實教或名終教或一亦以餘相盡故或三前二為方便故初教根不定堪入熟教等故初教或名始或名分以空有二宗皆未盡大乘法理總名初教或一約自宗或二攝小為方便小根不定堪入初教即便定等故小乘唯一二以末歸本小乘內或一以據自宗故或五謂於後四教皆有為方便故初教中或一是自宗故或四謂於後三教皆有作方便故熟教中或一或三頓教中或一或二圓教中唯一皆准上知之前四皆有趣歸之法則知自宗非是究竟故名方便隨宜巧便假施設者也小乘或一自宗不知大乘故或五皆有為方便故初教或一約自宗或三於後二教皆有為方便故頓教中或一約自宗或二於後一皆有作方便故當知此章終頓二教但屬三乘皆須入一方名究竟望後圓教皆名方便若約泯二顯一屬於一乘則不名方便以後三教皆名乘今非此義圓教唯一以究竟故是諸教下所明義理交絡分齊准此思之交絡者如五教互望分齊也是則諸教本末句數結成教網大聖善巧長養機緣無不周盡本末句數者則上來諸教相收諸句也結成教網則鎔融為無盡圓宗也是則融前諸教為究竟之圓多澇漉根緣無孑遺矣是知人天善根皆圓教攝有謂但融圓中自有四諦等法不取前教者豈足以語道也故此經云張大教網亘生死海度天人魚置涅槃岸此之謂也第六教起前後者教起前後者略辨如來一代所說約時顯教本末交映與奪相資方為善巧攝生方便也於中有二初明稱法本教二明逐機末教初者謂別教一乘即佛初成道第二七日在菩提樹下猶如日出先照高山於海印定中同時演說十十法門主伴具足圓通自在該於九世十世盡因陀羅微細境界則於此時一切因果理事等一切前後法門乃至末代流通舍利見聞等並同時顯現稱自得法直說根本一乘法也於中有四初正陳本法第二七日者順論眾也以時因陀羅該前後故周疏具有會釋十十法門即同時具足等十十門也言理事等者等餘行位人法等事法也前後者前即初成後即末代乃至今後見聞等並在此時顯現何以故卷舒自在故舒則該於九世卷則在於一時此卷即舒舒又即卷何以故同一緣起故無二相故初徵有何所由前後復同時同時亦前後耶答卷舒自在故不同末教卷舒異門不得自在此宗舒卷牙即是故該九世攝一時鎔融無礙也又徵何以卷舒得若是耶同一緣起故無舒即無卷有卷乃成舒也無二相者珠光鏡明牙相是也經本云於一塵中建立三世一切佛事等又云於一念中即八相成道乃至涅槃流通舍利等廣如經說廣如離世間品等說是故依此普法一切佛法並於第二七日一時前後說前後一時說如世間印法讀文則句義前後印文則同時顯現同時前後理不相違當知此中道理亦爾准以思之孔目問曰大智舍利弗等佛出世已在他國異時異處方與目連等入其佛法因何華嚴經會第二七日佛未移動即有舍利弗等五百聲聞其祇洹林及普光法堂並未建立因何具述在經答如來依解脫德建立一乘故經云於一微塵中建立三世一切佛轉法輪當知今所成一乘教者即其事也依九世入智融九世法成其十世即過現未各有過現未相即復相入成其十世當第二七日如是等法皆悉現前又曰若欲識華嚴經無盡教義者當依六相因陀羅微細智及陀羅尼自在法智知今章即用彼文也下文云廣如孔目問答則知自云錄和尚微言成於章疏果不虗矣不熟孔目問答則不知此章元由後賢不可不察二逐機末教者謂三乘等有二義一與一乘同時異處說二異時異處說初義者是同教故末不離本故依本而成故後義者本末相分故與本非一故此二各有二義一三乘二小乘三乘等者兼小乘也初義者同時異處也是同教者則表三一和合同時說也如次章所指末不離等所以皆同初時也文中三故字皆出所以同時也後義本末相分者本教末教二相各不同也與本非一者以不即義故也初者密迹力士經說佛初成道竟七日思惟已即於鹿苑中以眾寶等莊嚴法座廣集三乘眾梵王請佛為轉法輪廣益三乘眾得大小等果乃至廣說如彼經中又大品經云佛初在鹿野苑轉四諦法輪無量眾生發聲聞心無量眾生發獨覺心無量眾生發阿耨多羅三藐三菩提心行六波羅蜜無量菩薩得無生法忍住初地二地乃至十地無量一生補處菩薩一時成佛解云以此教證當知最初第二七日即說三乘法與一乘同時說也經中言七日思惟即思因行緣行也文處可見義當探玄本末差別同時兼小乘一乘三類同時也二小乘者彌沙塞律說佛初成道竟入三昧七日後乃於鹿苑而轉法輪故知小乘亦與一乘同時說也又普曜經云第二七日提謂等五百價人施佛蜜佛與授記當得作佛等此經所說雖通三乘等教有義亦攝人天等法亦與一乘同時說也於中各有引經示義問說時既同何故說處別耶此是直問非難問也答為約時處寄顯法故須同異也約時處表法要同異也故地論云時處等校量顯示勝故同時者顯是同教故處異者示非別教故如別教一乘在菩提樹下說者欲明此是得菩提處即顯如來自所得法稱本而說故不移處說也餘三乘等法欲明逐機改異故移處就機鹿苑而說顯非本也地論等者時謂初時處即覺場異處謂鹿苑等顯非別教者移異就機非是稱自所得一乘別教也餘文可知第二時處俱異者由與一乘不即義故時處俱別也或三七日後說如法華經或六七日後說如四分律及薩婆多論說或七七日乃說如興起行經或八七日乃說如十誦律說或五十七日後說如大智論說或一年不說法經十二年方度五人如十二遊經說有人解云智論五十七日者即五十箇七日與十二遊經一年同也第二等者不即義者言本末差別也八七下探玄大疏皆云五分律餘並同此末教機異宜聞各別故不同也以此等教證當知三乘小乘並非第二七日說由與一乘教差別故隨機宜故餘可准知並可知其中義有依本起末攝末歸本等此皆略之矣第七決擇其意者然諸教前後差別難知略以十門分別其意諸教前後難知者探玄西域二家之後吾祖有問二說三教各初說小華嚴初說如何會釋前章三宗同時並說故有此科決擇其意也言差別難知者古來諸德各答釋此問多說不同一約頓漸悟機二約顯秘二門三約一音異解然皆有妨難不能決通第四賢首釋通方決此難兼會二說大例有二一為此世根定者說二為此世根不定者說今章總籠二例以為十門一或有眾生於此世中小乘根性始終定者則見如來從初得道乃至涅槃唯說小乘未曾見轉大乘法輪如小乃諸部執不信大乘者是彼文此世根定中有三此其一也二或有眾生於此世中小乘根不定故堪進入大乘初教即便定者則見如來初時轉於小乘法輪翻諸外道後時見轉大乘初教即空法輪迴諸小乘如中論初說者是此即此世根不定門也然此章分成多義以順前諸教也彼但入三入一之二門耳今即從小入初教也而言即空法輪者孔目等但有以空為始今章錄之而成其文故言即空法輪其後相宗漸熾探玄等方辨乃以三分半人不得成佛故亦判入初教加分名耳非相違也中論初者即因緣所生法我說即是空也三或有眾生於此世中於小乘及初教根不定故堪入終教即便定者則初時見轉小乘法輪中時見轉空教法輪後時見轉不空法輪如解深密等說者是即深密三輪中初聞唯小次聞唯大後聞具三此云空不空者約所顯理說四或有眾生於漸教中根不定故堪入頓教即便定者即見初示言說之教猶非究竟後顯絕言之教方為究竟如維摩經中初三十二菩薩及文殊等所說不二並在言說中後維摩所顯絕言之教以為究竟者是此約淨名宗在絕言也文處甚顯五或有眾生於此世中頓悟機孰即便定者即見佛從初得道乃至涅槃不說一字如楞伽經說又涅槃經云若知如來常不說法是名菩薩具足多聞等亦即探玄根定中㭊出也所引皆絕言也六或有眾生於此世中三乘根性定者見佛從初即說三乘教法乃至涅槃更無餘說如上密迹力士經及大品經說者是即彼根定中云或有眾生此世三乘根性熟者見佛始終但說三乘如密迹力士經云佛初鹿園說法時無量眾生得阿羅漢果等乃至廣說大品大般若亦同此說又云以此義准後時所說皆通具此三乘如諸大乘經中所說又云於中雖有權實不同皆具三乘是故當知此前諸門權實頓漸不同此世根性定不定別皆屬三乘第七已下方談從三入一耳七或有眾生於此世中三乘根不定故堪進入同教一乘者則見自所得三乘之法皆依一乘無盡教起是彼方便阿含施設是故諸有所修皆迴向一乘如會三歸一等又如上所引三乘與一乘同時說者等於此世等者三根不定而入一者迴三入一是同教也見自得法是彼方便捨方便而入正乘三乘為教一乘為義三一和合即前圓教或五前四為方便故雖非正乘皆圓教攝是彼方便故如奴屬主也孔目云若橫依方便法門有二義今說一乘中後義與彼究竟圓一乘為方便故說一乘非即圓通自在義也意云但與彼作方便得名一乘非即是彼圓通自在無盡法也故云依彼教起是彼等也阿含此云淨教意云但是言說耳八或有眾生於此世中三乘根不定故堪可進入別教一乘者即知彼三乘等法本來不異別教一乘何以故為彼所目故更無異事故如法華經同教說者是文云或有眾生於此世中三乘根不定堪入別教者則此類眾生初見佛聞說三乘久修根熟普眼智開見自得法是佛於一乘分別說三無異事唯是一乘故云入別還是從三入一但根利不見所捨方便耳若為彼一乘之詮目一一圓融故更無異事孔目云由依究竟一乘教成何以故從一乘流故又為一乘所目故如法華經同教說者以此經宗於會三歸一是故上之二門雖入同入別利鈍不同皆就機破會不同華嚴初成頓說無權可會不通二乘獨談不共一乘如前別教中該攝一切本末唯是一乘則是此經所詮圓別究竟法也九或有眾生於此世中具有普賢機者則見如來從初成道乃至涅槃一切佛法普能初時第二七日海印定中自在演說無盡具足主伴窮因陀羅網微細境界本來不見說三乘小乘等法如華嚴經別教中說者是此約普賢教分見聞及解行處說此下二門皆約別教一乘此即探玄此世一乘根性熟者開二門也即初時便說本教也不見三小者直體顯一為大菩薩直示法界成佛儀故不對二乘無所破故無權可會不同法華破異明一此約普賢教分等普賢門中若但約教證以分二分則教分中有見聞解行入證分齊為證分孔目曰此約教分說又曰此據證說或開三分所謂見聞分解行分入證分或名三位或名三生孔目云當是圓教證分已去又云當在圓教位中見聞處說又曰普賢解行分義是也三分並是普賢門攝今文約教證二分為九十二門故教分中即見聞及解行處說也十或有眾生於一乘別教解行滿足已證入果海者則見上來諸教並是無盡性海隨緣所成更無異事是故諸教即是圓明無盡果海具德難思不可說不可說也此約一乘入證分齊處說餘可准知此即一乘根性定㭊成此門眾生解行滿足證入果海則知非是寂滅圓極自在果也又云即見上來諸教等者當知此中果海即是發心品初發心時取得果耳亦不思議等所顯之果此中說者即顯果海不可說也此文云不可說不可說者乃是具德難思出於數法耳非言果分玄絕不可說是故結云此約一乘入證分齊處既言就此處說顯非果海明矣第八施設異相者然此異相繁多略約十門以顯無盡何者十異一者時異謂此一乘要在初時第二七日說猶如日出先照高山等故論云此法勝故在初時及勝處說也時異等者如教起前後說若爾何故不初七日說思惟因緣行等如論釋初七最勝何以不說思惟因行緣行故初七不說論即十地論廣說如諸疏記又此即是時因陀羅網等故即攝一切時若前若後各不可說劫通前後際並攝在此一時中也亦如上說因陀羅即數也用顯時之無盡三乘等不爾以隨逐機宜時不定故或前或後亦不一時收一切劫等亦如前辨二者處異謂此一乘要在蓮華藏世界海中眾寶莊嚴菩提樹下即攝七處八會等及餘不可說不可說世界海並在此中以一處攝一切處故是故不動道樹徧昇六天等者是此義也又此華藏世界通因陀羅網故周側諸塵於此稱法界處說彼一乘稱法界法門也要在下世界海者即蓮華藏香水海中攝二十重佛剎結有不可說佛剎微塵數世界於中布列皆如來修因之所嚴淨常處其中而演說法七處八會晉譯經耳及餘下此華嚴藏之外十方無間窮盡法界之剎並在其中不動者即不分而遍也又此世界通帝網重重無盡不可說其分量也周側諸塵經云華藏世界所有塵一一塵中見法界等清涼云此猶約器世間說若約智正覺及眾生世間即一一佛身支節毛孔皆攝無盡重重之剎普賢眾生一一皆爾並是遮那說經之處自狹之寬略顯十重之處如疏所辨三乘等即不爾在娑婆界木樹等處亦無一處即一切處等在文可見問若爾何故佛地經等亦在淨土中說耶答彼經但云在光曜宮殿等具十八種圓滿亦不別指摩竭國等以彼為地上菩薩說佛地功德故在三界外受用土中此三乘終教及一乘同教說答彼下示彼經相亦不下揀不同以華嚴指摩竭國全華藏故以彼下顯彼經意況為地上說佛地德故特於界外受用中顯染淨差別說非融通說也此三下指教分齊也三乘終教及一乘同教共說此義則知三乘終教非別教也若此華嚴皆云在華藏界內摩竭國等不云娑婆內亦不云三界外故知別也餘義准知染淨鎔融也三者主異謂此一乘要是盧舍那十身佛及盡三世間說如普賢行品云佛說菩薩說剎說眾生說三世一切說等謂此等者十身二種十身如玄文具列仍說用周等十重無礙廣顯法界身雲無盡之相通三世間常說遍說所引經文即三世間說也不同三乘等是化身及受用身等說餘義准知受用即三身中他報身名盧舍那孔目云此約三乘盧舍那當彼報身又云化身復說報身所化千佛及化千億釋迦亦當報身下閻浮提七歲出家等當是化身若依華嚴即不如此為有十佛不同故其盧舍那等及化釋迦並是十佛化用應可準知又如普賢乘象至行者前即三乘普賢謂第四十五知識即一乘普賢當知三身舍那與十身舍那德義天遠普賢既爾文殊亦然一一皆具主伴圓明無盡故四者眾異謂此一乘經首唯列普賢等菩薩及佛境界中諸神王眾謂此等者如妙嚴品所列不同三乘等或唯聲聞眾或大小二眾等或唯等如餘經說問若爾何故第九會中有聲聞眾耶答彼中列聲聞意者二種有二意則二聲聞各當一意一寄對顯法故以彼如聾如盲有顯法深勝也寄彼聲聞對顯華嚴尊勝阿羅漢在座同請尚猶聾盲其法深玄固可知矣故云顯深勝也即釋迦弟子舍利目連十大聲聞也二文殊出會外所攝六千比丘等者非是前所列眾此等皆是已在三乘中令迴向一乘故作是說之此舍利弗弟子海覺等六千比丘與五百聲聞叔姪行異故孔目云即有大智舍利弗等五百聲聞并有舍利弗弟子六千比丘并者兼及也揀有二種不同文殊等者在本會中文殊聞顯後辭佛南遊故云出會所攝即舍利弗亦辭佛從文殊遊於人間以為助化所將因陀羅惠等五百比丘出於自房至道中舍利弗勸諸比丘觀文殊十種勝德文殊如象王迴觀諸比丘比丘皆得十眼十耳等故云所攝六千等為表六根清淨故化為六千也非是下揀五百聲聞是此會經初所列聲聞眾此六千經初不列故則二類不同列字悞作引此等下其諸比丘位在三乘中迴心人也非是小乘聲聞位人良由文殊遊行經中文殊已會化令迴心向大故云已在三乘中今令迴心向一乘故經作是說耳孔自云二約終義辨迴心者如下經文大智舍利弗與五百比丘迴心向文殊師利並言宿種善根現六千比丘顯久共修行成實眷屬舍利弗身在佛法中義當聰明位又曰今復迴心當迴之時即得十種大法等又曰其位在頓悟熟教等又行願往後此是菩薩眾目連鶖子等是聲聞眾當迴心前辛苦窮諭愚法位人孔目又曰如窮子長者遣使方便與價等義當人天及大眾部以去乃至初教如舍利弗迴心等義當初教已去乃至頓教及終教已下孔目化六千者五百比丘化非聲聞化也五者所依異謂此一乘教起要依佛海印三昧中出要依海印等者上云今將開釋迦如來海印三昧一乘教義有同別二門若如上說三乘等並在同教中豈亦海印出耶孔目曰同別由同在海印定中成故不在定中說同教者入一乘遠方便故不同三乘等依佛後得智出即法住智也六者說異謂此一乘此方說一事一義一品一會等時必結通十方一切世界皆同此說主伴共成一部是故此經隨一文一句皆遍十方多文多句亦皆遍十方謂此下即上所引同說經亦即主伴經三乘等即不爾但隨一方一相說無此主伴該通等也一方者逐一方化儀也一相者一相孤門也無此圓融主伴結通十方等也七者位異謂此一乘所有位相上下皆齊仍一一位中攝一切位是故乃至佛等諸位在信等位中餘位亦然謂此下即六位相收即入等廣在疏文略如所詮中辨三乘中即不爾但隨當位上下階降皆不相離也餘如下說不爾等以彼但約行布差別上下不同離字誤當作雜字不相雜也八者行異隨一菩薩即具信等六位一一位中所有定散等差別行相並一時修如東方一切世界中常入定等西方世界中常供養佛等如是十方世界中盡窮法界行亦不分身一時皆遍滿一念皆遍修一一念中亦如此信位滿心已去一一位皆如是修更無優劣又一行即一切行等通困陀羅網等即具信等者以得一即一切故得升即得斗也以一若不成一切俱不成良由同一緣起故六相智融故相入故相即故一一位中定謂正在定散謂出三昧時也並一時修者一念徧成諸行也東方下互徧同時也盡窮法界行者顯重重遍也法界義總成故亦不分者一身即法界身故一時下顯念劫圓融隨一一門各盡攝故信位滿心已去即約行揀位以一乘是行佛故如問答云若具五位及九位佛則是一乘圓教攝也更無優劣前後鎔融故又一下諸行共成緣起有同體異體相即成也三乘即不爾地上菩薩猶各有分齊況地前者乎餘如下說於文可見九者法門異謂略舉十重以明之一彼有三佛此有十佛二彼有六通此有十通三彼有三明此有十明四彼有八解脫此有十解脫五彼有四無畏此有十無畏六彼有五眼此有十眼七彼說三世此有十世八彼說四諦此有十諦九彼有四辨此有十辨十彼有十八不共法此有十不共法餘門無量廣如經說相對揀顯十佛如離世間品等十通十明並如本品餘如出現品等十者事異謂隨有舍林池地山等事皆是法門或是行或是位或教義等而不壞其事仍一一塵中皆具足法界一切差別事因陀羅微細成就隨一事起皆悉如是謂如善財隨所遇貪嗔癡等皆得法門遇山入山法界遇水入水法界等皆即事即真也仍一一塵皆具法界如一塵是總相人法理事因果行位等十對二十事法為別相等一一塵皆各如是故得因陀羅等也三乘等即不爾但可說即空即真如等故不同此也又若以神通不思議力容得蹔現非是彼法自性如是餘可准知孔目云初教即空終教即如頓教即泯又若下揀足指案地并淨名不思議等也
