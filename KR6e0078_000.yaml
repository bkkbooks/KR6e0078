front:
  text: 華嚴五教章復古記刊行凡例就五教章有唐本及和本異也然今此記箋解唐本是故以道亭義苑所載之章文用合記文教章之列次以和本中卷為唐本下卷而亦自二乘迴心以下即冠於編首涉獵此書者預辨其差也教章及記先以見別行恐學者倦於周覧今以科安列章上以記貼附章下則文義章段自燦然焉教章之訓點明慧上人高弟喜海大德所加也審如彼䟦此記諸本校正酌量衍文錯簡仍或有之偶游高山蘭若閱隆辨點寫本最為精詳故今依從彼本記本三卷今分為六卷因以六相字顯示其序次矣寬文九龍集己酉春三月日洛西五臺山般若寺沙門普入謹識復古記序先師可堂和尚自幼留心華嚴教章殆忘𥨊食間有文義未通孜孜研究必求至當之說而後已雖心勦形瘵未始暫輟師於孔目章尤所精通頃寓菩提寺欽師房一日凌晨開卷豁然若有所得欽見師神采異常驚問莫得上人法否師具道所以然欽合掌稱讚且勉師以所見著述可以發明圓頓之旨師游謝未遑又知作者之難不敢卒易師年六十有五始述此記至斷惑分齊未竟功奄然歸寂矣臨終祝曰汝當為吾畢之善熹自媿晚進不敢輙繼前作逮今侵尋莫景適與先師示寂之歲相符切恐風燭難期一旦變滅有負遺訓於是不揆拙惡輙以平昔所聞於師者續其末編共成三卷然以拙工代大匠斵其能血指汙顏之誚乎先師專用古義訓釋因以復古命焉紹凞壬子孟秋一日門人嗣教比丘善熹謹書
