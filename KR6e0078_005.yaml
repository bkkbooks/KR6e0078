body:
  text: 第四修行時分者若依小乘自有三人下根者謂諸聲聞中極疾三生得阿羅漢果謂於一生種解脫分第二生隨順決擇分第三生漏盡得果極遲逕六十劫中根者謂獨覺人極疾四生得果極遲逕百劫上根者謂佛定滿三僧祇劫若依下正示一生種解脫分者謂第一生修聲聞資粮作五停心觀別相念觀總相念觀等名隨順解脫分善第二生修聲聞加行作四諦一十六心拋緣減行等名順決擇分善第三生起智斷惑入於見道極遲則鈍根六十劫初二十劫修資粮次二十劫修加行後二十劫入見道正理論云初位下種次位留成後位結實中根獨覺亦名緣覺四生者第一生修聲聞資粮第二生修聲聞加行第三生別修緣覺資粮加行第四生入見道便證無學百劫者二十劫修聲聞資粮二十劫修聲聞加行二十劫修緣覺資粮二十劫修聲聞加行第五二十劫方入見道證無學果上根定三僧祇第一無數劫修大乘資粮加行第二無數劫入見道乃至七地滿心第三無數劫從八地初心乃至十地滿心生色究竟天上他受用土中更百劫於頂寂定中學諸相好千劫於金剛定中學諸威儀萬劫於大寂定中學諸化行然昇大寶華王座上放十道光明成得正覺拆玄云遇一化佛出世名為一生如舍利弗等於過去拘那含牟尼佛時修聲聞資粮於迦葉佛時修聲聞加行於釋迦佛時方入見道乃至極果也此中劫數取水火等一劫為一數十箇合一為第二數如是展轉至第六十為一阿僧祇依此以數三阿僧祇也水火等一劫者要問云依小乘教世界成壞大劫滿三僧祇則將一成壞劫為一數劫數此十劫為第二如是數至第六十為一阿僧祇所以說六十者孔目云小乘以六十劫為大劫阿僧祗小乘經三僧祇得作佛問何故下根返經時少而上根等乃多時耶答能於多時修練根行等以為難故是故多也於文可知又依婆娑等菩薩成佛有二身一法身二生身法身者謂戒定等五分修此法身具有四時一三阿僧祇劫修有漏四波羅蜜時二於百劫修相好業時三出家苦行修禪定時四菩提樹下成正覺時法身者即以丈六五分功德法為體三僧祇者婆娑云一切諸佛盡於三僧祇劫修諸方便四波羅蜜即前四度也三祇修有漏者未入見道故尚在四加行位入見道發真無漏三十四心斷結成佛生身者但百劫修相好業於㝡後身伽耶城淨飯王家受生報身於摩訶陀國而成覺道餘如彼說父母所生身三祇行滿百劫修因然後菩提樹下而登正覺若依始教修行成佛定逕三僧祇定劫章云大乘小乘二乘不同三乘大乘佛准一方化儀經此三大劫修道得成佛若依頓教則不可說彼則正約終教以揀小乘今章開於始教故二處小異但此劫數不同小乘何者此取水火等大劫數至百千數此復至百千為一俱胝名第一數數此俱胝復至俱胝為第二數如是次第以所數等能數至第一百名一阿僧祇此即十大數中第一數也依此數滿三阿僧祇不同小乘下鎮國云黃帝筭法但有二十三數始從一二終至正載鈔云從一至十為十次有十三數謂十十為百十百為千次萬億兆京垓秭壤溝㵎正載言載者天地不能容載也小乘六十已至無數亦約從一至十為十十十為百乃至䟦羅攙方第五十二阿僧企耶彼論失於後八六十之後別無數法僧祇品中有百二十四數倍倍變之故非凡小所知也小乘中但以水火劫之一劫為第一數却從一二數至十便為第二數大乘以水火劫數至百千百千則當於億數此復至百千則百千億為一俱胝方為第一數則相去甚遠數此復至者謂一俱胝二俱胝數至俱胝方為第二數良以數法有三種謂上中下下等數法十十變之中等數法百百變之上等數法倍倍變之故有不同也又俱胝若唐三藏譯百億為俱胝若測法師深密記第六云俱胝相傳釋有三種一者十萬二者百萬三者千萬是故諸說或有不同也如是次第下舊本云以所數等能數至一百者如約俱胝以數物則俱胝為能數也復數至俱胝是等能數也經中從百洛叉為一俱胝中間越劫阿庾多乃至趣趣為一至一至為一阿僧祇故言次第至一百也阿之言無僧祇曰數謂三無數劫也十大數者即心王所問十大數也謂僧祗至不可說不可說耳仍此教中就釋迦身以分此義如優婆塞戒經云我於往昔寶頂佛所滿足第一阿僧祇劫燃燈佛所滿足第二阿僧祇劫迦葉佛所滿足第三阿僧祇劫我於往昔釋迦佛所始發阿耨菩提心文中可知又依本業經又有百劫修相好業但是變化非實修也又以一偈歎弗沙佛已即超九劫但九十一劫即成佛也為引二乘故示修此業又以下智論歎弗沙如來超彌勒九劫先成正覺偈即天上天下無如佛等問三無數劫修諸實行應成報身何故乃就化身說耶答由此始教就下機故有二乘故此身是彼所知見故是權教故作是說也以釋迦身為化身故下機者即前機麤淺故有二乘者即引一乘故又是三乘共教二乘唯見化身故是權教者謂三乘中就法華前以分權實如云金剛般若三乘始教大品般若是三乘終教清凉所以不取光宅者以法華之前不分權實玉石俱焚也若依終教說有二義一定三阿僧祇約一方化儀故劫章中文與此同如上已引念劫成佛中又云若據一三千界定三僧祇成佛此依華嚴一百二十數說僧祇義就此一類世界也又此教中修實行故成實報身不約化說故法華經云我實成佛以來經於無量無邊百千萬億阿僧祇劫又經云我於燃燈佛所得受記等皆以方便分別故也修實行者從真流故如起信性無慳貪隨順檀等然燈授記即金剛經文諸經所以異說者方便分別引彼器也又亦無百劫修相好業等何以故以小乘中偏修智分不修福分是故臨成佛時更於百劫別修彼業始教中引彼亦同彼說仍是化也此終教中論其實行從初發意即福慧雙修故成佛時無別修也小乘唯求出離不肯化生故有羅漢飡沙是無福也今此勝無別修也二不定三阿僧祇此有二義一通餘雜類世界故如勝天王經說要問云若通餘世界亦不定三僧祇亦指彼經以諸類世界時劫不同故二據佛功德無限量故如寶雲經云善男子菩薩不能思議如來境界如來境界不可思量但為淺近眾生說三僧祇修集所得菩提而實發心以來不可計數先示意次引經證起信亦云為懈慢眾生說無量阿僧祗修為怯弱眾生故說一念成佛是知普機之外皆淺近之器也解云此中不可計數者是不可計數阿僧祇劫非但三也問何故前教定三僧祇此教有定不定耶答前教生故此教熟故方便漸漸勸彼三乘向一乘故作此說也機有生熟是故說不同麤細二教雖異總勸三機向後一乘也若依頓教一切時分皆不可說但一念不生即是佛故一念者即無念也時者即無時也餘可准思皆不可說者地章云頓教者唯有一門所謂無相何以故由成一行三昧故乘彼一味真如所成故不可說有諸異相門一切俱離是名佛也若依圓教一切時分悉皆不定何以故為諸劫相入故相即故該通一切因陀羅等諸世界故仍各隨處或一念或無量劫等不違時法也餘義准之謂諸劫既乃即入不可得而分其定量又乃該通同異類剎事非一准要問云依一乘義成佛時節並皆不定為十方世界時節不同因陀羅世界等並據當分報位說有為諸劫相作及相入等故無定時仍不違時法者所謂或無量劫等也第五修行所依身者所依身有二種一者分段分謂分限段者形段即三界苦果身之與命有定齊限無所改易故名分段唯識論云身命短長隨因緣力有定齊限故名分段即以惑業苦三為體如演義釋二者變易謂改麤為細易短為長改轉不定故名變易故論云由悲願力改轉身命無定齊限故名變易諸乘修行不離二身故就此以明諸教不同分段即煩惱為緣變易以所知為緣若依小乘但有分段身至究竟位佛亦同然是實非化但有下以此教唯斷煩惱究竟位方盡故是實下佛德章云若依小乘實佛報身生在王宮臨菩提樹成佛攝生化用及德皆在其中若依始教中為迴心聲聞亦說分段至究竟位佛身亦爾然此是化非實也引彼就下而說義與小乘同但佛身是化耳若依真進中有二說一為寄顯十地之中功用無功用麤細二位差別相故即說七地以還有分段八地以上有變易然諸教皆有直進迴心凡夫直入菩薩乘謂之直進先入二乘或至無漏然後發心皆曰迴心小乘中亦有直進故要問云仍直進有二種一大乘中直進二小乘中直進菩薩寄於二身顯二位差別非實受二身也以七地已還修隨相有功用行八地已去修無相無功用行欲顯二行麤細異故故說有二身也二就實報即說分段至金剛以還以十地中煩惱障種未永斷故留至金剛故既有惑障何得不受分段之身故十住經云第十地已還有中陰者是此義也實報即業惑等所感身如分段身以惑業苦三為體言惑者謂分別俱生煩惱障發業潤生能為緣故言業者即總別報業正感助感能為因故言苦者即三界九地四蘊五蘊能為果故唯識論云一分段生死謂有漏善不善業由煩惱障緣助勢力所感三界麤異熟果等言變易者即以無漏業所知障欲色二界異熟五蘊為體謂諸聖者由以悲智上求下化念斯分段短促不能長時遠征大劫修行遂以所知障為緣無漏業為因冥資故業故業被資便能熏感識等五支五支種子既被感已生現功能而復殊勝改麤為細易短為長名變易身唯識論云二不思議變易生死謂諸無漏有分別業由所知障緣助勢力所感殊勝細異熟果名變易生死今說行者所依之身故云實報此教既留煩惱至金剛位受分段身以煩惱發業受分段故故十地下引證既有中陰知是分段也亦名中有身問八地以去一切菩薩於煩惱障永伏不行以無漏智果恒相續故如阿羅漢既無現行惑何得更受分段之身耶八地下以於俱生中六七識惑七地已來寄有現行八地已去永伏不起又如未那煩惱寄至七地八地以去唯有所知等故引為問前說分段至金剛位故須問釋答若是凡夫即以現惑潤業受生聖人不爾但留惑種用以受生可知故雜集論云一切聖人皆以隨眠力故結生相續又梁攝論云異凡夫故永伏上心異二乘故留彼種子隨眠即是種子故九煩惱中一隨眠貪二隨眠瞋三隨眠癡第四貪瞋癡等分極重上心惑方是現行也又稠林中十三有二煩惱謂隨眠煩惱上心煩惱故指隨眠為種子也解云聖人受生非現潤彼復留種子如何不受分段身耶若言八地已上以智障為緣受變易者所留惑種即便無用何不於此第八地初永害一切煩惱種耶彼既不爾此云何然聖人下釋成當受分段若言下奪其惑種無用而不斷也彼既下反質而結成本義若約迴向菩提聲聞已斷煩惱者彼即可以所知障受變易身通諸位也已斷煩惱者既無惑障許受變易也三乘中迴心即入十信故通諸位也問若爾何故聖教說八地以上唯所知障為依止故受變易身即下第四仁王中義也答此等為欲寄對二乘顯其優劣故經作此說經作此說為寄對顯優劣耳非實受此身也然此寄對依諸聖教約位不同略辨十門一說羅漢即同於佛更不分位如律中說佛度五人已即云通佛有六羅漢出於世間文同座等當知此約小乘教說出於世間者位當出世間也二亦於佛地分出羅漢如對法論說得菩提時頓斷煩惱障及所知障頓成羅漢及如來故此中雖約煩惱盡邊名阿羅漢而亦為生諸聲聞中心勝欲樂故寄於佛果以分大小也寄斷二障已分大小也而言雖者亦止言斷惑障成阿羅漢而不說彼亦斷智障是亦為生彼心中勝欲樂也三第十地名阿羅漢佛地超過故非彼也如涅槃中說四依云阿羅漢者住第十地此寄因異果以分大小此上二門約始教中迴二乘教說文亦可見此上等者對二乘說故知是迴心教也四七地以還寄同羅漢八地以去寄菩薩位如仁王經云遠行菩薩伏三界習因果業滅住後身中住第七地阿羅漢位此寄因中自在未自在位以分大小也此約始教直進中說此中既寄聲聞至七地故煩惱障及分段身俱至此位八地以去寄此菩薩行位勝前是故唯有彼所知及變易身遠行即七地伏三界習等以此地已還寄滅三界色心煩惱及彼果報又七地已去寄菩薩位細於二乘寄滅色心習氣又俱生第七識惑七地已來寄有現行又末那煩惱寄至七地八地寄滅色心二習無明又八地俱生內六七識惑永伏不起又以六識煩惱寄至四地末那煩惱寄至七地八地已去唯有所知障二障二身以顯二位不同故在直進中也五初二三地寄同世間以得世間四禪等故四地寄是須陀洹等以得道品故此初出世故五地寄此聲聞羅漢以得四諦法故六地寄辟支佛以得十二緣生法故七地以去寄是菩薩以得無生法忍故此如本業經說上來唯約三乘教說以未分出一乘法故前三地修四禪八定寄同世間即人天也四地寄須般洹等三果即出世間也五地已下寄出出世間五地修四諦六地修十二緣生觀七地已去寄菩薩以同得無生忍故通以十地寄三乘說前六寄同凡小後四通寄大乘未分出一乘者融一同大故也六世間二乘同前至六地第七地寄三乘菩薩以未自在故八地以去寄一乘法以得自在故如梁攝論等說此約一乘三乘等分相而說於菩薩位中為顯自在及未自在二位別故七於初地之中已過世間及二乘故如地論等說此約三乘中比證分齊說此約地前比觀登地現證分齊不同故初地過凡小也八地前三賢位已過二乘地如起信論說又如仁王經說習種性中有十種心已超過二乘一切善地此約終教退不退說起信論信成就發心十解菩薩一發心後遠離怯弱畢竟不畏墮二乘地故知超過仁王經行位中已引九信滿心後即過一切小乘三乘等如賢首品說此約一乘說信滿發心即得成佛等十初在凡夫地創發心時即過二乘如智論說羅漢比丘知沙彌發心推在前等此通一乘及三乘說即智論說阿羅漢將沙彌行令持衣鉢道中沙彌思惟當以何乘得入涅槃即發大心師知其念即取衣鉢自將令沙彌前行沙彌思惟佛道甚難且以小乘早入涅槃師復將衣鉢令沙彌後行如是至乎三沙彌問師師具答曰汝發大心吾修小行故令汝前汝今退菩提心汝是凡夫不合居吾前沙彌聞已警悟即住大乘由有如是寄對法門故諸說前後准此而知若依終教地前留惑受分段身於初地中永斷一切煩惱使種亦不分彼分別俱生於所知障中亦斷一分麤品正使是故地上受變易身至金剛位餘義如下斷惑中說地前留惑等並如斷惑中具釋問若於地上不留煩惱云何大悲同事攝生惑障潤生地上既不留惑云何度生答若於地前及始教中願智力劣故留煩惱助願受生今此不爾願智勝故自在同生此教地上願智殊勝自在同生不同地前并初教中故須留惑也問如說八地以還菩薩略有二類一悲增上二智增上悲增者留惑受分段身故智增者伏惑受變易身故此義云何問意可知答如此所說良恐未然何者若悲增上其惠必劣劣惠導悲悲應滯見滯見之悲豈名增上縱悲智齊均尚不名悲增上況以劣惠導悲而言增上若智增上其悲必劣劣悲導智智應滯寂滯寂之智何名增上以諸菩薩從初以來異凡小故悲智相導念念雙修如車二輪如鳥之二翼何得說彼有增減耶既滯見滯寂故非增上唯修智分則墮二乘修住相福則墮凡夫故菩薩發心已來雙修二行豈互增減當知由此始終二教麤細異故有二生死非由悲智互增上也始教麤故地上受分段身終教細故地上受變易身非由互增上也若言彼智增上者有小乘習怖諸煩惱故永伏者若於地前未證真如可約本習容有此類以未純熟故初地以上行解純熟同證同行同修同斷如何得有如是差別故起信論云地上菩薩種性發心修行皆等無差別也若言至永伏者牒問若於下印彼地前機生未證容有此類初地下奪其機熟已證斷無差別起信論云而實菩薩種性根等因等也發心則等行等也所證亦等證等也無有超過之法以一切菩薩皆經三阿僧祇劫時等也故修行斷證皆無差別又此教中地上變易寄位不同有其四種等亦如下指指下斷惑處也地上配四種生死受變易等報若依頓教一切行位既不可說所依身分亦准此知廣如大般若經那伽室利分說那伽室利即文殊所問經也若依圓教不說變易但分段身至於十地離垢定前以至彼位得普見肉眼故知是分段也又如善財等以分段身窮於因位故也此義前科已引既云肉眼知是分段也善財一生非變易問何故此中不說變易答如世界性等以上身分甚極微細出過諸天應同變易但以此教不分生死麤細之相總就過患以為一際至信滿後頓飜彼際故不說也餘准而知之世界性等者等取十重如上引普莊嚴童子等在世界性等上住已得十地此教不分者但以無明邊域為生死邊際總屬過患故不分也然生稠林有二一分段生二變易生分別有二十八門問變易生死是無流轉何故入生稠林攝答變易生死本教興意為顯佛法漸漸深遠將變易死在分段後顯其終教漸漸甚深據理論之變易生死只是分段細相所以知之中陰本立為分段身求生方便故立中陰如十住經說中陰之身乃至涅槃菩提亦有中陰但微細漸深唯佛境界據此文證當知變易生死只是分段細相為其變易問據此生稠林中陰乃證變易漸細至佛境界何以此章初教直進中引七地已還有分段八地已上有變易耶答當知中陰之身位通麤細為分段求生方便故屬分段若以微細漸深唯佛境界則是變易是故變易是分段細相也又云中陰身是其報分其陰大分受經七日為一限於中不定或一日二日三日四日乃至經劫佛亦於中出世教化入涅槃如十住經說又如梁攝論佛二十年中處中陰身又如地論其中陰身亦得造業有其熏習故知中陰有麤細也第六斷惑分齊者初依小乘但標而不釋者諸記皆云此中脫一段今勘高麗本亦但有標不應皆脫今釋有四所以故非脫也一前行位中已有問答釋成小乘異大乘理無疑故不待說也故但標小乘顯五教不同不必釋耳若更備釋前文問答即成元用二師承有據至相尊者亦不說小乘煩惱今章錄彼文義是故不釋三大乘據用義顯煩惱中有二門一異小乘門二同小乘門第二門中煩惱惑品名數與小乘同今說三中二乘惑品即同小乘義雖有異名字是同故不別釋四作者任放辨才如探玄但有標五門而不釋或釋一二如十住中諸門分別梵行無念理觀皆標五門而不開釋等若依三乘有二種義一約位滅惑相二寄惑顯位相若依三乘者中間三教為一三乘教也以二義中皆具始終二教故便行稠林云煩惱行等者略分二義一約位顯煩惱即今寄惑顯位相也此中寄惑品顯位差別彼約十地等斷煩惱麤細以顯諸教有異但寄位顯惑寄惑顯位小有左右耳二據用義顯煩惱即約諸教具明麤細惑品即今約位滅惑相也彼云此之二義約三乘顯約位者但諸教中約十地顯斷麤細分齊者即屬終教攝二但經論中約見修及九地十一地等明斷惑不同及麤細分齊者皆初教所攝若經論中依十地位顯別無明不論麤細者如十一無明及二十二無明皆初教中直進教攝何以故為順十地終心頓斷諸惑故彼文亦以始終二教為三乘也初義者若依始教具足三乘斷惑差別由此是三乘教故障有二種謂煩惱所知若依下由有迴心真進二種人故迴心即是同小乘門直進即是異小乘門迴心直進二種教也是三乘教者問若據此文豈非獨以始教為三乘耶答上云若依三乘有二種義牒釋處云若依始教若依終教豈容便相違耶況釋終教亦先說二乘豈無二乘耶但教漸深細言其不能斷耳豈彼伏惑無觀智乎問答云終教二乘心數亦不可說則有二乘明矣以此教亦有直進迴心當知此前揀小乘後異一乘中間三教為一共教三乘前後章文皆作此說非揀終頓理無疑也下文云前約三乘中聲聞此約愚法豈可云二乘並成佛而無聲聞耶障有下孔目云又依終教煩惱有十六門首列有二無明謂煩惱障所知障又云惑智二障後判云上十六門煩惱義當孰教分亦得通初教中直進教說若在直進教其體即空若在終教說其體即如等先辨二乘斷煩惱障於中有二先障名數後斷惑得果初中煩惱有二謂分別俱生總有十種一貪二嗔三無明四慢五疑六身見七邊見八邪見九見取十戒禁取分別則見道所斷迷理煩惱俱生則修道所斷迷事煩惱一貪下列惑體也於中四種唯分別起謂疑邪見見取戒禁取餘六通二種分別起者疑親於苦諦猶豫不決邪見親於苦諦身撥無因果見取親於苦諦果執劣為勝戒禁取親於苦諦果非因計因是故唯分別起餘六通二五識得起初三亦通分別及俱生由用意識中邪師等三因引故得有分別起也得起初三即貪嗔癡由用下釋分別起因也假三因生方有分別心數云五識由與意識或同體或異體故經云有一意識與五識共緣境故此約三乘始教麤相說也意識具十種四分別六通二以此識具起六位心所有法良以此識是無邊分別一切處分別與五識或一或異故具起十煩惱也末那唯四俱生六中除嗔及邊見以嗔唯不善此識有覆無記故又以一類相續緣第八識剎那剎那執我故無邊見又以後三見及疑藉三因生此識無彼故不起又由恒相續緣故非第六所引不同五識是故唯四唯貪無明慢身見何以除嗔以瞋唯下釋所以此識執我是異生性障覆弊有情令不出離不屬善惡唯無記性此云染污意從過立名與四惑相應故是有覆無記能障聖道隱覆自心說名有覆又於善惡義中不可記別說名無記又以第七名恒審思量常緣第八見分為內自我剎那剎那不斷恒執我故無邊見也唯識章云末那一起相續不癈與我見等四使相應又以後三見謂邪取禁三見也又由下唯識章對治門云末那一起相續緣我不癡不同五待六引也同末那何故唯是俱生答末那不緣於外緣義不緣外故不得起分別我見是故唯俱生中四也其第八識總不起唯是異熟無覆無記性故識總不起者孔目云梨耶是實餘法是假餘法即無由識以外只是遍計即體空故阿賴耶識者謂能攝藏諸法種子故異熟識者先業所生故阿陀那識者謂能數數令生相續持諸根等令不壞故言異熟者心意識云識所變相雖無量種而能變識類別唯三一謂異熟則第八識多異熟性故又云異熟習氣為增上緣感第八識酬引業力恒相續故立異熟名感前六識酬滿業者從異熟起名異熟生不名異熟有間斷故則前異熟及異熟生名異熟果果異因故此中且說我愛執藏持雜染種能變異識名為異熟非謂一切無覆下三性料揀也論云覆謂染法障聖道故又能弊心令不淨故此識非染故名無覆無記此分別俱生皆通三界嗔唯欲界以上二界煩惱皆有覆無記性故上二界煩惱由定力所制故屬無記心數中煩惱隨煩惱通不善及無記者以彼總論三界及定地故彼又云若約違理不善但是不善性其分別起者欲界四諦各有十使即為四十上二界除嗔諦別各有九即有七十二并欲界合有一百一十二也言分別者演義云言惑體者謂能發業之惑即六煩惱収唯識論中十煩惱攝不正見中開五見故貪等六法通分別俱生體雖是一而起時有異論云任運思察而得生故又迷理迷事障見修異故論說因邪師等起者名分別言自邪思惟者計度分別由此虗妄計度而起十分別惑問若爾第七亦應有分別煩惱以有計度分別故答彼非強盛故無分別又有三義無分別惑一是內緣二唯有覆三緣微境第六返此故有十分別瑜伽第一云俱生我執無始時來虗妄熏習由內因力故與身俱有名為俱生七十二即二界除瞋八九成七十二也其俱生者欲界具六上二界除嗔各唯有五合成十六通前分別總有一百二十八也即任運而起障修道迷事煩惱如前已釋問何故前愚法小乘中十使不通迷四諦此中即通耶答此有二義一以三乘中煩惱力漸寬廣故障一切也二又由迷等義通一切境也小乘不通迷者顯宗論云苦下具一切集滅離三見道除於二見上界不行恚除三見者身見邊見戒禁取除二見者身邊二見則不通迷也問答云若依小乘教一惑一障一世一忍一智一斷得一滅依三乘教初教名同前義中深淺異若據三乘終教一惑一障三世一忍一智非初非中後斷得三世滅也據一乘教一惑多障多世一數多數忍多數一數忍一數多數智多數一數智等則知惑品於諸乘中力用有大小寬狹不同迷境亦別也第二斷惑得果者先斷分別有其三人三人三類也一若從具縛入真見道剎那頓斷三界四諦分別煩惱得預流果凡言具縛者具見修煩惱故名具縛入見道時於剎那中頓斷三界分別煩惱證預流果此人入見道斷迷理惑時名初果向出見道後只得初果是故俱舍云具修惑斷一至五向初果此中斷五品修惑一人斷一品則有五人并具縛一人共六人皆入見道名初果向出見道後只得初果今章不同彼爾以此中約分別俱生二惑麤細以分見修二道不同彼中正說果向故小別也下皆類此二若倍離欲人入真見道兼斷倍離欲得一來果言倍離欲者謂凡夫時欲界修惑九品之中伏斷前六故云倍離欲入見道時即永斷前所伏故是以得彼果也此由利根超證之人入見道時匪唯頓斷三界見惑亦斷欲界六品修惑名倍離欲證斯陀含果此云一來謂一來人間一往天上也三若已離欲人入真見道兼斷九品得不還果從具縛凡夫兼能進修欲界九品修惑俱盡證阿那含果此云不還不還來欲界受生也如瑜伽說入見道果者有其三種隨其所應證三果故通指前三類人斷分別惑也但與今章小有不次次斷俱生者第六識俱生九地各有九品意識通迷十使謂分別俱生今斷俱生三界九地各有九品分上中下九九八十一品也又進修道人有其二種一漸出離者斷欲界九品中前六品盡得一來果斷九品盡得不還果斷上二界盡得阿羅漢果謂斷欲界俱生修惑前五品得二果向斷六品盡得二果斷八品修惑得三果向斷九品盡得三果斷上二界七十一品得四果向斷七十二品盡得四果二頓出離者得初果已即頓斷三界漸除九品即得阿羅漢果更無餘果從初果現身頓成羅漢何者以彼欲界九品修惑及上二界總三種九品各初一品一時頓斷故云頓斷三界竪論九品一一別斷故云漸除也謂三界九地修惑纔斷欲界一品上色界無色界各一品同時齊斷故云頓斷後二三品等一一別斷故云漸除地地皆起一無間道斷惑一解脫道證真也若爾何故有漸斷者以於三界法不能頓緣故徵詰所由謂根劣不能頓緣三界故對法論云頓出離者謂入諦現觀已依止未至定發出世道頓斷三界一切煩惱品品別斷唯立二果謂預流果及阿羅漢果乃至廣引指瑞經等如彼說依止未至定者梵語禪那此云靜慮由此寂靜能審慮故即依止未至定起無漏智能斷三界九地八十一品煩惱餘八地即除此未至定外所起無漏道名中間禪謂諸禪定以具支不具支止觀均不均有差別故問若心一境性是靜慮體依何相立初二三四答云初尋伺喜樂後漸離前支謂尋伺喜樂建立為初漸離前支立二三四離伺有喜樂立第二禪若離伺喜唯樂立第三禪若兼離前三種則立第四禪同一境性分為四種已見道所斷分別煩惱進斷修道俱生煩惱遂證四果其末那煩惱行相微細前漸頓二人皆與非想地惑一時頓斷非想地即無色界第四地也其七識恒行無明至佛地方盡故瑜伽云末那相應任運煩惱唯與非想處共斷故一時頓斷非如餘惑漸次而斷故也問何故前愚法二乘無頓出離此中有耶答為顯前劣故此超過愚法二乘無此勝智顯彼教劣方便漸引起彼勝欲令捨小從大故作此說其論末那惑滅小乘無者亦准此知此謂二乘斷煩惱障拆玄云問還許得初果已超二證三否得二果已超三證四否答依大乘亦許此義今依小乘不爾為得初果已欲擬進斷三界修惑時必須依地九品次第而斷斷惑既有次第得果亦然末那此云染污意孔目引攝論云舉六過失證有末那一若無末那即意識與五識相似不成過等若有末那即有六德小乘但有六識即無末那顯彼教劣也其所知障諸趣寂者入無餘時一時皆斷唯此非擇滅也斷所知障故入無餘者揀異前三果有餘涅槃擇滅無餘諸趣寂者一時俱斷所知障故不同俱解脫人分有所斷非擇滅者入無餘時證非擇滅無為也其餘一切有斷不斷惠解脫人不斷俱解脫人分有所斷謂八解脫障不染無知修八勝解所對治故如瑜伽說惠解脫阿羅漢已解脫煩惱障未解脫定障俱分解脫阿羅漢已解脫煩惱障及解脫定障對法論惠解脫補特伽羅者謂已盡諸漏而未具證八解脫定唯斷煩惱障故俱分解脫補特伽羅者謂已斷諸漏及具證解脫定由煩惱障及定障俱得解脫故八解脫即所知障境解脫不染無知無知有二一染污無知能招生死故曰染污於境不了故曰無知二不染污無知不招生死故曰不染污於一切種冥然故曰無知即界內外迷事之惑修八勝解脫者孔目云八解脫亦名背捨解脫者謂一內有色外觀色二內無色外觀色三淨身證解脫處四空處五識處六無所有處七非想非非想處八想受滅身證位初三背煩惱名解脫次四背下地名解脫後一背有緣心名解脫又八解脫者今解不同小乘大乘經意觀色知空無礙成色是此文意初解脫捨染相色第二者捨色心第三者成色無礙第四者捨空心第五者捨取識想第六者去少識想第七者去取定想第八者去成定取捨不自在等又諸解脫由所知障解脫所顯由聲聞及緣覺等於所知障心得解脫故言所知障所知非障是障障所知故障是根本無明能障此理理體非障云心解脫惠解脫正明脫二障也解脫之言是虗語若不指心指惠何法解脫但云煩惱障解脫者未指的顯出所法體今云障心障惠令不解脫然二障約心約境雖分麤細之異二障種子俱至佛地方盡故得二俱互障也當知此始教為引愚法漸向大故安立此教深勝於彼故所知障亦許分斷然上所斷不同愚法以彼唯斷煩惱得故此則不爾斷種子故但揀大小乘異小乘則觀上下八諦苦法智忍等十六心八忍名無間道能斷八諦下迷理惑得此八忍不被惑得之所間隔故名無間謂惑體已不現行雖有惑得而無力用不為障礙八智名八解脫道能證八諦下無為理故謂此八智已離惑得故名解脫大乘即斷二障種子也直進菩薩斷惑者二障俱斷孔目云若經論中依十地位顯別無明不論麤細者皆初教中直進教攝何以故為順十地終心頓斷諸惑故又煩惱障中不同二乘約界分品不同愚法小乘約三界九地別斷見修無明等但於二障分別起者地前伏現行初地真見道時一剎那中頓斷彼種謂地前資粮加行位中雙伏二障分別現行登地證真見道頓斷分別種子故其俱生中煩惱障初地以去自在能斷留故不斷何以故潤生攝化故不墮二乘地故為斷所知障故為得大菩提故如百論判分別我見見道斷俱生我見修道斷今留故不斷用斷所知等故是故攝論云由留惑至惑盡證佛一切智解云惑盡者是所知障盡即由留煩惱障起勝行故得至此位證佛果論云煩惱伏不起如毒呪所害留惑至惑盡證佛一切智孔目云諸菩薩留隨眠惑為助道分不同二乘速般涅槃由此事故修道究竟得習氣滅盡乃證圓智又梁攝論云既云留種子是故當知煩惱障種至金剛位以十地中煩惱障種未永斷故留彼種子用以受生其所知障行相細故正障菩薩道是故地地分斷要至佛地方得總盡地地分斷者初地斷異生性障二地斷邪行障等智障正障菩薩道故至金剛位究竟盡故由此即說二障修惑俱至佛地可知故對法論云又諸菩薩於十地修道位中唯修所知障對治道非斷煩惱障得菩提時頓斷煩惱障及所知障頓成羅漢及如來故菩薩見道位修煩惱障對治為留惑故相隨至金剛定斷今約二障盡處說也其末那俱生行相細故亦同前至佛地盡也然末那即與我見我慢我愛無明四使相應同至佛地方盡也問其二障修惑諸識相應地上現行有何同異諸識者六七識相應地上同異如何答其煩惱障內第六識惑既盡故留彼是故現種皆以智御用成勝行不起過患猶如毒虵以呪力御不令死無起過患而成餘用菩薩善巧留惑亦爾論云諸惑已滅伏如毒呪所害釋云此偈明第十一滅惑其深諸惑謂見修煩惱於菩薩地中先已滅盡餘心煩惱雖復未滅由念智所伏廢其功用譬如眾毒呪力所害無復本能心惑亦爾智念所守不能復生二惑染污故攝論云如毒呪所害等是故當知於彼煩惱或現或種皆得自在論云由惑至惑盡證佛一切智若不留此隨眠欲則同二乘涅槃若不除上心欲則與凡夫不異其第七識煩惱性非潤生故非所留行相細故七地已還有時暫現以觀智有間故初見道位即滅末那何以故障見無我理故無性攝論云轉染污末那得平等性智其所知障皆後地起或於前地起或現或種以地地分斷故如十地所斷之障在九地斷乃至初地障在地前除問若爾何故有處說七地已還起有漏心等耶既云地地分斷何故下難相違答若約第六識中煩惱障為有漏者彼既留惑故即似有漏若約所知障為漏即實有漏此二通十地六識煩惱及所知障此二通十地但有似實之異俱至十地盡也若末那煩惱即實有漏至於七地有無不定以有時暫起有漏心故餘義准知七地容有暫起觀智劣故八地無功用道任運不起又此教中惑滅智起分齊者惑種在滅相時智即在生相同時相返如昂即低低即昂等廣如對法論說論約四相前後問無間道正斷惑時為智先起惑後滅耶為惑先滅智後起耶為同時耶此三惑智各有兩失不成斷義謂智先起有自成無漏過不因惑滅故不能滅惑過智起惑猶在故惑有自滅過前念智起而惑猶在故後滅時是自滅也不障聖道過令智先起故智後及同時皆具此四過還於智上惑上各說二過過名同前義則順於智後及同時而說以意可知相兼總成十二過也若爾云何斷耶唯識云二真見道現在前時彼二障種必不成就二真即二乘真及菩薩真故云二真猶明與闇定不俱生如秤兩頭低昂時乖諸相違法理必應然是故二性無俱成失此但舉法相一邊亦不違餘緣集斷義有本作押即笻笻即押等悞矣又此障法以依識無性故即空無分別是其障義如維摩經云五受陰洞達空無所起是苦義今此障義亦准彼知之以始教空宗顯識等空故楞伽云心如工伎兒意如和伎者五識如伴侶妄想觀伎眾據此經文雖知是識由不免戲論引迦旃延章證今障義苦性即空是真苦義始教之終門也若依終教諸聲聞於煩惱障尚不能斷但能折伏何況能斷所知障大乘終教深細而說不許出界但伏煩惱現行未除種子況斷所知耶故彌勒所問經論云一切聲聞辟支佛人不能如實修四無量不能究竟斷諸煩惱但能折伏一切煩惱等楞伽經文亦如上說謂二乘行果非真不如實修行不真也不究竟斷果不真也楞伽云味著三昧樂安住無漏界譬如昏醉人酒消然後覺言諸二乘得涅槃者非究竟也問此說何故與前教不同耶以始教有宗說彼愚法出界總斷煩惱分斷所知今實教尚未斷煩惱況斷所知耶二教不同故興問也答彼為引二乘故未深說故是故以上就下說煩惱障同彼二乘至佛地智方盡又以下同上亦許二乘全斷惑障分斷所知障今此就實以愚法二乘無廣大心故不究竟斷煩惱障始教菩薩亦說煩惱須十地終心頓斷又許聲聞全斷惑障等今此就實深細而說並不名究竟出三界斷煩惱有謂終教不見有二乘斷惑行相然教有麤細則前機麤故須似小此教深勝不假似彼法華火宅喻三車引諸子豈非實教三乘行相耶又亦可前約三乘中聲聞此中約愚法故不同也以前二教俱約愚法說今此二教以始教約三中二乘此終教約愚法二乘若終教約三乘說聲聞者亦如諸論若始教約愚法義同法華則二教互出也其菩薩人於二障中不分俱生及分別但有正使及習氣地前伏使現初地斷使種地上除習氣佛地究竟清淨言使者如世公使隨遂其人得使繫縛故云使也此通二障言習氣者熏習氣分孔目云大分有二一種子熏習二上心熏習然彼地前三賢位中初不墮二乘地中於煩惱障自在能斷留故不斷為除所知障等故地前雖伏正使現行留彼種子故不墮二乘地也是故梁攝論云十解以去得出世淨心又云十解心以上名聖人不墮二乘地故仁王經云地前得人空而不取證等又起信論見少分得法身作八相等皆此義也可知以此菩薩唯怖智障故修唯識真如等觀伏斷彼障然於煩惱障非但不怖不修對治亦乃故留助成勝行初地以上斷於所知障一分麤故於煩惱障不復更留是故二障不分見修智障障成菩提修唯識真如等觀對治唯識觀事真如觀理然於煩惱留故為成勝用至初地時正使俱盡二障正使初地俱盡習氣地地漸次微薄至金剛際究竟方盡故彌勒所問經論云問曰若聲聞人先斷見道所斷煩惱然後漸斷修道煩惱何故菩薩不同聲聞答曰菩薩之人無量世來為諸眾生作利益事後見真如甘露法界觀彼一切諸眾生身而實不異我所求處是故菩薩見修道中一切煩惱能障利益眾生行故即見道中一切俱斷此文為證問終教自言正使習氣何以引見修等惑為證耶答但二教惑障名字雖異而惑體是同故得為證孔目使行稠林云如是等文並屬初教攝今釋終教何以引此下文云義當熟教分亦得通初教中直進教說其末那煩惱亦初地斷麤後除殘習故無性攝論云轉染末那得平等性智初現觀時先已證得修道位中轉復清淨解云轉淨者除習氣也以正使先斷故後但云轉淨更不云斷也無性下見道初觀智現前先以證得修道位中為除習氣解云下知若云此是入真見道時暫不起非正斷者即不得言轉復清淨以總未斷何名轉淨若依始教容如彼說縱云見道伏惑非正斷者奪云不得言清淨以總未斷故若依前教容許此義是故當知此教地上但除習氣故寶性論云不淨者一切凡夫有煩惱障故有垢者以諸聲聞辟支佛等有智障故有黠者以諸菩薩摩訶薩等依彼二種習氣障故解云論釋云地上名摩訶薩故知但有習氣障也寶性論云不淨者以諸凡夫有惑障故有垢者以諸聲聞辟支佛等有智障故有點者污也以諸菩薩有二障習氣故今章云黠者恐刀筆之悞也此中習氣從斷正使種子無間方有習氣何以故未斷以前無微薄故種斷無間方有微薄故論說名無間生習氣地前斷彼使種麤重地上方除習氣孔目云習氣有三種一名言熏習識熏習二色識熏習識識熏習見識熏習三煩惱熏習業熏習果報熏習此等熏習皆通染淨及無記問云何地上煩惱使盡而得不墮二乘地耶始教留惑故不墮今終教煩惱種盡何不墮耶答智力勝故智障正使亦已斷除故今實教出二所以故不墮也如始教小乘頓出離人斷欲界惑六品盡時上二界六品亦同斷盡故猶尚不得彼一來果今舉三中小乘為例拆玄云大乘中二乘有頓出離小乘則無見道斷分別八十八使進斷俱生六品修惑猶不證二果況此菩薩道力殊勝又況已斷智障使故若地前及始教容有彼失此中無也此中菩薩雙斷二障故不墮二乘地也又此教中正斷惑時智起惑滅非初非中後前中後取故云何滅如虗空本來清淨如是滅廣如十地論說十地品云非初非中後者探玄釋此文有二門一約相翻門二約相續門謂此地智生滅相續前中後三何時定能斷煩惱耶唯前不能斷以落謝故唯後不能斷以未起故中亦不能斷以不住故是故三時皆無斷義若爾云何斷論云如燈焰非唯初中後前中後取故此即唯中等不可有斷前中後相續取可有斷義問既三時單取各不成斷縱此和合豈成斷耶如一沙無油多沙亦無云何斷約罪性空故本淨故謂此實教斷惑必性相雙明也又此教中煩惱等法皆是真如隨緣所作是故不異真如是煩惱義如起信論說又經云一切法即如如等煩惱准此是故當知與前諸教施設不同宜應知之煩惱即真如者若始教諸業即空不可分別若終教即如一切法亦如也第二明寄惑顯位者謂聖教說略有一十八門寄惑顯位即孔目約位顯煩惱以諸教具明麤細惑品略列十八廣如使行稠林說一寄二障以顯二位謂分惑智二障以顯此證二位故梁攝論云地前漸除煩惱障地上漸除智障又云十解以去得出世淨心又云地前雖得人無我以法無我未淨故人無我亦不清淨又云其人我執前十解中已除今唯滅法我執又仁王經云習種性已入生空位得聖人性故本業經起信論亦同此說若實教中斷惑必性相雙明今以地前比智除惑障地上證智除智障則知寄顯非實斷也所引經論證成信位前得世間心三賢得出世間心地上得出出世心仁王習種性三賢位得人無我性種性地上得法無我故二寄皮等三惑顯三僧祇故梁攝論云初僧祇斷皮煩惱第二僧祇斷肉煩惱第三僧祇斷心煩惱寄皮等者孔目云俱生惑修道斷者此將煩惱寄顯見修如皮肉心三煩惱初僧祇斷皮二僧祇斷肉等其義例同三以此三惑寄顯地地三心不同如梁攝論三十三僧祇中說地地之中入心除皮住心除完出心除心等言三十三僧祇者地前方便自有三僧祇十地有三十僧祇論云於地地各三僧祇謂入住出論釋云謂除皮煩惱障入初地為除肉煩惱障住初地為除心煩惱障出初地等四以二障麤細寄顯三位如地持云二障三處通謂地前地上及佛地地持以煩惱所知麤細寄三位斷二障麤惑地前起正障地上故於入地時斷二障細惑七地已還起正障八地已上故入八地時斷二障極細惑佛地已還起正障佛地入佛地時斷寄顯三位五以染心麤細寄於三位以顯三身如金光明經說依諸伏道起事心盡得顯化身依法斷道依根本心盡得顯應身依勝拔道根本心盡得顯法身合部金光明經諸凡夫人未能拔除於三心故遠離三身不能至故何者為三一起事心二依根本心即末那緣阿賴耶故三根本心即第八識心以六七八識寄於三位以顯三身有人解云伏道此是地前起事心是第六識法斷道是地上依根本心是末那以依緣賴耶識本心故勝拔道是金剛位根本心是賴耶識伏道斷地前第六識分別一切事心故法斷道地上證迷理惑斷諸煩惱故勝拔道除微細惑盡故六寄於三障直顯三身故彼經云煩惱障清淨能現應身業障清淨能顯化身智障清淨能顯法身彼經即前金光明經云是法身者煩惱清淨故能現應身者業障清淨故能現化身者智障清淨故譬如依空出電依電出光等與章不同七以迷三性所起煩惱寄顯三身故彼經云一切凡夫為三相故有縛有障遠離三身不至三身何者為三一者思惟分別相二者依他起相三者成就相如是三相不能解故不能滅故不能淨故是故不得至三身如是三相能解能滅能淨是故諸佛至於三身解云能解者是所執性俱應知解故能滅者染分依他起性應斷滅故能淨者在纏真如修令淨故言三無性者唯識云即依此三性立彼三無性初即相無性次無自然性後由遠離前所執我法性彼經亦即金光明經清涼釋云謂依徧計所執性立相無自性性由彼體相畢竟非有猶如空花繩上蛇故依他起性立生無自性性此如幻事托眾緣生無始妄執自然性故依圓成實性立勝義無自性性謂即勝義由遠離前徧計所執我法性故今迷此三無性故起諸煩惱不至三身反此能至也解云下破徧計性故依他有二一淨分同圓成二染分同徧計能滅染分依他故顯出圓成實性故八寄四障以顯四位此有二義此有二義者謂正使習氣地前地上二義不同故一約正使寄顯地前四位四行四因四報何者為四一謂以闡提不信障使滅已翻顯十信之位成信樂大乘行為淨德因及鐵輪王報二以外道執我寄以顯十解位成般若行為我德因銅輪王報三聲聞畏苦障寄顯十行位成破虗空定器三昧行為樂德因銀輪王報四獨覺捨大悲障寄顯十迴向位成大悲行為常德因金輪王報二障正使地前四位等何者徵一謂下別釋四障等清涼云梁攝論佛性論皆云地前修四種行謂十信修信樂大乘行十解修般若十行修三昧行十迴向修大悲行如其次第即是四位又為除四類障正使故即此四位謂初除闡提不信障二除外道我執障三除聲聞畏苦障四除獨覺捨大悲障又信成淨德因種解成我德因種行成樂德因種迴向成常德因種又仁王經寄四輪王謂鐵銅銀金四報故知十信亦成位也若終教十信但是十住方便自無別位前九門約終教者就多分說又翻前四障所得四行即為佛子四義翻初障成信樂大乘種子為因即如父也二般若為緣即如母也三顯虗空定離小乘執令法身堅固如胎也四大悲益生如乳母具四緣故得從地前生在初地以上諸佛家故名佛子也地前翻破四障成四種行得入初地生如來家紹隆佛種名為佛子又此四種和合如車輪能運能轉至解脫處如聖王輪備有四事謂轂輞輻軸如其次第四義應知言聖輪者一住如法國土二依善知識三調伏自身四宿植善根如聖王輪備有四物所謂轂輞輻軸若無此四輪則不成第二以四障習氣寄顯地上四位四定四德四報一初二三地滅闡提不信習即顯此一位相同世間又得大乘光明三昧成於淨德除同緣生死變易報二四五六地滅外道我執習顯此一位相同二乘得集福德王三昧成於我德除方便生死三七八九地滅聲聞畏苦習顯此一位相同大乘得賢護三昧成於樂德除有有生死四十地至佛地已還滅獨覺捨大悲習顯此一位因圓果滿得首楞嚴三昧成於常德無有生死四德圓故生死永盡故云無有也此上義廣如無上依經本業經佛性論寶性論梁攝論等說清涼引佛性第二略示名相一方便生死謂生死緣即無明住地惑能生新無漏業譬如界內無明生行以惑生智非同類故名為方便二因緣生死謂生死因即上無明所生無漏有分別業譬如無明所生行業但感同類故名因緣三有有生死即由前因緣感得變易異熟有果如三界內以有漏業感六趣身言有有者未來生有更有一生故如上流般阿那含第二生般涅槃故亦云有此有果故名有有四無有生死即改變易脫譬如生為緣有老死等過患一期報謝更無有有故名無有章先舉因緣生死者恐刀筆悞初二三地唯識云一大乘光明定謂此能發照了大乘教理行果智光明故梁論云此定能破一闡提習氣即是方便生死障於大淨二四五六地唯識云集福王定梁論云能破外道我見習氣即是因緣生死障於大我三七八九地唯識云賢守定梁論云能破聲聞怖畏習氣即是有有生死障於大樂四十地唯識名健行定梁論云此定是十地菩薩及佛所行能破獨覺自受習氣即是無有生死障於大常又此四中初二通二障後二唯智障正使地前除習氣地上淨此文亦成證也此四障寄顯四位初二通煩惱所知後二獨所知障指上經論為證也九於十地中為別相故三地終心已來斷二障修惑正使皆盡四地以去但有微習何以故前三地相同世間四地以去是出世故以十地寄別地相初三地已還斷見修麤惑故四地已去除修道微細習氣前三地寄三界相同世間四地已去寄聲聞義同出世間是故十地經三地末文云一切欲縛轉復微薄一切色縛轉復微薄一切有縛轉復微薄一切無明縛轉復微薄諸見縛者先已除斷地論釋云一切欲縛轉復微薄等者斷一切修道欲色無色所有煩惱及彼因同無明習氣皆悉微薄遠離故諸見縛者於初地見道已斷故先引經後示論解云及彼因者煩惱障種子也無明習氣者所知障種子也以二障種子同時遠離故云同也是故當知二障修惑正使種子此地皆盡上來多分約終教說清涼云謂煩惱障三縛現行及種故云彼因與當地所知障種同滅今云同時遠離也上如下通結九門十又於十地別相中寄顯世間二乘菩薩三位別故仁王經說前之三地斷三界中色煩惱四五六地斷三界中心煩惱七八九地斷三界中色習煩惱第十地及佛地斷三界中心習煩惱寄顯世出世出出世三位別故仁王信忍菩薩於歡喜地垢地發光地能斷三障色煩惱縛順忍菩薩於焰惠地難勝地現前地能斷三障心煩惱縛無生忍菩薩於遠行地不動地善惠地能斷三障色心習氣十地至佛地斷三障心習無明解云以三地終位得上界定極至四空定離下地色故云斷色惑也以四地以去得二乘無漏出世間位於世間色心俱盡也七地已去是菩薩位漸細於前故寄滅於色心習氣以顯彼位也仁王經分四位今章寄顯三位色心合說十一於此菩薩位中為顯自在及未自在二位別故七地已還寄滅三界色心煩惱及彼果報八地以去寄滅色心二習無明故本業經云七地以還滅三界色心二習果報滅無遺餘八地色習無明盡九地心習無明已滅除十地二習無明滅盡於此七地已還未自在故八地已去顯自在故或名煩惱或名習氣或名無明皆惑業總名經論互舉十二依三無性論寄滅二性以顯見修二位差別故彼論云由見道故分別性即無故言不得由修道依他性即滅故言不見二性即徧計依他二皆無性故云不得不見十三依雜集論等以分別俱生二種煩惱寄顯見修二位差別以分別惑寄顯見道位斷俱生惑寄修道位斷煩惱麤細二位別故何以得知但是寄位非實斷者如分別我見籍三緣生謂邪師邪教及邪思惟妄計即蘊離蘊等我如佛弟子雖居凡位然依正師正教正思惟故非直不起即蘊等執亦乃願樂於無我性此人豈斷已入見道耶若言雖無現行然有種故非入見者既無現行則應入資糧加行以前約位滅惑中始教分別俱生正約實斷今何云寄如分別下先立難顯寄所以如佛下正設難若言下縱救奪破義既不爾是故當知為顯見道無我理故寄彼橫計顛倒麤惑返以顯之又以任運所起煩惱細難斷故翻顯修位漸增差別如實義者但一煩惱有麤有細見位斷麤修位斷細以始教約分別俱生見修二位斷者乃機麤教淺且約見道斷分別惑修道斷俱生惑麤細以顯差別然煩惱所知至究竟位餘殘習氣方盡故知寄對以立其名非實斷也如末那煩惱通二位斷之如無相論云第二執識及相應法至羅蓮位究竟滅盡若見諦肉煩惱識及心法得出世道十六心時畢竟斷滅餘殘未盡但屬思惟是名第二識無性攝論亦同此說如上所引故得知也末那煩惱通見修二位斷之孔目云若說滅時初見道位即滅末那何以故障見無我理故故無性攝論云轉染污末那故得平等性智初現觀時先已證得於修道位轉復清淨轉清淨者即滅習氣無相下第二執識者即末那識第一識者即阿賴耶相應法者孔目云末那一起相續不廢與我見我慢我愛無明四使相應八忍八智前十五心唯斷煩惱惑得十六心斷煩惱微細種子俱盡引無性攝論例同無相論說十四於分別惑所籍三緣寄顯地前三賢位別謂十解等除邪師等如次應知此約直進說又以邪師邪教所起寄資糧位伏以行相麤故邪思惟所起寄加行位伏以行相細故此約迴心二乘說地前不立十信成位以信但是行非位故不開四加行者異小乘故約直進說地前開資粮加行為七方便者同小乘故約迴心說十五於俱生內六七識惑七地已來寄有現行八地以去永伏不起此為寄顯入觀有間無間位異故作此說七地已還觀心有間容有現行八地已去觀心無間永伏不起故分二位十六又以六識煩惱寄至四地末那煩惱寄至七地八地已去唯有所知障此亦為顯世間二乘菩薩故作此說也六識煩惱寄四地斷相同世間末那煩惱寄七地斷同彼二乘八地已去寄菩薩位斷所知故十七為顯十地至佛地各差別故以十一無明返寄顯之二位別故寄惑返顯位相差別也十八為顯地地真俗二智故以二十二無明寄以顯之如深密經云由此二十二種愚癡品及十一麤重安立諸地故既云安立故知寄顯也此諸義廣如瑜伽對法唯識攝論等說上來多分約始教說地地皆用根本智證真後得智達俗解深密經有二十二種愚十一種麤重一極喜地斷異生障破執著我法愚惡趣雜染愚二離垢地斷邪行障破微細悞犯愚種種惡趣愚三發光地斷闇鈍障破欲貪愚聞持愚四焰惠地斷現行煩惱障破等至愛愚法愛愚五難勝地斷下乘般涅槃障破乘背生死愚趣向涅槃愚六現行地斷麤相障破觀察流轉愚無相現行愚七遠行地斷細相現行障破流轉生死愚生滅愚八不動地斷無相加行障破加行愚自在愚九善惠地斷利他不欲行障破義詞總持愚辨才自在愚十法雲地斷未得自在障破大神通愚悟入微細愚十一斷如來地第一障破所知著愚微細礙愚此諸下總指前九門廣如諸論上來下結後九門已上諸門並是阿含門寄惑返顯位相差別何以故為護十地故為令眾生於十地中離慢執故位相甚深極難了知寄惑顯位生淨信故餘義准思可見孔目云如此等法差別相者為護十地故隨方便門作種種說令諸眾生於十地中離增上慢寄惑顯位令眾生於此十地生敬信故若依頓教一切煩惱本來自離不可說斷及與不斷如法界體性經云佛告文殊師利云何教諸善男子發菩提心文殊言我發我見心何以故我見際即是菩提故此文證准知引法界體性經證一切煩惱體性自離經云佛告文殊汝云何男子等說法文殊言我於彼諸男子所教發我見即是為其說法與無差別疏引同與今文少異若依圓教一切煩惱不可說其體性但約其用即甚深廣大以所障法一即一切具足主伴等故彼能障惑亦如是也是故不分使習種現但如法界一得一切得故是故煩惱亦一斷一切斷也故普賢品明一障一切障小相品明一斷一切斷者是此義也孔目云若約滅惑分齊論者依普賢品說一障一切障依小相品說斷惑分齊一斷一切斷由彼華嚴經文云內外各有五百煩惱及八萬四千煩惱普滅非別故得知也又此斷惑分齊准上下經文有四種一約證謂十地中斷二約位謂十住已去斷三約行謂十信終心斷四約實謂無可斷以本來清淨故廣如經說約證當知即順十地終心頓斷惑義約位同三乘終教在三賢位斷約行在十信終心自分已還使習俱斷約實無可斷自體淨故又前三乘等諸門斷惑若一障一切障一斷一切斷即入此教若隨門前後是三乘等此約別教言諸門斷惑要問云普賢品內據普賢法極深廣大又云若依小乘論使纏垢乃至兼在終教等已上諸惑一惑一切障一斷一切斷此屬一乘教若隨下揀前此約下結屬若約攝方便前諸教所明並入此中以是此方便及所流所目故餘義准之斷惑門竟攝前諸教即全收諸教宗同教緣起義清涼曰圓必攝四孔目云若橫依方便進趣法門即有二義通說一乘與彼究竟圓一乘為方便故故說一乘非即圓通自在義也斷惑分齊竟
