body:
  text: 玉峯沙門師會述第九明諸教所詮差別者略舉十門義差別故顯彼能詮差別非一餘如別說言諸教者即五類能詮教也所詮者即理行果三是所詮所目義也差別者所詮義中各有五門不如甚深緣起一心具五義門由此得知彼能詮法五類不同故云顯彼非一吾祖曰此就義分非約時事十門初二是理後三是果中間是行上文云若約法義如下別辨即指此也上是能詮之法此是法下之義持此之義分彼之法簡而真矣一所依心識二明佛種性三行位分齊四修行時分五修行依身六斷惑分齊七二乘迴心八佛果義相九攝化境界十佛身開合第一心識差別者心意識為諸法依諸教詮此分齊差別也如小乘但有六識義分心意識如小乘論說於阿賴耶識但得其名如增一經說言但有六識無七八也義分下演義云小乘謂未來名心過去名意現在名識等種種分別然無別體彼為約此三世不同義說心意識名體即第六小論即毗曇俱舍也賴耶下但得第八之名無別自體謂小乘但是第六入三世故指增一阿含經也若依始教於阿賴耶識但得一分生滅之義以於真理未能融通但說凝然不作諸法謂相中辨成就義也世諦因緣無性故成第一義諦本來不作故不成緣成故非不成緣成故非是成一切識門皆如是也起信疏云以始教相宗不知佛說如來藏以為阿賴耶故云但得一分彼以業相為賴耶自證分轉相為見分現相為相分即唯識宗齊此業相為諸法生起之本此但生滅之業以於下論疏又云以彼宗未明識等與真如同以一心為源故說真如無知無覺凝然不變不許隨緣但與八識為諸法本故真理不作諸法也故就緣起生滅事中建立賴耶從業等種辨體而生異熟報識為諸法依唯識第四云諸心心所皆有三依一因緣依謂自種子諸有為法皆託此依離自因緣必不生故二增上依謂內六處諸心心所皆託此依離俱有根必不轉故三等無間依謂緣前滅識諸心心所皆託此依離開導根必不起故釋曰根識同時名俱有也前滅識等猶能開闢導引後生名開導也然此三依言生轉起別相云何生約依種辨體而生轉約隨順與力令轉起約由前開路令後得起又云業無識種不親辨體識無業種不招苦樂既有依托故云從業等生業即有支習氣等等取我執名言二習氣也生死相續由諸習氣然諸習氣總有三種一名言習氣二我執習氣三有支習氣名言習氣者謂有為法各別親種名言有二一表義名言即能詮義音聲差別二顯境名言即能了境心心所法隨二名言所熏成種作有為法各別因緣二我執習氣者謂虗妄執我我所種我執有二一俱生我執即修所斷我我所執二分別我執即見所斷我我所執隨二我執所熏成種令有情等自他差別三有支習氣謂招三界異熟業種有支有二一有漏善即是能招可愛果業二諸不善即是能招非愛果業隨二有支所熏成種令異熟果善惡趣別故論頌云由諸業習氣二取習氣俱前異熟既盡復生餘異熟此能引業即諸業習氣若無業種不招苦樂如種無田終不生芽故此名言由業引起方受當來異熟之果異熟等者孔目云所熏一切種子阿賴耶識亦名異熟識亦名阿陀那識以能積集諸習氣故習氣者謂由現行薀等令彼種子皆得增益一切種子識者謂能生蘊等諸法種子所積集故阿賴耶識者謂能攝藏諸法種子故又諸有情取為我故異熟識者先業所生故為諸法依者以賴耶是根本依故諸識通依不唯七識心所等法皆依此故故云諸法依也方便漸漸引向真理故說薰等悉皆即空如解深密經云若菩薩於內於外不見藏性不見薰習不見阿賴耶不見阿賴耶識不見阿陀那不見阿陀那識若能如是知者是名菩薩如來齊此建立一切心意識秘密善巧瑜伽中亦同此說方便等者孔目曰理體辨成就又云當知阿賴耶識欲成就者會須通如來藏始可得成堅實依止若但取其生滅相識即同七法不住非究竟依也彼就究竟歸如來藏此約初教故云漸漸引向真理乃至但云悉皆即空如解下若菩薩者梁攝論云由此心識微細境界所攝故不為聲聞二乘說為諸菩薩說應有勝位為得一切智故佛為說何以故若離此智得無上菩提者無有是處若菩薩於內外各別不見阿陀那阿陀那識阿賴耶阿賴耶識者此皆藏識之別名重言阿賴耶阿賴耶識約能所藏義阿陀那阿陀那識謂能數數令生相續持諸根等令不壞故又能積集一切法習氣故清涼云阿賴那此云藏識能藏一切雜染品法令不失故我見愛等執藏以為自內我故此名唯在異生有學阿陀那此云執持執持種子及色根故此名通一切位此二即心之別名論主意明心含染淨雙舉二名釋一心義其義云何若有我執則成阿賴若我執亡則捨賴耶名唯阿陀那持無漏種則妄心斯滅真心顯現故偈云心若滅者生死盡即妄滅也非心體滅而言菩薩菩薩者揀非聲聞菩薩緣覺菩薩如來下如來不齊法住智建立心意識也瑜伽云如是菩薩離由法住智為依止為建立於心意識秘密善巧然諸如來不齊於此施設心意識等廣如唯識章具出解云既齊此不見等處為立心意等善巧故是故所立賴耶生滅等相皆是密意不令如言而取故會歸真也是故下即前相成就從業等生滅相也皆是下孔目曰但於生死之中辨因果相生道理並是轉理門無真實理故云會歸真理明即空也始教有二門相成就當於始門理成就義當終門若依終教於此賴耶識得理事融通二分義若依等者以此教中說如來藏不守自性隨緣成阿賴耶或名阿梨耶但梵音楚夏耳阿賴耶而與無明七識共俱如大海波常無斷絕等勝鬘云不染而染染而不染等稜伽云以七識染法為生滅以如來藏淨法為不生滅此二和合為阿梨耶識故得理事融通也故論但云不生不滅與生滅和合非一非異名阿梨耶識不生滅者如來藏自性清淨心動作生滅不相離故故云和合非一非異者真如全體動故心與生滅非異而恒不變真性故與生滅不一此生滅不生滅即之義不一離之心不異目此二義不二之心名阿賴耶識以許真如隨薰和合成此本識不同前教業等種生孔目云隨熏梨耶具四德方堪受熏一堅謂理實故堅二無記義方得受熏何以故無記者即是無分別義如來藏中方有此法三可熏者唯如來藏不守自性隨諸法緣起成似義故是可熏四與能熏相應者唯如來藏有應諸法義餘法即無何以故以不守自性故然能熏亦有四義一者淨法名真如二者一切染因名為無明三者妄心名為業識四者妄境界所謂六塵熏習義者如世間衣服實無於香若人以香而熏習故則有香氣真如淨法實無於染但以無明而熏習故則有染相等清涼云今法性宗亦七識等而為能熏八識為所熏其第八識中以如來藏隨緣成立含有生滅不生滅義故熏第八即熏真如相宗所熏四義一堅住性若法始終一類相續能持習氣乃是所熏二無記性若法平等無所違逆能受習氣乃是所熏三可熏性若法自在性非堅密能容習氣乃是所熏四與能熏共和合性若與能熏同時同處不即不離乃是所熏能熏亦有四義一有生滅二有勝用三有增減四與所熏和合而轉但彼相宗賴耶唯是生滅是故所熏第三能熏第一正揀無為非能所熏即不熏如來藏遂成兩宗不同備如問明鈔不同下揀前生滅識也故楞伽云如來藏為無始惡習所薰名為識藏又云如來藏受苦樂與因俱若生若滅又云如來藏名阿賴耶識而與無明七識俱又起信云自性清淨心因無明風動成染心等如是非一如來藏即所薰也惡習能熏七轉識也藏識第八異名密嚴經云佛說如來藏以為阿賴耶惡慧不能知藏識海常住藏即賴耶識此明守權拒實訶為惡慧又云如來清淨藏世間阿賴耶如金與指環展轉無差別無明住地與七識俱如海浪生常生不斷起信論云如是眾生自性清淨心因無明風動心與無明俱無形相不相捨離其文非一也問真如既言常法云何得說隨薰起滅既許起滅如何復說為凝然常唯識論釋真如云真謂真實揀非虗妄如謂如常表無變易前說常法云何起滅又若起滅何謂凝然常耶動靜相違故須問釋答既言真如常固非如言所謂常也何者聖說真如為凝然者此是隨緣作諸法時不失自體故說為常是則不異無常之常名不思議常非謂不作諸法如情所謂之凝然也經論說真如常非彼世間如言所對之常何者徵聖教所說真如為凝然者是隨緣作生滅時不失自性如水作波時不失濕性故說為常由不變故始能隨緣由隨緣故方能不變何者若變自體將何隨緣如無濕性將何隨緣如無濕性將何隨風而成波浪即由此義說真如隨緣若不隨緣體即不變緣中既無何成不變故勝鬘中云不染而染者明隨緣作諸法也染而不染者明隨緣時不失自性由初義故俗諦得成由後義故真諦復立如是真俗但有二義無有二體相融無礙離諸情執是故論云智障極盲闇謂真俗別執此之謂也不染下上即不變隨緣下即隨緣不變由隨緣故俗諦得成由不變故真諦復立然此二義竟無二體但是一法故說相融未破所知別執真俗是盲闇也此真如二義同前始教中約法相差別門故但說一分凝然義也此終教中約體相鎔融門故說二分不二之義此義廣如起信義記中說同字當作內字此真如隨緣不變二義內前始教就法相差別門但說不變一分之義此終教深細故就體之與相鎔通二分無二之義起信義記即古疏也又如十地經云三界虗妄唯一心作攝論等約始教義釋為賴耶識等也十地論約終教釋為第一義真心也又如達摩經頌攝論等釋曰此界等者界謂因義即種子識如是等實性論約終教釋云此性者即如來藏性依此有諸趣等者如勝鬘經說依如來藏有生死依如來藏有涅槃等乃至廣說十地經下經通也攝論下清涼云二異熟賴耶名為一心揀無外境故說一心此約始教義十地論下論異也清涼云三如來藏性清淨一心理無二體故說一心此約終教義前說由熏習力變現三界依正等報後說舉體隨緣成辨之事探玄大疏經文廣說十門以顯一心恐繁不錄又如下演義云此通指大乘經為對法經耳經頌云無始時來界為一切法等依由此有諸趣及涅槃證得攝論下等取瑜伽雜集彼論釋云無始者初際無故界者因義即種子也是識因種謂一切法此唯雜染非是清淨彼一切法等所依者能任持故非因性義所依能依性各異故第三論云此中聞熏習為是阿賴耶識自性等論答云此聞熏習隨在一種所依轉處寄在異熟識中與彼和合俱轉猶如水乳然非阿賴耶自性是彼賴耶對治無分別智種子性故明知賴耶但是生滅非真性成故云界是因義等實性下即法性宗論第四論云無始時來性作諸法依止依性有諸道及證涅槃果無始時來性者如經說言諸佛如來依如來藏說諸眾生無始本際不可得知故所言性者如聖者勝鬘經言世尊如來說諸如來藏者是法界藏出世間法身藏出世間上上藏自性清淨法身藏自性清淨如來藏故作諸法依止者如勝鬘云是故如來藏是依是持是住持是建立等論云依性有諸道者經云世尊生死者依如來藏世尊有如來藏故說生死是名善說及證涅槃果者經云依如來藏故有生死依如來藏故證涅槃故云界者性義等是故當知二門別也二門別者始終二門也若依頓教即一切法唯一真心差別相盡離言絕慮不可說也即二祖攝相歸性以顯一心以八識皆無自體唯是如來藏平等顯現餘相皆盡故云一切等也不可說者論云一切虗妄如石女兒用炎水浴被龜毛衣著兔角屣戴空華冠入乾闥婆城共幻化女戲義言但起心見法並皆非有如上所諭當知聖教所現道理諸法非有唯一真如無我實性以為究竟此是三乘義故云離言不可說等如維摩經中三十二菩薩所說不二法門者即是前終教中染淨鎔融無二之義淨名所顯離言不二是此門也二教不同真如章等累作此判分教處引此亦證成以其一切染淨相盡無有二法可以融會故不可說為不二也不可說者以無二法可以指訴說二不二也若依圓教即約性海圓明法界緣起無礙自在一即一切一切即一主伴圓融故說十心以顯無盡即二祖後之三門所顯唯心之義十心用顯無盡如離世間品及第九地說又唯一法界性起心亦具十德如性起品說此等據別教言離世間及九地所出一廣心二深心三勝心四淨心五利心六堅心七無染心八希有心九智慧心十無邊心唯識章引地論云是菩薩如實知眾生諸心種種相心雜相乃至無量百千種種心差別相皆如實知性起品云佛子菩薩摩訶薩應云何知如來應正等覺心佛子如來心意識俱不可得但應以智無量故知如來心譬如虗空為一切所依而虗空無所依探玄廣釋若約同教即攝前諸教所說心識何以故是此方便故從此而流故餘可准之問攝前諸教者未審攝何等教若言即前所列諸教別教亦列乎前豈亦攝耶若云但攝前四何不如餘處列乎別教之前答無可無不可言無可者如餘處列之於前但攝前四以是一乘之方便故無不可者前五總融為同教故如建立中同教之內亦列別教一乘三一和合中以大白牛車望三乘為義故探玄十門唯心中云初三門約初教說次四門約終教頓教說後三門約圓教中別教說總具十門約同教說則別教亦攝是為同教故亦前亦後也問探玄云華嚴初成頓說無權可會如何令說攝前諸教是此方便耶又華嚴從初至極唯談一乘更無異說如何前教從此流耶答祖云華嚴一部唯是不共未有末之可攝也法華乃攝末歸本歸華嚴故故為本也是故諸祖皆判法華為同教一乘攝前諸教歸華嚴矣又此經是開漸之本非本無以垂末二乘在座如聾如盲故興一代漸經無權者以對普機故與漸者為別機故問云何一心約就諸教得有如是差別義耶問心性是一云何教有種種差別答此有二義一約法通收二約機分齊答法具五門約機得別初義者由此甚深緣起一心具五義門是故聖者隨以一門攝化眾生初義下即緣起理實一法界心也隨應攝化故有多種一攝義從名門如小乘教說二攝理從事門如始教說三理事無礙門如終教說四事盡理顯門如頓教說五性海具德門如圓教說一者得名而不得義依小乘但有六識義分心意識餘如小乘二者如雜集論以八義建立阿賴耶識孔目云據此文相阿賴耶即在事中但得一分生滅之義三者真理隨熏遍在緣中成賴耶故四者楞伽云心如工伎兒意如和伎者五識為伴侶妄想觀伎眾據此經文雖知是識由不免戲論如上所喻當知聖教所現道理諸法非有唯一真如無我實性以為究竟此是三乘義五者如是等法為無盡教攝性海融融具德無盡故是故不動本而常末不壞末而恒本故五義相融唯一心轉也不動本際而成諸法即本而常末也不壞有情而入涅槃即末而恒本也由心迴轉善成立門矣二約機明得法分齊者或有得名而不得義如小乘教或有得名得一分義如始教或有得名得具分義如終教或有得義而不存名如頓教或有名義俱無盡如圓教機有普別智有大小隨宜得證聞有淺深分量齊限故有不同言名義無盡者如隨一世界名字差別有四十億百千那由他名又娑婆四諦有四百億十千名等名即無盡也義無盡如海雲比丘聞此法門假使有人以大海量墨須彌聚筆書寫於此普眼法門一品中一門一門中一法一法中一義一義中一句不得少分何況能盡又如一塵具十玄門等非華嚴圓宗餘宗安能談此其餘義門如唯識章說廣如孔目唯識章也是知此章全錄孔目問答不妄矣第二明種性差別者若依小乘種性有六種謂退思護住昇進不動謂退思等下皆有一法字一退法者因遇違緣退失所得法故二思法者常自思惟所得之法恐有退失故三護法者常自防護所得之法恐退失故四安住法者常自安住所得之法此羅漢無勝退緣雖不自防護亦不退失又無勝加行不能精進五昇進法者即是堪達法羅漢也其性有勝堪能常好鍊根堪達法故故名昇進六不動法者謂不被煩惱之所退動故不動性中有三品上者佛種性中者獨覺性下者聲聞性如舍利弗等此就利根忍位中分三品也上者佛種性仁恕慈愛異二乘故中者獨覺性其根小利故下者聲聞性其性厭沒欣出故舍利弗等即下品根性也要問曰小乘教於一時中俱菩薩一人慈悲愛行依三十三心次第作佛餘現行者並不作佛但得二種涅槃住無餘也雖於此中說佛一人有佛種性然非是彼大菩提性以於佛功德不說盡未來際起大用等故以小乘中說佛身皆是無常三根雖異位皆羅漢並證滅果故於佛德不說未來等也大乘即不然依三乘等雖有常無常皆盡未來際故是故當知於此教中除佛一人餘一切眾生皆不說有大菩提性餘義如小論說要問云依小乘教但一人成佛若餘人成佛前後不同時若教化有情後時作佛由無十方佛故若依三乘教種性差別略有三說三乘略有三說下列始終頓皆三乘但三義說有不同遂開三教豈有一章所揀大義前後不同而章家不為和會耶一約始教即就有為無常法中立種性故則不能遍一切有情故五種性中即有一分無性眾生由取賴耶中傳來種子以為種性故故是有為無常法也故論云謂先世所作增長業煩惱為緣無始時來戲論熏習為因所生一切種子異熟識為體至相判云據此即生死體此依唯識論但於生死之中辨因果相生道理並是轉理門無真實理既從事立事有差別不遍一切故有無性等故顯揚論云云何種性差別五種道理一切界差別可得故乃至唯現在世非般涅槃法不應理故乃至廣說言界差別者界者分義因義今以種子為因故有差別彼宗新熏本有皆有五種故說唯現在世非般涅槃法餘生中可轉為般涅槃法不應理故是故當知由法爾故無始時來一切有情有五種性第五種性無有出世功德因故永不滅度言法爾者謂法本如是不可詰其所由也五性者謂一聲聞性乃至五無性闡提善戒地持云無種性人無種性故雖復勤行精進終不能得無上菩提但以人天菩提而成熟之瑜伽等皆同此說由是道理諸佛利樂有情功德無有斷盡意云此類有情既不入滅則生界不空諸佛常化故利德無也其有種性者如瑜伽論云種性略有二種一本性住二習所成本性住者謂諸菩薩六處殊勝有如是相從無始世展轉傳來法爾所得習所成者謂先串習善根所得種性者謂體同曰性相似名種如稻生稻不生餘穀此屬性也萌幹花粒其類無差此屬種也關中云佛報唯佛其理不差即性義也說法度人類皆相似此亦種也瑜伽下列釋六處者指體也即取賴耶中種子為性種也故彼論云云何菩薩種性住此問位體云何菩薩住種性位此問能住人先答後能住人問謂由其性仁賢性能成菩薩行德不由思擇制約有所防護即善行人也二答前位體問若諸菩薩種性任持一切佛法種子於自體中於所依中具足有一切佛法一切種子清涼釋曰阿賴耶識名為自體相續之身名為所依未發心前彼自體中佛法種子為此住體種性即住以此為體名種性住等二習所成性約修習說故云串習所得也此中本性即內六處中意處為殊勝即攝賴耶識中本覺性為性種性上云六處六處語通故於六中指意殊勝也孔目曰若欲出體則用本有修生緣起福慧定慧等門為體故此約本覺解性也故梁攝論云聞薰習與阿梨耶識中解性和合一切聖人以此為因聞熏習即習所成也阿賴耶中解性即性種性二法和合為佛因性一切聖人乃三乘聖人也孔目云此順三乘故然瑜伽既云具種性者方能發心即知具性習二法成一種性祖云種性義者是其佛因其義廣大又云諸佛從菩薩中生故又云以是三世佛種性能生一切菩薩等故謂依外凡十千劫來修信善根方便行於大菩提起決定心入位不退方能發心至發心住名種性位即知具性習成種性也至相曰今立性習二種性者約總說之清涼云謂種性位由於習種合於性種方名種性性種即自性住性為正因性習即新熏修成之性決為佛因稱為種性是故此二緣起不二隨闕不成亦不可說性為先習為後但可位至堪任以去方可約本說有性種約修說為習種然有二義而無二事如上攝論云二義和合為一因故得知也是故下結成有性故起習有習故說性共為緣起隨闕一不成者無性曰無習無習不成性共為緣起方成種性亦不下孔目曰亦有解者性種性是本有性習種性者是修生性此非佛法所樂故此云亦不等也但可位至堪任者是發心住也已去者向第二住以往也是從凡夫修信心行滿至此位也瑜伽十二住一種性住二勝解行住乃至十二最上菩薩住要問云直進及迴心二人修行滿十千劫住堪任地者並皆成就孔目云性種性者約本性說習種性者約修生說論既云和合為一因故無二事矣雲華曰夫論種性者順因緣門說豈容不對因緣而說種性故今性種性不得為本有又習種性不得為修生何以故若法性外有修生者緣起可增是故不得說修生故今種性義者是其佛因其義廣大非偏在解非偏在行非偏在位非偏在比非偏在證非偏因果非偏本有修生故今立性習二種性者約總說之性種性約本性說位在種子習種性者約修生說義則廣大從緣起門義則善成不對緣起說本有修生義則不成得位已去緣方成起故約堪任方名種性問此二種性與仁王及本業經中六種性內習種性種有何差別耶六種性一習種性二性種性三道種性四聖種性五等覺性六妙覺性故問二性有何差別也答彼經大都約位而說以初習為習種性久習積成為性種性故說習種在十住性種在十行三賢之前但名善趣不名種性瑜伽中久習名習種約本為性種而此二種非初非中後是故經說習故成性論中說為依性起習良以此二互成緣起無二相故經論互說義方備足彼經下至相亦曰此約位說義則是通經以初習為習習成為性習先性後故習在住性居行也信未成位但名善趣中修信行人不名種性人也瑜伽論中久習名習位在修生約本名性位在種子上總出經論之意而此下章家會成緣起義非初中後地論斷惑義也下云前中後取故是則三昧不斷而不離三時緣起無定性故會性習義緣起亦然由是之故經說先習而後成性論說依性而能起習盖由性習共成緣起經論各說也又經說種性在發心後論中種性在發心前何以爾者以其至得位時功能方顯是故經說在三賢位中然彼功能必有所依是故論中說在位前要由功能顯方可說有故經不違論要由有性方起功能故論不違經亦是互舉義意融通經說發心後者性種性當十行故初住發心故言在後論說在前者良以從外凡修信滿時成種性發心故故言在前何以者徵以其下釋顯得位則功成故在三賢位中經說在後若起現行必依種子是故說言依性起習故論說在前功能未顯不說有性經何違論有性則能起習論何違經故云互舉融通也問又以何義知種性至堪任位耶問辭可解答以論說種性必具性習既已有習必已修行若已修行必至堪任若不從愚夫至堪任以來中間修此串習行者更何位修也以於愚位未修習故得位以去是第二住故是故當知從愚位來修串習行至彼堪任串習方成故得性習通融以為種性論說者前引瑜伽也既已下慈恩云一本性住種性謂住本識能生無漏本性功德二習所成種性謂聞正法等熏習所起若入五位所修無邊勝善法名習所成種性故若修信心不退必至堪任則串習善等也若不下非此一萬劫修於何時修耶以於下釋成愚位未修得位以後當第二位是故下結成聞法起修位當善趣信行位人也故得性習融成種性也問若要待習方說性者愚位未習豈無性種如其無者後不應有先無後有非性種故如其有者無習有性不應理故論不說故若要下躡前以立難本愚位下開兩關設無何失先本自無何時方有如其下既云待習說有今愚夫無習汝言其有與所立義理不相應瑜伽論中要具性習不說無習而有性故答此二既為緣起故無習時亦無彼性由此亦立無性有情先無後有非性種者此亦不然以習成處定先有性愚位未習故不說性後起習已不名無習是故習成則說有性隨於諸乘串習何行爾時則說本有彼性此二下以緣起法闕一則一切不成故無習亦無性也由此下由無習故立彼無性也先無下舉難以答釋此亦下總非也無性則無習今既習成定知先來決有性種愚位下會難釋成諸乘下則聲聞等習彼聲聞行至忍位時爾時即說聲聞性等問若爾此則唯是一不定性如何得有五種性差別耶答則由此義安立五種由性不定隨熏成立故有五性何者謂修六度串習行已位到堪任成菩薩種性若習小乘行到於忍位成聲聞性故智論云煗頂忍等名為性地善戒經云若得世第一法是名第二位故知前三善根屬種性住若依俱舍論得順解脫分善根位方說有性故彼論云順解脫分者謂定能感涅槃果善此善生已令彼有情名為身中有涅槃法獨覺准知由此則立三乘種等何者徵由一成五其義云何若修六度至堪任時名菩薩等智論下引證煗頂忍世第一四加行位名為性地以至此位必不退故俱舍頌云忍不墮惡趣若至忍位定無退義雖有命終畢竟不入三惡道故又𤏙頂二位許轉根成佛若至忍位必無成佛義已成聲聞種性故善戒下得世第一既是第二位𤏙頂忍三屬種性位此即小乘十二住中第二住也是從遠近方便中修串習也俱舍順解脫分者即資粮之異名也修至彼位即名性種此位善根定能感果故名為身中有涅槃法即名性地獨覺下例顯由此下結也若於三行隨一修行未至本位爾時立為不定種性本位謂堪任及忍位等也若於三行全未修行爾時立為無有種性由此當知諸乘性種皆就習說問若愚位無習則無性者後縱起習何得為有若愚下無固為無習何為有答有習非是無習位故是故有習常恒有無習自恒無既不以無習而作習亦不以無性而為性以位差別故有習無習二位不同是故有性無性自恒差別如涅槃經言三種人中畢竟死者喻一闡提無佛性也善男子一闡提輩若遇善友諸佛菩薩聞說深法及以不遇俱不得離一闡提心何以故斷善根故一闡提輩亦得阿耨多羅三藐三菩提所以者何若能發菩提之心則不復名一闡提性也善男子以何緣故說一闡提得阿耨多羅三藐三菩提一闡提輩實不得阿耨多羅三藐三菩提如命盡者等乃至廣說三種下至斷善根故無習則無性也一闡提至不復名一闡提性也下有習名有性也發心即是習故不名闡提是有性也善男下復成無性當知此中就位前後有無恒定不相由也位之前後性之有無理常自定各不相由也此上初教相宗事中建立五性定別成者成不成者不成故云以深密第二第三時教同許定性無性俱不成佛故今合之以為一教若爾何以彼說初唯不成次一向成第二時中准說大乘唯菩薩機言教攝機闕而不具耶答深密經意許俱不成以第三破第二故第二約遍計密說第三約依圓實說以後照前故知同許又問義若如是終教既說一性何以分教等中以第二為始教第三為終教耶答彼第二時顯說諸法皆空攝一切空經故當初教第三時教以有照空以顯中道雙持空有名持法輪三時次第總攝一代漸經三輪義寬收經亦廣故當漸門三教未克所宗但是境空心有五種三乘有不成佛今明種性方究其宗本非終實經含多義用有不同非吾祖師前後異說奘師歸於至相之時此章成於至相之後言教具闕攝機寬狹自吾祖出故知非後時方改也二約終教即就真如性中立種性故則遍一切眾生皆悉有性良以真如隨緣成種種味故言法身流轉五道名曰眾生論曰真如內熏力故能令眾生厭生死苦樂求涅槃真如熏無明成淨用等要問曰若依三乘終教則一切有情眾生皆悉成佛由他聖智顯本有佛性及行性故除其草木故曰遍有情皆悉有性也孔目曰佛性者諸佛所師所謂法也真性平等猶如虗空於諸凡聖無有限礙名為佛性故智論云白石有銀性黃石有金性水是濕性火是熱性一切眾生有涅槃性以一切妄識無不歸自真性故如經說言眾生亦爾悉皆有心凡有心者定當得成阿耨多羅三藐三菩提以是義故我常宣說一切眾生皆有佛性此在無情數中即諸法自性也在有情數中名涅槃性涅槃即所證佛性也論文甚明或謂今學者遍執論文並無此義者悞矣良以真如隨緣而成妄識妄識從緣無有自性皆歸真性也故論曰以真如法常熏習故妄心則滅法身顯現凡是有心定當作佛涅槃云若說草木有佛性者是外道說孔目云佛性者據覺時語所以知者為隨其流處成種種味法身流轉五道名曰眾生則在有情位中名為佛性佛者覺也口稱無情復言有覺是知不曉也須知以性從緣則成差別以緣從性方歸一體問如有難云若諸有心悉得菩提者佛亦有心亦應當得若言佛雖有心更非當得是則無性眾生雖有是心亦非當得佛及無性同是有心佛非當得無性應然答經中已自簡濫故但云眾生有心不云佛矣以處處受生名為眾生故不同佛也經自揀云眾生有心何以濫佛故不同也問若並有性如何建立五種性中無性者耶性若並有經論云何建立無性答論自有釋故寶性論云向說闡提無涅槃性不入涅槃者此義云何為欲示顯謗大乘因故此明何義為欲迴轉誹謗大乘心依無量時故作是說以彼實有清淨佛性故此義云何此是論中自有此問論自答釋也誣謗大乘是地獄因為轉此心令不生謗故約長時不得成佛非謂永無清淨佛性又佛性論云問云若爾云何佛說眾生不住於性永無般涅槃耶答云若憎背大乘者此法是一闡提因為令眾生捨此法故若隨闡提因於長時輪轉不息以是義故經作此說若依道理一切眾生皆悉本有清淨佛性若不得般涅槃者無有是處是故佛性決定本有離有離無故問下論自問也不住於性不住清淨佛性答下論答也若背大乘是謗誹大乘也若有此法則墮闡提故為欲恐怖令捨此法故說無性若墮此法則長時流轉約此義故經說無性若依真實道理皆有佛性若言闡提實不得滅度無有是處是故下結成俱有解云又此論前文廣破無性乃至末文云三者失同外道有本定有無本定無有不可滅無不可生此等過失由汝邪執無性義生乃至廣說良以種性順因緣門非偏在有不偏在無汝執定無故生諸過是失同外道也問前始教中決定說有無性眾生此終教中並皆有性云何會通始終二教各有所依之經二義差別如何和會答亦論自有釋故佛性論第二卷云何故復有經說闡提眾生決定無有般涅槃性若爾二經便自相違如何會二說一了一不了故不相違此論王宗一性故作此問意在釋通了者終教所依之經說一切皆有清淨佛性者了義說也不了者始教所依之典言有無性者是權施不了說也是故如來所說不相違也解云若小乘中但佛一人有性一切人皆不說有三乘始教中以漸異小乘故說多人有性猶未全異彼故許一分無性是故論中判為權施不了說也尚言一分無性猶未全異故曰權施矣問若依終教一切眾生皆當作佛即眾生雖多亦有終盡若如是者最後成佛即無所化所化無故利他行闕行闕成佛不應道理又令諸佛利他功德有斷盡故生界雖多而皆有性終竟有盡若如下立理進難若許俱成二利行中利他為上生總成佛則無他可利無他可利則無妙行無行而成理不應故又諸佛如來利他功德無有斷盡生界若盡則斷盡矣如其一切盡當作佛而言眾生終無盡者即有自語相違過失以無終盡者永不成佛故又如一佛度無量人於眾生界有損以不若有漸損必有終盡有損無盡不應理故若無損者則無滅度有滅無損不應理故眾生總許作佛而云無盡則自相違也又如下問生界損不損否若有損云何有損而云無盡不成理故依如是等道理佛地論等由此建立無性有情離上諸過此義云何依上諸義佛地瑜伽等論立無性者其義善成答若謂眾生由有性故並全成佛說有盡者是即便於眾生界中起於減見眾生界既減佛界必增故於佛界便起增見如是增減非是正見若謂下牒難是即下總非既云增減是外道說故非正見是故不增不減經云舍利弗大邪見者所謂見眾生界增見眾生界減乃至廣說邪見之人則有增減彼經又云法身即是眾生眾生即是法身法身眾生義一名異又云眾生界法界無二無別若言眾生法界有二有別者我說彼人名一闡提設避此見故立此一分無性有情為不增減者彼終不能離增減見何以故以彼見於諸有性者並成佛故則便起於斷見減見諸無性者不成佛故即便起於常見增見以彼不了眾生界故設避下是牒難彼終下總非何以下徵釋有情俱成則後不復有成佛者則斷見減見無性不成常在生界是常見增見有如是見者由不了生界也是故經云一切愚癡凡夫不如實知一法界故不如實見一法界故起邪見心謂眾生界增眾生界減在文可見文殊般若經云假使一佛住世若一劫若過一劫如一佛世界復有無量無邊恒河沙諸佛如是一一佛若一劫若過一劫晝夜說法心無暫息各各度於無量河沙眾生皆入涅槃而眾生界亦不增減乃至十方諸佛世界亦復如是一一諸佛說法教化各度無量河沙眾生皆入涅槃於眾生界亦不增減即文殊問般若也假使過一劫等言其長時也如一下以一例多亦爾許時晝夜度生不息如是之多爾許成佛而不增減此約一方說乃至下列明十方也何以故眾生定相不可得故何故爾所時界多佛度生而不增減眾生既無定相將何以增減法身被染故曰眾生從緣成立性本自空譬如虗空一切世界若成若壞常無增減以義從名假立眾生耳故經云若成正覺與不成正覺亦無增減何以故菩提無相無非相無一無種種能成所成皆無有相復何增減義言說眾生界猶如虗空假使無量勝神通之者各無量劫飛行虗空求空邊際終不可盡非以不盡不名遊行非以遊行令其得際虗空諭生界神通諭諸佛飛行求空諭說法度生也當知此中道理亦爾非以當得令其有終非以無終說有無得是故諸難無不通也非以當得成佛令生界有盡非以生界無盡說有無性不成佛故是故結成義宗生界離盡不盡諸難皆遣也又為成諸佛利他功德無斷盡故立一分無性眾生者是則令彼諸佛但有變化利他功德亦即斷彼隨他受用諸功德也以無菩薩證諸地故又化他中亦但有麤斷滅彼細以無一人得二乘無漏故登地即見報身今無登地之機故斷報身利他功德以彼無性但以人天而成熟之又化下且凡夫二乘見彼化佛以彼無性但是凡夫既無二乘變化利他有麤無細又今已後諸佛無有一佛得說三乘等教以無得聖機故即斷諸佛同體大悲也應但天乘梵乘諸佛不說聲聞等法以無所化機故又若定意謂悉有性故必皆有盡恐最後佛闕利他行故立一分定無性者然彼後佛終於利他不圓滿以其所化無一有情得聖果故但佛菩薩二利之中利他為最何有不令一人得聖果而於自身得成佛耶不能度一眾生令得聖果故利他行闕闕利他行而自成佛耶又本皆發弘誓願云令諸眾生悉得菩提是故令得故本願不虗而眾生界不可故本願不斷若不爾者違本願故行願虗故虗行成佛不應理故諸佛菩薩初始發心即有此願由有此故得成菩提今皆無性不能令得故本願虗也有性俱成生界故本願斷也若不下虗發度生之願無生證性行願虗矣不能如實修行而自成佛理不應故是故雖欲避上諸失建立無性不謂彼過還墮此宗是故無性非為究竟了義也此上諸過是法相宗立此以難性宗故云不謂彼過彼即性家也還墮此宗即相宗也以能立過設難之家為此受難之家為彼也問夫論種性必是有為如何此教約真如為種性耶此亦有宗以事難理也不達有為皆從真起故有是問答以真如隨緣與染和合成本識時即彼真中有本覺無漏內薰眾生為返流因得為有種性即起信云心生減者依如來藏故有生滅心所謂不生滅與生滅和合非一非異名為阿梨耶識也即彼下論云此識有二種義一者覺義二者不覺義乃至即是如來平等法身依此法身說名本覺又曰依法力熏習如實修行滅相續心相顯現法身故為返流因為性種性也梁攝論說為梨耶中解性起信論中說梨耶二義中本覺是也梁論稱解性即是起信梨耶中本覺二論共詮也又彼論中如來藏具足無漏常薰眾生為淨法因又寶性論云及彼真如性者彼本云如六根聚經說六根如是從無始來畢竟諸法為體故解云以真如通一切法今簡去非情故約云處眾生數中取彼畢竟真如理以為種性也解云下章家示經義也經取諸法中唯真如是不可破壞故故云究竟為體此與瑜伽所說名同但彼約始教以理從事麤相而說故約事中明種性故也地持云種性麤相我已略說此之謂也寶性與瑜伽所說名同彼宗就事建立種性故云以理從事麤相而說也以彼證寶性論中約此終教以事從理深細而說故就真如明性種性是故佛性論云自性清淨心名為道諦就真如本覺以明故云終教以事從理深細而說也佛性下引證道諦即所修之道皆從真流也又涅槃經云佛性者名第一義空第一義空名為智慧此等並就本覺性智說為性種指上所引經論並將本覺性智說為性種也其習種亦從真如所成故攝論云多聞薰習從最清淨法界所流等又起信論中以真如體相二大為內薰因真如用大為外薰緣以與無明染法合故是故三大內外說薰以薰力故無明盡時冥合不二唯一真如也論云真如熏習義有二一者自體相熏習者從無始來具無漏法乃至常恒熏習以有力故能令眾生厭生死苦樂求涅槃故為內熏也用大者論用熏習者即是眾生外緣之力乃至見報應之身熏習真如滅無明等故云外熏緣也隨事業二識見報應等故與合也無明下論云熏習真如滅無明故以真如常恒熏習故妄心則滅顯現法身名為如來藏亦名如來法身等同一味唯一真如三約頓教明者唯一真如離言絕相名為種性亦不分性習之異以一切法由無二相故是故諸法無行經云云何是事名為種性文殊師利云一切眾生皆是一相畢竟不生離諸名字一異不可得故是名種性以此准之唯真如者以無生滅等相總鎔染淨一一白白皆悉真故唯是一法界大總相法門體離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如金剛三昧經云一切萬法皆悉言文之相言文之相則非為義如實之義不可言說眾生說者文語非義論云以無分別離分別故是故無二亦不下論云此真如體無有可遣以一切法悉皆真故亦無可立以一切法皆同如故是故下引經證大本維摩經云爾時文殊師利讚維摩詰言善哉居士如言說如如耳聽如斯乃真實不二法門斯乃真實不二法體是故以此為種性也上來約三乘說竟今明佛種性中間三教首標三乘今結三乘則三乘至此其義明矣第三約一乘有二說一攝前諸教所明種性並皆具足主伴成宗以同教故攝方便故攝前等而言主伴成宗者此有二義一依鎮國曰以別該同皆圓教攝即此同中必有別義如事理無礙必有事事無礙猶彼江水入海亦鹹華嚴大疏佛身土中十門云上分權實唯第九屬於此經若據融攝及攝同教總前九義一總句是謂如來無礙身土普賢亦爾義隨隱顯不可累安達者尋文無生局見問答云已上諸惑一惑一切障一斷一切斷此屬一乘教皆是全收諸教作別教釋也二依孔目橫依方便即是圓通究竟法從彼所流無異事故云雖約諸義差別不同皆是同教一乘義也何以故為成普法故普法所成故是故攝成主伴即決擇中第八門也孔目又曰若據同教說即攝前四乘所明道理一切皆是一乘之義文雖是同而義皆別者在此一一主伴成宗也搜玄云如法華經三界之中三車引諸子出宅露地別授大牛之車仍此二教同在三界作見聞境又聲聞等為窮子是其所引故知小乘之外別有三乘互得相引主伴成宗此是一乘為主三乘為伴耳然是法華同教攝也二據別教種性甚深因果無二通依及正盡二世間該收一切理事解行等諸法門本來滿足已成就訖故大經云菩薩種性甚深廣大與法界虗空等此之謂也孔目曰種性義者是其佛因其義廣大因果無二者各攝法盡故通依下孔目曰非偏在解行比證因果等又曰普賢證位佛果攝用無礙自在一切皆盡故又說從因感果依一乘教具一切因緣理事教義人法因果又總雖有因緣乃至一即一切一切即一又盧舍那佛普賢行因成就因果與三乘等別又問云普賢因果法門體性不與世間道理事同因何從凡夫世間得成普賢解行等果答普賢因果不從凡夫世間尅得何以故若未成則不說普賢若已成則舊來如此道理時事皆悉不同凡夫之法本來無物無物能成普賢對凡舊來非有無所可成唯普賢望普賢說成說不成可准知之大經下引證若隨門顯現即五位之中位位內六決定義等名為種性亦即此法名為果相以因果同體唯一性故廣如經說餘可准知五位即住行向地及果位也六決定者一觀相善決定二真實善決定三勝善決定四因善決定五大善決定六不怯弱決定此六何以名決定有六義故得名決定一約行體決定堅固不退故二望所證決定已證三約煩惱決定能斷四約所信決定不疑五約所化決定能度六望佛果決定能成由六義得名決定孔目云此六決定是十地體通十地故亦通十住已來經云十住中有五決定十行亦同除大善十回向有三決定謂觀相及大善不怯弱此之廢興顯位高下增微故通義可知此義通彼修生及本有普賢性起在此位中何以故同是證故非彼三乘及小乘所知探玄云大海十相別諭十地總一大以諭佛地又云地有二分別所盡大虗以譬果分能盡十相以諭因分是故通能所依為一種性也問云何種性約諸教差別不同耶答此亦有二義一約法辨隱顯相收二約機明得法分齊初義者由此種性緣起無礙具五義門是故諸教各述一門隨機攝化義不相違何為五者一是隨執非有門如小乘說二隨事虧盈門如始教說三從理遍情門如終教說四絕相離言門如頓教說五性備眾德門如圓教說義雖有五然種性圓通隨攝遍收隱顯齊致也二明得法分齊者或一切皆無唯除佛一人如小乘說或一切皆有唯除草木等如終教說或亦有亦無如始教說以許一分無性故或非有非無如頓教說以離相故或具前四如一乘攝方便處說或即因具果通三世間如圓教說餘可准知並如所依心識准知可解第三行位差別者於諸教中皆以三義略示一明位相二明不退三明行相初者依小乘有四位謂方便見修及究竟又說小乘十二住以為究竟及說三界九地十一地等廣如小論說方便謂七方便一五停心二別相念三總相念四煖五頂六忍七世第一此七總名道前方便二見道三修道四究竟道孔目云從小乘位十二住即合四果共成十二住十二住者一聲聞自種性乃至第十二一切種阿羅漢住三界九地者一五趣雜居地乃至第九非非想處地欲界為一上二為八十一地者九地復加十未至定地十一滅受想地二不退者此中修行至忍位得不退故也忍位等如前門說三其行相亦如彼諸論說即愚慧勝劣行相如毗曇等論問何故小乘行位等相不廣顯耶答此中意者以義差別顯教不同而小乘異大乘理無疑故不待說也文皆可見故下斷惑分齊中但標起而已若依初教亦以三義顯初位相者此中有二一為引愚法二乘令迴心故施設迴心教亦但有見修等四位及九地等名同小乘或立五位謂見道前七方便內前三種為資粮位以遠方便故後四善根為加行位是近方便故餘名同前施設下謂大乘經中有將大小二乘地位和合而說如乾慧等地是大小雜列作十地也又如大小二乘同說見修等皆為引令二乘迴心施設此法也故云引愚法等此教通於三乘又說見謂見道通大小乘小乘義者見謂推度為義謂能推度見諦理故名見道見即是道屬主受稱有云八忍名見八智名道即見之道依士得名大乘義者真見道得無分別智親證諦理非比智知相見道以後得智修道修謂修習道謂聖道於此位中勤修聖道故名修道等者名同小乘故又亦為說乾慧等十地第九名菩薩地第十名佛地者欲引二乘望上不足漸次修行至佛果故又彼佛果不在十地外同在地中者以引彼故方便同彼以二乘人於現身上得聖果故不在後也十地者初乾慧地二性地三八人地四見地五薄地六離欲地七辨地八辟支地九十如章欲引等者此乃三乘雜列從初至十示勝劣故又彼下既二乘在現身得果故同彼說在地中得佛是方便善巧也又此位相及行相等廣如瑜伽聲聞決擇及雜集論說位相即上十地等孔目云地者位也行相者謂五乘人所觀行相也問何故瑜伽等所明聲聞行位相而不同彼毗曇等耶答不同相者有二義意一為顯小乘人愚於諸法不了說故二為方便漸漸引向大乘故是故所明行位等法皆悉方便順向大說故不同也此既非是愚法小乘又非菩薩即知是彼三乘教中聲聞乘也見修乾慧等位相如何與前毗曇等不同耶答有二意故不同一欲顯小乘不達法空對之以說毗曇等所宗之經也二欲迴小入大方便漸同順向大說故不同也此既下指此迴心教也退非愚法進非菩薩即是三乘中聲聞乘也吾祖就聲聞藏中准諸經論曲開三種一諍論聲聞藏謂契經四阿含調伏五部對法二十部互相違諍所說不同不妨聖果是故總名諍論藏二稱實聲聞藏如瑜伽聲聞地及聲聞決擇詮示聲聞行位果等皆悉稱實與理相應不同婆娑及諸異論以補處所說非諸異論所能諍故是故總名稱實聲聞藏問此中所說既與小乘諸部不同豈聲聞人有兩種耶答此約教中說聲聞法盡理不盡理故開為二非謂聲聞亦有差別三假立聲聞藏如大乘經中為引聲聞令迴心故所立法門亦同聲聞名數而說如無作四諦及道品等如諸大乘經中說不能繁引既非菩薩所學是故名為假立聲聞藏問此中名雖同小乘義實是大何得總說為聲聞藏答只為此義名為假立問諸聲聞人根熟迴心所學即是菩薩藏収此假立名於彼何用答但聲聞迴心有二種一勝二劣勝者一往入大不籍此藏劣猶怖大是故方便同彼名數令易信受故立此門今即稱實藏収二為直進人顯位相者彼說菩薩十地差別十地差別者孔目云復約位從歡喜地盡第九地於第十地即不退成其佛故又以十地說為見修及通地前以為大乘十二住義何以故為影似小乘故又彼地前有四十心以彼十信亦成位此亦為似小乘道前四方便故是故梁攝論云如須陀洹道前有四位謂𤌢頂忍世第一法菩薩地前四位亦如是謂十信十解十行十迴向又以十地者約位見修等同小乘故及通下約大乘十二位於第十二最上菩薩住後即成其佛似小乘十二住故地前四十心同小乘見道前四加行故又亦為似迴心教故以信等四位為資粮位十迴向後別立四善根為加行位見等同前地前立資粮加行似小乘見道前開七方便故問何故此教所立名數多分影似小乘等耶答為隨方便影似引彼有勝方便故若全異彼難信受故若全同彼不名引故答中全同全異俱不成引同而且異方成引義故云勝方便問若引二乘可須似彼如為直進何假似彼小耶答有二意故亦稍似小一始教中直進之人機麤淺故不能盡受大乘深法是故所示位等法相亦似小乘而義理仍別二凡以大乘似小乘說者皆通二義一為引小二為淺機是故說此為始教也答義理仍別者小乘即實初教即空等既為淺機又復引小由是說為大乘初門也即如何義等者如瑜伽說云何已成就補特伽羅相謂諸聲聞先已串習諸善法故若時安住下品成就爾時便有下品欲樂下品加行猶往惡趣非於現法證沙門果非於現法得般涅槃若時安住中品成就爾時便有中品欲樂中品加行不往惡趣於現法中證沙門果非於現法得般涅槃若時安住上品成就爾時便有上品欲樂上品加行不往惡趣於現法中證沙門果即於現法得般涅槃上言以大似小者經論中何等法義是耶故引此以示之已成下已於凡夫地遇佛教法起行進修故下品等應是頂位已還人也以忍位不往惡趣故欲樂加行者即彼頂前諸位所修四諦觀行等頂位人縱造業入惡趣必不起大邪見斷善根故煖位不容久留諸趣後必生人天遇佛法證涅槃故云非於現法等中品者應是忍位世第一法人也以忍位不往惡趣世第一位雖是異生必能為等無間緣引入見道正性離生位故上品者此應見修位人也然此有多種人且如欲界現般那含人謂此那含於現在身上般涅槃故此是最利根人只於現在欲界身上得三果已不生上界便能進斷上八地七十二品俱生修惑證阿羅漢涅槃果故如說聲聞獨覺亦爾何以故道與聲聞種性同故乃至廣說當亦立三品也於菩薩位為似二乘亦立如是三種成就故彼論云若諸菩薩住勝解行地名下品成就住淨勝意樂地名中品成就住墮決定究竟地名上品成就若菩薩住下品成就猶往惡趣此盡第一無數大劫乃至廣說餘二大劫配二成就如是等文類別非一皆具上意可准而知勝解行地者論云若諸菩薩住勝解行地名下品成就爾時便有下品欲樂下品加行猶往惡趣此盡第一無數劫邊際熾然無動極善清淨覺品善法當知一切皆未得相應若時菩薩住中品成就爾時便有中品欲樂中品加行不往惡趣此盡第二無數劫邊際熾然無動覺品善法已得相應極善清淨覺品善法未得相應若時菩薩住上品成就爾時便有上品欲樂上品加行不往惡趣此盡第三無數劫邊際熾然無動極善清淨覺品善法當知一切皆悉成就二不退位者依佛性論聲聞至苦忍緣覺至世第一法菩薩至于迴向方皆不退也如種性處辨當知此中聲聞緣覺非是愚法是故皆是始教中三乘人也揀愚法小乘此是通大之小故云是始教中人也亦可菩薩地前總說為退以其猶墮諸惡趣故如瑜伽云若諸菩薩住勝解行地猶往惡趣故此盡第一無數大劫如是等也地前總退如瑜伽等說此亦教淺非深細盡理說也三明位中行相差別者如瑜伽云勝解行住菩薩轉時何行何相或時具足聰慧於其諸法能受能持於其義理堪能悟入或於一時不能如是或於一時具足憶念或於一時成於妄類於諸眾生未能了知調伏方便於自佛法亦未了知如實引發善巧方便為他說法教授教誡勉勵而轉勉勵轉故不能如實知或時虗棄如闇中射或中或不中隨欲成故或於一時於大菩提已發心而後退捨由意樂故欲令自樂由思擇故欲令他樂或於一時聞說甚深廣大法教而生驚怖猶豫疑惑如是等類名勝解行住言差別者如諸位行人所起智慧願行位位不同言菩薩轉時者轉入諸位轉起諸行之時也何行者所行之行云何何相者得位相狀若何也此菩薩未能一向升進演義引瑜伽疏云即以此住有漏種現及無漏種諸善為體而猶未證真寂之理但印持決定而起諸行故名勝解行住解云此是十二住中第二住行相其第一種性住行相更劣及地上行相皆如彼說十二住者孔目曰直進菩薩一人即有十地并說見修後方得成佛及說大乘十二住一種性住二解行住三淨心住四增上戒住五增上意住六增上慧住七諦相應慧住八緣起相應慧住九有行有開發無相住十無行無開發無相住十一無礙慧住十二最上菩薩住第一種性住者演義引論釋能住人云謂由性有仁賢性能成菩薩行德不由思擇制約有所防護故即善行人也瑜伽與孔目名有小異若依終教示說菩薩十地差別孔目云約大乘終教有其十門顯十地故亦不以見修等名說不假似彼故又於地前但有三賢以信但是行非見位故未得不退故本業經云未上住前有此十心不云位也又云始從凡夫地值佛菩薩正教法中起一念信發菩提心是人爾時名為住前信相菩薩亦名假名菩薩名字菩薩其人略修行十心謂信進等廣如彼說吾祖曰此信但是十住位之方便自無別位本業經云未上住前有此十心名字謂一信心二念心三精進心四慧心五定心六不退心七迴向心八護心九戒心十願心增修是心一劫二劫乃至得入初住中心心有十增成百法明門名入習種性中故知無位但是方便行也又云此經中後四位皆有入住出已列十名辨十義等唯信位中無此故得知也又本業經但說四十二賢聖不說五十二是也問何故仁王經說十信為種性位仍只立三賢位耶答此有相攝故如是何者義准有四句一以本位攝方便故唯立三賢則沒信名准論住位引文可知二以方便攝本位故即十住名十信沒十住名也故仁王經云十信十止十堅心則不論十住但名十信也三開方便異本位故則如住前有此十心為方便等四於方便處假施正位如前始教說又問信既實無正位何故始教說為位耶答為始教機麤智淺行位不分影似小乘教故說四位終教機細智深尅實分異故也又仁王經習忍以前行十善菩薩有進有退猶如輕毛隨風東西等在此修行經十千劫入十住位方得不退故十住初即不退墮下二乘地況諸惡趣及凡地耶習忍即伏忍當習種性也演義云習種性者十住經云善男子其法師者是習種性菩薩彼經五十二位亦即五忍經云善男子初發相心信恒河沙眾生修行伏忍於三寶中生習種性修信進等十信此之十心是習種性中為十住因開因異果故說十心今文云忍前行十善即開信異住也在信位中即有退墮登住初心即不退故云耳也設本業經說十住第六心有退者起信論中釋彼文為示現退也為慢緩者䇿勵其心故而實菩薩入發心住即得不退也縱本業契經作如是說諸善男子若一劫二劫乃至十劫修行十信得入十住是人爾時從初一住至第六住中若修第六般若波羅蜜正觀現在前復值諸佛菩薩善知識所護出到第七住常住不退自此七住以前名為退分是故起信論云修多羅中或說有退墮惡趣者非其實退但為初學菩薩未入正位而懈怠者恐怖令彼勇猛如淨目天子法才王子舍利弗各入第六住其間值惡知識因緣故退入凡夫不善趣中惡緣即乞眼等其行相者起信論說三賢初位中少分得見法身能於十方世界八相成道利益眾生又以願力受身自在亦非業繫又依三昧亦得少分見於報身佛其所修行皆順真性謂知法性體無慳貪隨順修行檀波羅蜜等廣如彼說又梁攝論中十言名凡夫菩薩十解名聖人菩薩等其地上行倍前准知即彼論信成就發心菩薩行狀三賢初位者信滿入住也少分下論云菩薩發是心故則得少分見於法身能於下以見法身故隨其願力能現八種利益眾生所謂從兜率天退入胎等乃至入於涅槃又云亦非業繫以有大願自在力故等又依下論云謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色等又云復次初發意菩薩等所見者以深信真如法故少分而見其所下論云於真如法中深解現前所修離相以知法性體無慳貪乃至以知法性體明離無明故修行般若波羅蜜然是解行發心中文位當行滿入向深解現前即十解中之解也所修離相即十行中之行也知法性無慳等顯所修離相總是地前初僧祇中行相故梁論可知是故當知此中行位與前始教淺深之相差別顯矣問此教豈不通引二乘何行位不似小乘說耶答此後諸教並皆深勝所引二乘亦是純熟高勝機故不假似彼也在文可見當知此引二乘令迴心向大非三車引諸子也若依頓教一切行位皆不可說以離相故一念不生即是佛故若見行位差別等相即是倒故如地品中十地如空中鳥跡豈有差別孔目云若約頓教即一切行位皆不可說以無相故此據三乘方便說古德云一念妄心不起云何不得名佛又心本是佛念起故為眾生故念不生即是佛也法數章就維摩嘿然無言義當頓教嘿絕萬法故對法論云不待名言及餘根境是名實有即顯待名言根境是假有也是故見相差別即名顛倒大疏等皆言頓教無位者即其義也故佛境界章言若據頓教舉心皆不當理若寄言顯者楞伽云初地即八地乃至云無所有何次第又思益經云若人聞是諸法正性勤行精進如說修行不從一地至一地若不從一地至一地是人不住生死涅槃如是等也寄彼不次之言以顯無位引經云相經文語略演義第五具出初之七句以義配同最後一句據理都泯又云不立地位者以第八句中一切俱拂故云正意在於下句平等理中佛亦不立復何更有次第證耶故云無所有有何次即經長行云於第一義無次第相續等若爾如何祖師復說頓教無位之位而指起信論翻妄四位凡賢聖果次第說耶答彼鈔註曰傍斷譬如逐鹿者不見山斬蛟者不見水志在蛟鹿忘於山水傍觀之士言其登山有高下入水有淺深行者忘心唯知寂滅世尊說彼斷惑有麤細得位自高下法爾必然無位之中有此位故論結四位云而實無有始覺之異本來平等同一覺故問起信豈亦頓教乎答以起信三重因地凡賢聖果四位圭山釋義總屬頓門與圓覺一體又云今用論者分齊一也良以論中從生滅門入真如門生滅是能入之假真如是所入之實以假從實故屬於頓又此論雖有四法正以一體摩訶衍為宗故故當頓教若爾何以復云正終兼頓當知此約眾生心生起染法如來藏隨染故云欲究妄本約凡以標心義判要彰動末先明靜體故正終而兼於頓也若依圓教者有二義一攝前諸教所明行位以是此方便故攝前諸教者則知前四皆圓中四教非圓中別有四教也諸門攝前義皆同此二據別教有其三義一約寄位顯謂始從十信乃至佛地六位不同隨得一位得一切位何以故由以六相取故主伴故相入故相即故圓融故始從下謂寄彼三乘次第六位顯此教中一得一切得也何以下擇相收清涼曰六位不亂以更収經云在於一地普攝一切諸地功德是故經中十信滿心勝進分上得一切位及佛地者是其事也即初地經文此與演義第二用意小異彼但當位之中自一攝十此證一得一切得五十二位正當彼中總攝諸位故此云得一切位及佛地故是故下義引梵行品文云若諸菩薩能與如是觀行相應於諸法不生二解一切佛法疾得現前初發心時即得阿耨多羅三藐三菩提知一切法即心自性成就惠身不由他悟又以諸位及佛地等相即等故即因果無二始終無礙於一一位上即是菩薩即是佛者是此義也言相即等等於相收相入也一一位者此別明五位互攝如初住攝於初行初迴向初地第二住攝二行等第十住滿則十行滿等十行智度圓十地智度滿如海幢比丘寄第十住頂出諸佛灌頂成佛者即其事也前約理行圓融此兼行證相似二約報明位相者但有三生一成見聞位謂見聞此無盡法門成金剛種子等如性起品說亦名見聞生故曰三生未起解行前皆見聞生性起品彼經說親近如來見聞所種善根皆悉不虗出生無盡覺慧乃至到無功用智地即引喻云佛子譬如丈夫食少金剛終竟不消要穿其身出在于外何以故金剛不與肉身雜穢同處故二成解行位謂都率天子等從惡道出已一生即得離垢三昧前得十地無生法忍及十眼十耳等境界廣如小相品說經云佛子我為菩薩時於兜率天宮放大光明名光幢王照十佛剎微塵數世界彼世界中地獄眾生遇斯光者眾苦休息得十種清淨眼等咸生歡喜踊躍稱慶從彼命終生兜率天又足輪有光名清淨功德阿鼻地獄極苦眾生遇斯光者皆悉命終生兜率天既生天已天鼓說法時諸天子聞說普賢廣大迴向得十地故等離垢三昧前者地論說得離垢三昧現在前又此是果定而有二分今得十地故言前也又如善財始從十信乃至十地於善友所一生一身上皆悉具足如是普賢諸行位者亦是此義也初見表十信至釋種童女得法雲地最後見普賢菩薩與諸佛等普賢等至覺位清凉曰非唯前後理觀圓融行布亦足彌勒言餘諸菩薩無量劫修善財一生皆得故言具足諸行位也三證果海位謂如彌勒告善財言我當來世成正覺時汝當見我如是等即入證分齊處也彌勒等者入法界品經云善男子我願滿足成一切智得菩提時汝及文殊俱來見我當知此約因果前後分二位是故前位但是因圓果在後位故說當見我也今見彌勒但是因圓見成正覺則是果滿也三約行明位即唯有二謂自分勝進分此門通前諸位解行及以得法分齊處說如普莊嚴童子等也行行之中皆有此二探玄云然此二分通說有七重一約一行生熟分二約二行如先施行已成後修戒等三約二利以分四就行位以得位為勝進五約比證以分六約二位謂前位已成為自分趣向後位為勝進七就因果因成自分入果勝進得法分齊處者所得三昧也如善財於彌勒所得解脫門名入三世一切境界不忘念智莊嚴藏未得三昧是善財自分得三昧已則是勝進二位不同普莊嚴者探玄云此童子得法是何位者義准上下經有三種成佛一約位以六相方便即十信終心勝進分後入十解初位即成佛以此是三乘終教不退之位故以一乘六相融攝即具諸位至佛果也是故此童子見初佛為信位自分聞初經為信位勝進見後佛當解位自分聞後經為解位勝進以攝諸位皆具足故二約行總不依位但自分勝進究竟即至佛果三約理則一切眾生並已成竟更不新成以餘相皆盡故性德本滿故其身在於世界性等以上處住當是白淨寶網轉輪王位得普見肉眼見十佛剎微塵數世界海等世界章云一世界性二世界海乃至十世界相謂積種成性等此當萬子輪王已去所居若晉經寄當十地如兜率天子從惡道出即得離垢三昧前得十地無生法忍位一乘義章曰若證得普賢位在六相方便十地位中何以故依十地證義會普法故今章既云及以得法分齊處說則知普莊儼等位皆十地准唐經云種一清淨金網轉輪聖王據晉經云所謂白淨寶網輪王等清凉會云是則多箇輪王非一輪王之多善也梵本亦然而言清淨金網者准瓔珞上卷金輪在十迴向中初地已上皆是琉璃輪而增寶數為別是知舊譯為寶網者勝金網也故彼經云歡喜地百寶瓔珞七寶相輪四天王一萬子為眷屬寶數一一增至第七地十三寶相輪八地但云大應寶相輪九地云白雲寶相輪十地云百萬神通寶光瓔珞無畏珠寶相輪若順晉經白淨之言則當九地今章與孔目皆云十地但據晉經天子所得位判清凉由二經不同以義會通故有是說普見下一乘義在普見肉眼位中見十方界經云菩薩住金網輪王位放摩尼髻清淨光明若有眾生遇斯光者皆得菩薩第十地位成就智慧光明得十種清淨眼等又菩薩業報清淨肉眼乃至如頗梨鏡清淨光明照十佛剎微塵數世界等若三乘肉眼則不如此故智論云肉眼唯見三千世界內事若見三千世界外者何用天眼為故知不同也文處可見又彼能於一念中化不可說不可說眾生一時皆至離垢三昧前餘念念中皆亦如是經云菩薩住此轉輪王位於百千億那由他佛剎微塵世界中教化眾生乃至未曾一念而得間斷若有眾生暫得遇光者必獲菩薩第十地位皆至離垢三昧之前者孔目云若約解行法分齊尅唯未得離垢三昧其離垢三昧是未受職之前定又云當知白淨輪王之位福分非少若起利用即合無量眾生發不退菩提心及在十地無生法忍地唯未得離垢三昧少分之力故云至前定也其福分感一錠光頗璃鏡照十佛剎微塵數世界等一乘義章云白淨寶網輪王位時有錠光頗梨鏡光明照十佛剎微塵數等世界驗知福分不少也當知此是前三生中解行位內之行相也以約因門示故如是身土化用福分是解行生行相以此照前約行明位是位內行相矣以約下以因果該徹圓通之法在因為因在果為果總別相成無有前後始終淺深近遠等別今云解行者就因門示也若約信滿得位已去所起行用皆遍法界如經能以一手覆大千界等手出供具與虗空法界等一時供養無盡諸佛作大佛事饒益眾生不可說也廣如信位經文說又云不離一世界不起一坐處而能現一切無量身所行等又於一念中十方世界一時成佛轉法輪等乃至廣說言得位即信滿不退際上以終教三乘至此入住名為得位今以一乘同彼而說引彼三乘令入一乘故三一義章云但不退以後即明得彼普賢之法約熟教比之即十信滿心已去即是其位其普賢位中對彼解行法及彼得義唯有自分勝進兩義不同故下文問答備揀終教三乘皆遍法界已得普賢法故經引晉譯賢首品十種三昧中第四手出廣供三昧門偈也是故當知與彼三乘分齊全別何以故以三乘行位是約信解阿含門中作如是說也與彼下建立一乘十義差別後結判云此上十證足為龜鏡其別教一乘所明行位因果等相與彼三乘教施設分齊全別不同廣在經文略如下辨行位因果則此復揀者會成前義此中正揀終教三乘豈有前後義異文句全同祖師不明辨而示後學聖言寧容有失何以下徵三乘行位者種性章云三乘教種性差別略有三說一約始教二約終教三約頓教真如章云真如有二門一者一乘真如二者三乘真如次釋云三乘真如復有二門一頓教門二漸教門又次云漸教門者略有三門一終教門二始教門三所知門又此下問答正以三乘終教對揀則所揀三乘通諸教甚明矣良以長養彼根器故施設行布十地等行位令生信解阿含此云淨教乃至佛果並是教佛一乘義章約諸教說行位竟頓教末文結云此據三乘方便說章初云今依大乘云昔日但有言教無實行果故云三車空無又云臨門牛車亦同羊鹿但有其名以望一乘但是教故是故經云以佛教門出三界苦等妙趣云又諸三乘經論所明位地及差別次第法相門等並約信解門中依如是說故大論云隨一方化儀也若據行法則不如是行解亦入解門彼亦通揀諸教也問頓實二教豈皆權也答既皆一方化儀非無盡說是故前四皆方便權施也行法分齊云若修菩薩道為迴聲聞初教許行為引初教終教許行為引漸教頓教許行為引頓教圓教許行當知頓實皆是所引唯圓教究竟非所引也又云據佛別意唯一乘可行餘不可行何以故非究竟依故是故前四皆是此經方便枝末法輪並非本究竟正乘也問前終教中不退際上亦得如是八相等用與此何別終教三乘信滿入住亦得八相等與今一乘何別此如起信等說答彼於此位示成佛時於後諸位皆不自在以未得故但是當位蹔起化故此即不爾於初位中起此用時於後諸位並同時起皆已得故是實行故該六位故答彼終教但於信滿入住得位證如能起化用示現成佛於後諸位並未得故皆不自在不同一乘一得一切得一起一切起並皆自在妙趣云華嚴中信解行等諸位以信一言成其信位位中所含即通成解行理事一切法門等問義既不同何故一種同是信滿勝進分上起此用耶一三義異權實宗差何故同此起用答為欲方便顯此一乘信滿成佛令易信受故於彼教先作此說良以信該果海理圓難信故佛菩薩於彼三乘終教信滿之處說能作佛巧令聞者易信斯經也問既一位中有一切位及信滿心即得佛者何須更說後諸位耶文處可見答說後諸位即是初中之一切也如初後亦爾初後亦爾者所說一切即後中所具一切也問若初即具後得初即得後者亦可後亦具初既不得後應亦不得初耶以後例前可見答實爾但以得初無不得後故是故無有未得後而不得初也實爾者理實如是若無十一不成故餘文可知問若爾云何得說諸位階降次第若初後皆具一切義實夷齊云何經中復說階降答以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼方便是同教也二約體就法前後相入圓融自在異彼三乘是別教也約相者且入法行位皆有體相用三若就十住約法說者十住之中教義二分吾祖乃言義中以平等法界為體十住行位為相應教所詮為用教中以六決定為體十住不同為相益機為用就門者以住行向等為門却以住向地等相就於六位之門故有前後階降次第不同寄同三乘引彼之機令捨權三而入一實也此中所同即終頓三乘能同即別教一乘寄同三乘融會云又華嚴經文前之五會及十明已後盡不思議品即以別教從三乘說十地文中即用一乘圓教從三乘教以顯別教說又十地已前四會中六決定文何故不依十數而說答六決定是本分義深體略難解故寄三乘之教却顯一乘玄趣令其聞者一往易解也經文善巧交絡二義顯宗分齊極善妙也又言同者吾祖云同者通也故名通教一乘或名通相一乘又云通之與同義無別趣所言同者三乘同一乘故又言同者小乘同一乘故經云毗尼即大乘也又云汝等所行是菩薩道等今以一同於三彼以三同於一是則兩宗交接連綴引攝令歸別教一乘也又云同教者經云會三歸一故知同也是則全収諸教前四皆三乘是遠方便攝故上云則三乘等並名一乘是故總列同教中也若爾何以大疏但同頓實答且収江河若地品疏鈔亦說若下同三乘亦収始小但彼文正約性相料揀對權顯實以後三為一於一乘以分同別則頓實為同圓教為別能揀十條亦即此經同教中義圭峯指云華嚴同教故大疏至義理分齊中即言同教者同頓同實理事無礙法界一一會前終頓未說同於始小至地品方該前四貞元疏總相會通中第三於大乘中復分為二一者權教大乘亦名三乘即第二大乘始教二實教大乘亦名一乘謂會三歸一十方國土中唯有一乘法故即後三教合名為實即今性相二宗乃至有多差別十對料揀竟即云第四就實教中復分二教一約有位無位以分頓漸二約圓融不融分成二種即實教頓教並皆不融為同教一乘第五圓融具德名別教一乘故知同頓同實是合終頓歸於一乘為同教也貞元至義理分齊中亦云故此圓教語廣名無量乘語深唯顯一乘一乘有二一同教一乘同頓同實故乃至云以別該同皆圓教攝等鎮國二疏其義一揆若言華嚴經中自有能同一性一相為同教者豈得便云不融又不應後三合為一實開同別矣但彼合二教歸圓此引三機入一但小異耳問分四教中同教一乘如探玄等從共教開出何以今云圓教攝耶答當知總相會通義意雖同文言小別或有廣略一或合為一圭峯云圓教攝於前四一一同圓唯一善巧二或開為二探玄首開一乘前四為三乘即是智論共教三於共教中開出小乘四於共中開出終頓為同教一乘貞元則初開小乘次開權教三乘後於一乘開為同別玄談該於多義對小顯大則先開小乘對權顯實乃開前二為權後三合為一乘乃至開成四五皆圓教漸次開也故此同教從一從三理無不可但由不知或總為一即是圓教乃云非圓中開出又問何以定知是今圓教章云若依圓教有二義一攝前諸教等又云三約一乘有二說一攝前諸教所明種性並皆具足主伴成宗以同教故攝方便故如此文義溢目盈空不知思耳由是義故所揀三乘正揀終頓但異權三不足為別教也餘如同教策辨二約體者如十住以平等法界為體今以行位等為體以就圓融普法是故前後圓融異彼三乘是別教也但以不移門而恒相即不壞即而恒前後是故二義融通不相違也不移門而恒相即行布不礙圓融不壞即而恒前後圓融不礙行布行布是教相施設圓融是理性德用相是即性之相性是即相之性是故不相違也問若爾是初門即一切者何不說信位初心即得而說滿心等耶文處可見答若自別教即不依位成今寄三乘終教位說以彼教中信滿不退方得入位今即寄彼得入位處一時得此一切前後諸位行相是故不於信初心說以未得不退不成位相但是行故答若直自宗別教則不依位成一乘義章云若依一乘圓通之教由義自在總別相成故無前後始終淺深近遠等別又要問云若須成佛則數數成新新斷結亦不住學地若對不成機則常不成由如大海於諸位中無有溢滿等今寄下義皆可見問若爾應言住位成佛何名信滿答由信成故是故是行佛非位佛也餘義准之今但是信行成就故非位佛若但言十信作佛不論十地終心作佛則是三乘教若具五位及九位作佛則是一乘圓教攝若小乘三乘並是阿含佛一乘是義佛也
