body:
  text: 十玄緣起無礙法門義第三夫法界緣起自在無窮今以要門略攝為二一者明究竟果證義即十佛自境界也二者隨緣約因辨教義即普賢境界也太一云一乘緣起自體法界不同大乘緣起但能離執斷常諸過等此宗不爾一即一切無過不離無法不同也法界緣起不過自體因之與果所言因者謂方便緣修體窮位滿即普賢是也所言果者謂自體究竟寂滅圓果十佛境界一即一切謂十佛世界海及離世間品明十佛義是也初義者圓融自在一即一切一切即一不可說其狀相耳以性海果分是不可說義謂圓融理智普別行等相即相入無礙自在是也如華嚴經中究竟果分國土海及十佛自體融義等者即其事也然彼十佛所依有二一國土海圓融自在當不可說二世界海有三類一蓮華藏世界海具足主伴通因陀羅等不論因陀羅及微細等此當不可說義何以故不與教相應故地論云因分可說果分不可說者即其事也法界緣起之內有法有義法當果分義屬因分縱因陀羅及微細等義今亦不辨以圓融極果絕於說相所以不可以言說問義若如是何故經中乃說佛不思議品等果耶答此果義是約緣形對為成因故說此果非彼究竟自在果所以然者為與因位同會而說故知形對耳果分不可說者太一問不思議品等亦明果德何故得於因門說耶答雖是果德對緣以辨果非究竟圓寂之果是故與因同會說也第二義者有二一以喻略示二約法廣辨至相云今約教就自體相辨緣起者於中有二一者舉喻釋成於法二者辨法會通於理初喻示者如數十錢法所以說十者欲應圓數顯無盡故舉喻者如夜摩天會菩薩雲集品說云譬如數法十增一至無量皆悉是本數智慧故差別所以下孔目云十數之義含於二門一成圓教門二不成圓教門教義攝益中已引此中有二一異體二同體今舉此十數為譬者復有二門一異體門二同體門所以有此二門者以諸緣起門內有二義故一不相由義謂自具德故如因中不待緣等是也二相由義如待緣等是也初即同體後即異體探玄云謂大法界中緣起法海義門無量約就圓宗略舉十門謂諸緣起法要具此十義方成緣起故闕即不成演義云何以初異體門中云諸緣各別不相雜亂第二同體門中云互相徧應方成緣起釋曰謂要由各異方得待緣要由遍應方自具德耳就異體中有二門一相即二相入異體門中復有二門一者一中多多中一二者一即多多即一所以有此二門者以諸緣起法皆有二義故一空有義此望自體二力無力義此望力用由初義故得相即由後義故得相入緣起有二相即相入謂諸緣相望全體形奪有有體無體義緣起方成以若闕一緣餘不成起起不成故緣義即壞又諸緣力用互相依持互相形奪故有全有力全無力義緣起方成故得相即相入也初中由自若有時他必無故他即自何以故由他無性以自作故二由自若空時他必是有故自即他何以故由自無性用他作故以二有二空各不俱故無彼不相即有無無有無二故是故常相即若不爾者緣起不成有自性等過思之可見探玄云是故一緣是能起多緣及果俱是所起是即多為一成多是無體一能作多一是有體由一有體必不得與多有體俱多無體必不得與一無體俱是故無有不多之一無有不一之多一多既爾多一亦然反上思之二明力用中自有全力故所以能攝他他全無力故所以能入自他有力自無力反上可知不據自體故非相即力用交徹故成相入又由二有力二無力各不俱故無彼不相入有力無力無力有力無二故是故常相入謂全有力全無力緣起方成是故緣起要互相依具力無力如闕一緣一切不成餘亦如是是故一能持多一是有力能攝於多多依於一多是無力潛入一內由一有力必不得與多有力俱是故無有一而不攝多也由多無力必不得與一無力俱是故無有多而不入一也如一持多依既爾多持一依亦然反上思之又以用攝體更無別體故唯是相入攝體收用無別用故唯是相即此依因六義內准之體用雙融義謂諸緣起法要力用交涉全體融合方成緣起探玄中有六句今用二句一以體無不用故舉體全用即唯有相入無相即義二以用無不體故舉用全體即唯有相即無相入也此依因六義中待緣等准之皆是入十玄無礙之方便也於中先明相入初向上數十門一者一是本數何以故緣成故乃至十者一中十何以故若無一即十不成故即一有全力故攝於十也仍十非一矣餘九門亦如是一一皆有十准例可知今約十數明一中多多中一者今明初句若順數從一至十向上去如一者一緣成故一中即有十所以一成若無十一即不成無性緣生故一中即有十所以一成故二三四等一切皆成也若一住自性即不成十十若不成一亦不成向下數亦十門一者十即攝一何以故緣成故謂若無十即一不成故即一全無力歸於十也仍一非十矣餘例然明次句多中一逆數十至一向下來但十玄章影在前門彼略不出耳今章別開也如是本末二門中各具足十門餘一一錢中准以思之此約異門相望說耳本末即向上向下各具十門餘一一門准上思之問既言一者何得一中有十耶既稱一寧容有多耶答大緣起陀羅尼法若無一即一切不成故定知如是此義云何所言一者非自性一緣成故一是故一中有十者是緣成一若不爾者自性無緣起不得名一也乃至十者皆非自性十由緣成故為十此十中有一者是緣成無性十若不爾者自性無緣起不名十也是故一切緣起皆非自性何以故隨去一緣即一切不成是故一中即具多者方名緣起一耳陀羅尼此云總持大法界緣起總持法若無下對緣以顯一此一乃無性緣成一故得一中具十若不爾不得名一為此下反上是故緣起皆無自性一中具多方成一多緣起問若去一緣即不成者此即無性無自性者云何得成一多緣起既一緣無性多緣亦無性那得成一多緣起答只由無性得成一多緣起何以故由此緣起是法界家實德故普賢境界具德自在無障礙故華嚴云菩薩善觀緣起法於一法中解眾多法眾多法中解了一法是故當知一中十十中一相容無礙仍不相是一門中既具足十義故明知一門中皆有無盡義餘門亦如是此由法界實得緣起力用普賢境界相應所以一多常成不增不減也問一門中攝十盡不此門攝法為盡不盡耶答盡不盡何以故一中十故盡十中一故不盡四句護過去非顯德等准之可解耳別別諸門中准例如是緣起妙理應如是知第一門竟亦有盡義亦無盡義何者一中十即是盡十中一具說即無盡又復知一中十十中一皆盡不盡義也四句者有無兩亦雙非離過顯德准此緣起可解餘之八門例此應知異體相入門竟初異體門中第二即義者此中有二門一者向上去二者向下來今異體中相即義亦具二門初門中有十門一者一何以故緣成故一即十何以故若無一即無十故由一有體餘皆空故是故此一即是十矣如是向上乃至第十皆各如前准可知耳但一有體多無體故得一即多向上從一至十也言向下者亦有十門一者十何以故緣成故十即一何以故若無十即無一故由一無體餘皆有故是故此十即一矣如是向下乃至第一皆各如是准前可知耳以此義故當知一一錢即是多錢耳由一無體多有體故得多即一向下來從十至一也十即一緣成故若十非一一不成何但一不成十亦不成如柱若非舍爾時即無舍若有舍亦有柱以柱即舍故有舍復有柱故一即十一即十故成一復成十也問若一不即十者有何過失由前謂一即多多即一故興此問也答若不即十者有二失一不成十錢過何以故若一不即十者多一亦不成十何以故一一皆非十故今既得成十明知一即是十也二者不成一過何以故若一不即十十即不得成由十不成十故一義亦不成何以故若無十是誰一故今既得成一明知一即十又若不相即緣起門中空有二義即不現前便成大過謂自性等思之可知下同體門中准此知之餘門亦准可知耳若不即者有二過一不成十十不成一是情謂之一所謂緣成一者一中具十故今章第二失中合云十不成一過傳寫之誤又若不相即空有二義即不成立便有自性斷滅等過下同體等准此故略不明問若一即十者應當非是一若十即一者應當非是十若一與十二互相即安有一十之存乎答祗為一即十故是故名為一何以故所言一者非是所謂一緣成無性一為此一即多者是名一若不爾者不名一何以故由無自性故無緣不成一也十即一者准前例取勿妄執矣應如是准知此明一即十者離一無有十而十即是一緣成故若不爾者自性無緣起不得名一則一不得成十即一者准此可知問上一多義門為一時俱同耶為前後不同耶至相十玄問若一多要待緣成者為是同時為有先後耶答即同即前後何以故由此法性緣起具足逆順同體不違德用自在無礙故皆得如此緣起故常同時常前後所以然者一即十十即一故常同時向上去向下來故常先後逆順自在故無障礙問如上所說去來義其相云何既有先後去來本相云何答自位不動而恒去來何以故去來不動即一物故但為生智顯理故說去來等義耳若廢智一切不可說如上果分者即其事也雖前後去來而常不動作為生智下今若辨去來者約智說若廢智下體即息諸論道同於究竟圓果離說相故問若由智者即非先有如何說云舊來如此耶謂智乖本法即非先有何云舊來如此答若癈智即不論緣起由約智故說舊來如此何以故不成即已成即離始終故智及與法舊來成故由智方知本有以智照故不成即已成即離始終故問為由智耶法如是耶一多之體由智照耶法本有耶答為由智耶為法如此耶何以故同時具足故餘義准以思之大段第一異體門訖法本有故智即能顯由智照故方明本有二義同時皆盡無礙故一切諸法例如此知第二同體門者亦有二義一者一中多多中一二者一即多多即一還如前門二義相似初門中二一者一中多二者多中一初一中多者有十門不同一者一何以故緣成故是本數一中即具十何以故由此一錢自體是一復與二作一故即為二一乃至與十作一故即為十一是故此一之中即自具有十箇一耳仍一非十也以未是即門故初一錢既爾餘二三四五已上九門皆各如是准例可知耳是本數一中即具十者清凉云如一本自是一則為本一應二為二一應三為三一等只一箇一對他成多喻如一人望父名子望子名父等同一人體而有多名二者多中一亦有十門一者十何以故緣成故十中一何以故由此一與十作一故即彼初一在十一之中以離十一即無初一故是故此一即十中一也仍十非一矣餘下九八七乃至於一皆各如是准例思之攝他一同多己望於一攝之亦然皆是多也問此與前異體何別答前異體者初一望後九異門相入耳今此同體一中自具十非望前後異門說也即義亦准思之同體即入與前異體即入何別答前異體門一中十者以初一望後九故名一中十此門言一中十者即一中有九故言一中十二者一即十十即一亦有二門一者一即十亦有十門不同一者一何以故緣成故一即十何以故由此十一即是初一故無別自體故是故此十即是一也餘九門皆亦如是准之可知如一有體多無體能攝他同己一有體攝他多也能成有體所成無體也二者十即一亦有十門不同一者十何以故緣成故十即一何以故彼初一即是十故更無自一故是故初一即是十也餘九門准例知之十有體一無體多有體故能攝一故本一無體潛入多中問此同體中一即十等者為只攝此十耶為攝無盡耶此明一體為祗攝一中十亦攝他處十耶答此並隨智而成須十即十須無盡即無盡如是增減隨智取矣即十如前釋言無盡者一門中既有十然是十復自迭相即相入重重成無盡也然此無盡重重皆悉攝在初門中也至相曰隨智差別故亦盡亦無盡何者如一若攝十即名為盡若具說即無盡但展轉相迭相互即重重無盡也問為但攝自一門中無盡重重耶為亦攝餘異門無盡耶為攝自一中十無盡為餘諸門中無盡答或俱攝或但攝後自無盡何以故若無自一門中無盡餘一切門中無盡皆悉不成是故初門同體即攝同異二門中無盡無盡無盡無盡無盡無盡無盡無盡無盡無盡窮其圓極法界無不攝盡耳若一無盡餘亦無盡若餘不盡一亦不盡若成一一切即成若不成一一切亦不成是故此攝法即無盡復無盡圓融自在無不周盡或但攝自同體一門中無盡何以故由餘異門如虗空故不相知故自具足故更無可攝也此但隨智而取一不差失也祗攝自門中無盡於三四義猶若虗空即是盡更不攝餘故名無盡故亦攝盡不盡如此一門既具足無窮箇無盡及相即相入等成無盡者餘一一門中皆悉如是各無盡無盡成宜如是准知清凉曰由異體相入帶同體相入故有帝網門者同體相入一中已含於多而更入於異體故有重重之義同體相入如鏡已含多影更入餘鏡故有重重無盡之義餘門可知此且約現今理錢中況彼一乘緣起無盡陀羅尼法非謂其法只如此也應可去情如理思之喻則有限法乃無窮至相云法門具滿無喻可況今說喻者但分喻耳若不去情難造妙旨此章合云現今事錢錯為理字也第二約法廣辨者略有二種一者立義門二者解釋門然此章全依至相十玄賢首承用探玄修改清凉全依賢首新文以所立有次第故初立義門者略立十義門以顯無盡何者為十先立所依體事十對分為十門一一門皆復具十以顯無盡一教義即攝一乘乃至五乘等一切教義餘下准之二理事即攝一切理事三解行即攝一切解行四因果即攝一切因果五人法師攝一切人法六分齊境位即攝一切分齊境位七師弟法智即攝一切師弟法智八主伴依正即攝一切主伴依正九隨生根欲示現即攝一切隨生根欲示現十逆順體用自在等即攝一切逆順體用自在等所言教義者教即是通相別相三教五乘之教即以別教以論別義所以得理而亡教若入此通宗而教即義以同時相應故二理事者若三乘教辨即異事顯異理如諸經舉異事喻異理若此宗即事是理如入法界品等經文是謂體實即是理相彰即是事也三解行者如三乘說解而非行如說人名字而不識其人若通宗說者即解即行如看其面不說其名而目識也相顯為行契窮後際為解四因果者修相為因契窮為果五人法者如文殊即當妙慧普賢彰其稱周明人即法也六分齊境位者參而不雜各住分位即分齊境位也七法智師弟者開發為師相承即弟子也八主伴依正者舉一為主餘皆為伴主以為正伴以為依也九逆順體用者即是成壞義也十隨生根欲性者隨緣常應也如涅槃經此方見滿餘方見半而月實無虧盈若以此宗明者常增減而無增減以同時相應故今章但九十不次此十門為首皆各總攝一切法成無盡也然此十門體無前後同時相應既其具此十門餘因陀羅等九亦皆具此十門其中一一皆稱周法界所以舉十門者成其無盡義也二言解釋者亦以十門釋前十義以顯無盡隨舉教義理事等十門以一為首攝餘九門即顯無盡問何以得知十數顯無盡耶答依華嚴經中立十數為則以顯無盡義前已引竟一者同時具足相應門此上十義同時相應成一緣起無有前後始終等別具足一切自在逆順參而不雜成緣起際此依海印三昧炳然同時顯現成矣以是總故冠於九門之初即具教義理事等十門同時也何以得如此耶良由緣起實德法性海印三昧力用故得然也非是方便緣修所成故得同時二者一多相容不同門此上諸義隨一門中即具攝前因果理事一切法門如彼初錢中即攝無盡義者此亦如是然此一中雖具有多仍一非即是多耳多中一等准上思之餘一一門中皆悉如是重重無盡故也此約理說以一入多多入一故名相容體無前後而不失一多之相故曰不同此即緣起實德非天人所作故此經偈云以一佛土滿十方十方入一亦無餘世界本相亦不壞無比功德故能爾然此一多雖復互相含受自在無礙仍體不同也所由如上錢義中釋此有同體異體准上思之可解仍體不同若不爾者諸緣雜亂失本緣法緣起不成此則諸緣各各守自一也三者諸法相即自在門此上諸義一即一切一切即一圓融自在無礙成耳還就教義理事等十門取其三世間圓融無礙自在故一即攝一切成其無盡復無盡以其無盡故相即復相入此約用以說也若約同體門中即自具足攝一切法也然此自一切復自相入重重無盡故也然此無盡皆悉在初門中也太一曰此無盡復無盡相即復相入與因陀羅網及微細相容門有何差別耶答如喻說同體門中說者若就隱映相應互相顯發重重復重重成其無盡者即是因陀羅網門攝若諸門一時具顯不相妨礙者即是相容門攝若就三世間圓融無礙自在相即復相入成其無盡復無盡者即此門攝故此經云初發心菩薩一念功德深廣無邊際如來分別說窮劫不能盡何況於無量無數無邊劫具足修諸度諸地功德行此即明其一即一切成其無盡何況者此即從二三至九十皆成無盡義言一念即深廣無邊者良由緣起法界一即一切故耳如彼同體門中一錢即得重重無盡義者即其事也此據緣起體性成其無盡復無盡故何況無邊劫者即餘一一門中各顯無盡義者是也所以爾者此經又云初發心菩薩即是佛故也由此緣起妙理始終皆齊得始即得終窮終方原始如上同時具足故得然也良由始終相即復相入成無盡故先後因果不失雖不失先後以先後相即復相入故成其無盡又云在於一地普攝一切諸地功德也是故得一即得一切又云知一即多多即一故也十信終心即作佛者即其事也信滿成佛約位佛非行佛故問如同體一門中即攝一切無盡者為一時俱現耶為前後耶問意可知答於一門中一時炳然現一切者屬微細攝隱映互現重重者屬因陀羅攝餘義即同即異即多即少即有即無即始即終如是自在具足一切無盡法門仍隨舉一為首餘即為伴道理一不差失舊來如此此辨同體一門中具足自在無窮德耳餘異體等門中亦准思之有三義不同餘義下即此門攝問若一門中即具足一切無盡自在者餘門何用為答餘門如虗空何以故同體一門並攝一切無不盡故若一門自具足何用餘門答餘門如龜毛兔角不可得問此同體門中所攝一切者但應攝自門中一切豈可攝餘門中一切耶但應攝自豈容攝他耶答既攝自一切復攝餘一一門中無盡一切如是重重窮其法界也自他俱攝方能窮盡緣起無礙法界之義何以故圓融法界無盡緣起無一一切並不成故此俱論法性家實德故不可說其邊量若無一一切不成如一㪷即攝一升若無升㪷即不成也故此經偈云不可言說諸劫中演說一切不可說不可說劫猶可盡說不可說不可盡又偈云一切眾生心悉可分別知一切剎微塵尚可筭其數十方虗空界一毛猶可量菩薩初發心究竟不可測良由此一乘圓極自在無礙法門得一即得一切故耳因該果海果徹因源一或一切成一證一切證因果俱齊無前後別故地論云以信地菩薩乃至與不思議佛法為一緣起以六相總別等義而用括之明知因果俱時相容相即各攝一切互為主伴深須思之此事不疑以因果相即同時相應初心菩薩與證極果位同一緣起以六相圓融而總括之又此經云何以故此初發心菩薩即是佛故悉與三世諸如來等亦與三世佛境界等悉與三世佛正法等得如來一身無量身三世諸佛平等智慧所化眾生皆悉同等又云初發心時便成正覺具足慧身不由他悟如是云云無量廣如經文初心菩薩與諸如來依正等說法等身量等智慧化生皆等至相云譬眾流入海纔入一滴即稱周大海無始無終若餘江河水之深不及入海一滴即用三乘中修三乘多劫不及在一乘中一念故問此等歎因中德耳豈可即果德耶答此一乘義因果同體成一緣起得此即得彼由彼此相即故若不得者因即不成因何以故不得果故非因也以歡因中德豈可同彼果德耶答此一乘因果欲論其成者成復成欲在後成者後復後問上言果分離緣不可說相但論因分者何故十信終心即辨作佛得果法也答今言作佛者但初從見聞已去乃至第二生即成解行解行終心因位窮滿者於第三生即得彼究竟自在圓融果矣由此因體依果成故但因位滿者勝進即沒於果海中也為是證境界故不可說耳此如龍女及普莊嚴童子善財童子兜率天子等於三生中即尅彼果義等廣如經辨應准思之既果分不可說何故十信終心即辨果法耶答今言作佛乃約三生即得彼果出所以因依果成又因位窮滿沒同果海但是證境離乎說相此如龍女義當流惑之身疾得成佛普莊嚴童子三生成佛祗在一念善財童子現身究竟普賢之行後生即見佛兜率天子從三惡道出現身成佛至解行生即尅彼果有謂龍女於南方成佛者終教示現八相成道豈同善財等於三世中尅證彼果耶答今同列者約彼所證是同非以教分漸頓之異演義云法華佛慧即華嚴佛慧者是也問上言一念即作佛者三乘中已有此義與此何別答三乘望理為一念即作佛今此一乘一念即得具足一切教義理事因果等如上一切法門及與一切眾生皆悉同時同時作佛後後能新新斷惑亦不住學地而成正覺具足十佛以現無盡逆順德故及因陀羅微細九世十世等遍通諸位謂十信終心已去十解十行十迴向十地及佛地等同時遍成無有前後具足一切耳可知答三下至相云若大乘明一念成佛義凡有二種一者會緣以入實性無多少故明一念成佛二者行行既滿取最後一念名為成佛今此一乘明一念成佛如大乘取最後一念成佛即入一乘以後望初初念即成何以故以因果相即同時相應故然此一念與百千劫無有異也宜須思之然此下一念多劫延促無礙也此即第三諸法相即自在門訖四者因陀羅微細境界門此但從喻異前耳此上諸義體相自在隱映互現重重無盡即以帝釋殿前珠網為喻十門唯此從喻受名猶如眾鏡相照眾鏡之影現一鏡之中如是影中復現眾影一一影中復現眾影即重重現影成其無盡復無盡故此經云於一微塵中各示那由他無數億諸佛於中而說法於一微塵中現無量佛國須彌金剛圍世間不迫迮於一微塵中現有三惡道天人阿修羅各各受業報此三偈即三世間也又云一切佛剎微塵等爾所佛坐一毛孔皆有無量菩薩眾各為具說普賢行無量剎海處一毛悉坐菩提連華座遍滿一切諸法界一切毛孔自在現又云如一微塵所示現一切微塵亦如是餘者云云無量廣如經辨如第七地經以三偈配三世間初偈此即智正覺世間次偈此據器世間次偈此即據眾生世間又云下三偈皆依正無㝵也此等並是實義非變化成此是如理智中如量境也其餘變化等者不入此例何以故此並是法性實德法爾如是也非諸分別情謂境界但此可去情思之此即是其法界緣起如理實德非是變化對緣方便說故若是大乘宗所明即言神力變化故若此宗明相入不論變化神力乃言自體常如此等問上言一塵中現無量剎等者此但是一重現而已何故乃云重重現耶答此方說華嚴經時云一切微塵中亦如是說如彼微塵中說華嚴經時亦云一切微塵中亦如是說如是展轉即重重無盡重重無盡也宜准思之一塵一剎但可乎遍云何重重答中據塵塵互遍展轉無窮問若據此文重重無盡有何分齊云何辨其始終等耶答隨其智取舉一為首餘亦為伴據其首者即名當中餘即眷屬圍繞上諸教義等並悉如是自在成耳及前相即相入自在等皆悉如是攝一切法盡窮法界並悉因陀羅成也斯則渾無疆界無始無終何緣辨得因果分齊耶答祗以隨智差別故舉一為主餘即為伴如是教義等十門皆得自在反前二三兩門皆悉融攝無盡五者微細相容安立門此上諸義於一念中具足始終同時前後逆順等一切法門於一念中炳然同時齊頭顯現無不明了猶如束箭齊頭顯現耳如一微塵即是小相元量佛國須彌金剛山等即是大相直以緣起實德無礙自在致使相容非人天所作故安立此約相說如瑠璃鉼盛多芥子頓然顯現清凉云微細有三義一約所含微細猶如芥鉼以毛子能受彼諸剎諸剎不能徧毛孔故以毛據稱性剎約存相二約能含微細以一毛一塵即能含故三約難知微細微塵不大剎亦不小而能廣容即難知義今取束箭但同時齊頭顯現難見微細相容也故此經云菩薩於一念中從兜率天降神母胎乃至流通舍利法住久近及所被益諸眾生等於一念中皆悉顯現廣如經文又云一毛孔中無量佛剎莊嚴清淨曠然安住又云於一塵內微細國土一切塵等悉於中住宜可如理思之可曉豈可須彌納芥中將為難事哉理事等十門安立相容亦如是問此義與上因陀羅云何別耶答重重隱映互現因陀羅攝齊頭炳然現者微細攝此等諸義並別不同宜細思之可知六者秘密隱顯俱成門此上諸義隱覆顯了俱時成就也還具前教等十門所言隱顯者如涅槃經半字及滿字昔說半字即顯滿字即隱今說滿字即顯半字即隱此約緣說隱顯體無前後不相妨礙故名秘密故此經云於此方入正受他方三昧起眼根入正受色塵三昧起等云云又云男子身入正受女人身三昧起等云云於一微塵入正受一切微塵三昧起一切微塵入正受一毛端頭三昧起如是自在此隱彼顯正受及起定同時秘密成矣又此經云十方世界有緣故往返出入度眾生或見菩薩入正受或見菩薩從定起又於彼十方世界中念念示現成正覺轉正法輪入涅槃現分舍利度眾生如是無量廣如經辨又如佛為諸菩薩受記之時或現前受記或不現前秘密受記等可見如上第一錢中十錢名為顯了第二錢望第一錢中十即為秘密何以故見此不見彼故不相知故雖不相知見然即此成彼成故名俱成也應如是准思之古本云成此成彼演義亦同今云此成彼成者誤也七諸藏純雜具德門此上諸義或純或雜如前人法等若以人門取者即一切皆人故名為純又即此人門具含理事等一切差別法故名雜又如菩薩入一三昧唯行布施無量無邊更無餘行故名純或入一三昧即施戒度生等無量無邊諸餘雜行俱時成就也如是繁興法界純雜自在無不具足者矣宜可思准之此約諸度門說如就一施門說者一切萬法皆悉名施所以名純而此施門具諸度等行名為雜如是純之與雜不相妨礙故名具德探玄中名廣狹自在無礙門清凉云此門賢首新立以替至相十玄諸藏純雜具德門意云一行為純萬行為雜等即事事無礙義若一理為純萬行為雜即理事無礙恐濫理事無礙所以改之八者十世隔法異成門此上諸義遍十世中同時別異具足顯現以時與法不相離故三世區分名為隔法而互相在即是異成以時依法有如見華開知是芳春茂盛是朱夏等皆因於物知四時也此上諸義今章多一雜字言十世者過去未來現在三世各有過未及現在即為九世也然此九世迭相即入故成一總句總別合成十世也此十世具足別異同時顯現成緣起故得即入也又過去說過去過去說現在過去說未來現在說過去現在說平等現在說未來未來說過去未來說現在未來說無盡以九世攝歸一念故云十世故此經云或以長劫入短劫短劫入長劫或百千大劫為一念或一念即為百千大劫或過去劫入未來劫未來劫入過去劫如是自在時劫無礙相即入渾融成矣故教義理事等十門相即相入而不失前後差別之相又此經云於一微塵中普現三世一切佛剎又云於一微塵中普現三世一切諸佛佛事又云於一微塵中建立三世一切佛轉法輪如是云云無量廣如經文此普攝上諸義門悉於十世中自在現耳宜可思之所引諸經顯彼時處無礙互相融通也九者唯心迴轉善成門此上諸義唯是一如來藏自性清淨心轉也但性起具德故異三乘耳然一心亦具足十種德如性起品中說十心義等者即其事也所以說十者欲顯無盡故如是自在具足無窮種種德耳此上諸義門悉是此心自在作用更無餘物故名唯心迴轉等宜思擇之此約心說前諸義門等並是如來藏性清淨真心之所建立若善若惡隨心所轉故云迴轉善成心外無別境故依古本多一為字如來藏自性清淨心要問云一乘唯一心顯性起具德故探玄改為主伴圓明具德門以唯心作玄門所以故不立之十者託事顯法生解門此上諸義隨託別事以顯別法謂諸理事等一切法門如此經中說十種寶王雲等事相者此即諸法門也顯上諸義可貴故立寶以標之顯上諸義自在故標王以顯之表上諸義潤益故資澤故齗齶故以雲標之矣如是等事云云無量如經思之此約智說言託事者如經舉金色世界之事即顯始起於實際之法一切幢一切蓋等事是行體也又如法界品云開樓閣門見彌勒菩薩所行因事至菩提道以樓觀即菩提相所以言顯法生解也齗齶者乃雲之相探玄第二云重平聲雲是齗齶義又重上聲雲是靉靆義第五又云菩薩是體雲是相以諸菩薩含法雨故相齗齶故問三乘中以有此義與此何別答三乘託異事相表顯異理今此一乘所託之事相即是彼所顯之道理更無異也具足一切理事教義及上諸法門無不攝盡者也宜可如理思之躡上以問三乘宗中所明亦託事顯法即以異事顯於異理如衣表忍辱室表慈悲靈雲見桃花香嚴擊竹等皆以異事表異理也今此隨舉一事攝無盡法故此上十門等解釋及上本文十義等皆悉同時會融成一法界緣起具德門普眼境界諦觀察餘時但在大解大行大見聞心中然此十門隨一門中即攝餘門無不皆盡應以六相方便而會通之此可准同時具足等十門人法十義皆悉同時成大法界緣起法門起在大解大行離分別菩提心中問此與性起何別答但由佩詮故不及性起上來所明並是略顯別教一乘緣起義耳又於其中諸餘法相及問答除疑等與彼三乘或同或異所因所說為方便等廣如經論疏鈔孔目及問答中於彼釋矣與彼三乘全別不同宜可思廣依華嚴經普眼境界准之別教一乘緣起義者孔目云一乘緣起緣聚不有緣散未離廣如下孔目用教分齊中依七種教證華嚴文義分齊一經謂法華勝鬘等二論謂十地攝論等三疏四章五鈔六問答七雜孔目與彼三乘全別不同者三乘緣起緣聚則有緣散則離思之問此上道理與彼三乘義別不同此可信矣又以何文證知三乘外別有一乘耶可知答此經有誠文故偈云一切世界群生類尠有欲求聲聞道求緣覺者轉復少求大乘者甚希有求大乘者猶為易能信是法甚為難偈云下賢首品文前建立一乘中已引以對彼三乘決之良由此法出情難信是故聖者將彼三乘對此決之又偈言若眾生下劣其心厭沒者示以聲聞道令出於眾苦若復有眾生諸根少明利樂於因緣法為說辟支佛若人根明利有大慈悲心饒益於眾生為說菩薩道若有無上心決定樂大事為示於佛身說無盡佛法由此一乘非下機堪受是故大聖善巧於彼三乘位中隨其機欲方便少說由不窮法界源故權顯二身三身等佛今為如是無上心機樂大事欲方始顯佛十身境界說無窮盡佛法可名現佛身說無盡法也三乘但隨機而已未顯諸佛十身自境界故非現佛身又隨機少說一相一寂一味理等故非窮盡說也何以故三乘以此無窮為過失故然此一乘以無窮為實德故耳此經為普賢等機說無盡佛法現佛十身自證境界與彼三乘不同一相一寂一味一理等所謂三乘終教一相真如等於初教染淨即空愚法小乘苦諦之教所詮實法有餘無餘等宗並皆不同義理各別又此經云於一世界中聞說一乘音或二三四五乃至無量乘此據本末分齊說耳今為上機說無盡佛法或說二三等者以本末差別相對決顯二宗不同也聖教文義顯然不可以執情而驚恠者矣當知三一各別理無疑也六相圓融義第四六相緣起三門分別初列名略釋二明教興意三問答解釋六相之義本出地經世親菩薩造論解釋謂此六相為顯緣超圓融無礙自在法故三門分別探玄云此六相義作六門一明教興意二種類者三明所出者四明建立者五問答決擇者六釋文今用三門問六相何故唯立六不多不少者謂泛論緣起法要有三門一末依於本有起不起二彼所起末既帶於本是故相望有同有異三彼帶本之末既為本収是故當體有存有亡若不具此三不成緣起三中各二故但為六初列名者謂總相別相同相異相成相壞相要問云所謂總總成因果也二別義別成總故三同自同成總故四異諸義自異顯同故五成因果理事成故六壞諸義各住自法不移本性故總相者一含多德故別相者多德非一故別依止總滿彼總故同相者多義不相違同成一總故異相者多義相望各各異故成相者由此諸義緣起成故壞相者諸義各住自法不移動故演義云列名異釋中亦依此列但成相中今本中闕一義字由此諸義緣起成故列名皆是論文論云總者是根本入別者餘九入別依止本滿彼本故同相者入故異相者增相故成相者略說故壞相者廣說故第二教興意者此教為顯一乘圓教法界緣起無盡圓融自在相即無礙容持乃至因陀羅無窮理事等彰其立意欲顯普賢圓因證入遮那果海此義現前一切惑障一斷一切斷得九世十世滅行德即一成一切成理性即一顯一切顯並普別具足始終此齊初發心時便成正覺以此六相緣起方便會入一乘法界圓融自在一斷一切斷一證一切證一行一切行一得一切得故得斷障行德理性等法前後圓融皆悉無礙良由如此法界緣起六相容融因果同時相即自在具足逆順法界無礙皆由六相融通故得然也因即普賢解行及以證入果即十佛境界所顯無窮廣如華嚴經說孔目云依一乘教具一切因緣理事教義人法因果等盧舍那佛普賢行因成就因果與三乘等別廣如本經第三問答解釋者然緣起法一切處通今且略據緣成舍辨六相者宗鏡云古德約喻說六相一切處通者賢首金師子章括六相獅子是總相五根差別為別相共一經起是同相眼耳各不相知是異相諸緣共會是成相諸緣各住自位壞相義海百門以塵顯六相演義以論六決定義以顯六相等今以舍顯問何者是總相答舍是問此但椽等諸緣何者是舍耶答椽即是舍何以故為椽全獨能作舍故若離椽舍即全不成故為此若得椽時即得舍矣謂此椽等要互徧相資方成緣起如一椽能具多緣故若此一椽不具多緣則不成緣起問若椽全自獨作舍者未有瓦等亦應作舍答未有瓦等時不是椽故不作非謂是椽而不能作今言作者但論椽能作不說非椽作何以故椽是因緣由未成舍時無因緣故非是椽也若是椽者其畢全成若不全作不名為椽若椽全自作舍無瓦等豈成舍耶答無瓦等不成椽若闕一緣餘不成起起不成故椽義即壞而不能作舍此本脫一舍字古本與演義同若是下得此一緣令一切成起所起成故緣義方立問若椽等諸緣各出少力共作不全作者有何過失答有斷常過若不全成但少力者諸緣各少力此但多箇少力不成一全舍故是斷也諸緣並少力皆無全成執有全舍者無因有故是其常也又若不全成者去却一椽時舍應猶成在舍既全不成故知非少力並全成故少力不全作有斷常二過去却一椽時舍應猶在既無椽安得有舍耶舍不全成故知諸緣並非少力要須一一全力成也問無一椽時豈非舍耶答但是破舍無好舍也故知好舍全屬一椽既屬一椽故知緣即是舍也問既舍即是椽者餘瓦等應即是椽耶答總並是椽何以故却椽即無故所以然者若無椽即舍壞舍壞故不名瓦等謂攬別成總舉椽之總力貫諸緣若去一椽瓦等亦壞是故瓦等即是椽也若不即者舍即不成椽瓦等並皆不成今既並成故知相即耳一椽既爾餘椽例然是故一切緣起法不成即已成即相即容融無礙自在圓極難思出過情量法性緣起通一切處准知大法界緣起法一成一切成無成無不成第二別相者椽等諸緣別於總故若不別者總義不成由無別時即無總故此義云何本以別成總由無別故總不成也是故別者即以總為別也問若總即別者應不成總耶答由總即別故得成總如椽即是舍故名總相舍即是椽故名別相若不即舍不是椽若不即椽不是舍總別相即此可思之謂舍即是椽故名別相今無舍字古本與演義皆有問若相即者云何說別答只由相即是故成別若不相即者總在別外故非總也別在總外故非別也思之可解問若不別者有何過耶答有斷常過若無別者即無別椽瓦無別椽瓦故即不成總舍故是斷也若無別椽瓦等以而有總舍者無因有舍故是常也古本云故是斷也今云此字誤第三同相者椽等諸緣和合作舍不相違故能名舍緣非作餘物故名同相也問此與總相何別耶答總相唯望一舍說今此同相約椽等諸緣雖體各別成力義齊故名同相也問若不同者有何過耶答若不同者有斷常過也何者若不同者椽等諸緣互相違背不同作舍舍不得有故是斷也若相違不作舍而執有舍者無因有舍故是常也第四異相者椽等諸緣隨自形類相差別故問若異者應不同耶答只由異故所以同耳若不異者椽既丈二瓦應亦爾壞本緣法故失前齊同成舍義也今既舍成同名緣者當知異也問此與別相有何異耶答前別相者但椽等諸緣別於一舍故說別相今異相者椽等諸緣迭互相望各各異故也問若不異者有何過耶答有斷常過也何者若不異者瓦即同椽又二壞本緣法不成舍故是斷若壞緣不成舍而執有舍者舍無因故是常也第五成相者由此諸緣舍義成故由成舍故椽等名緣若不爾者二俱不成今現得成故知成相耳問現見椽等諸緣各住自法本不作舍何因得有舍義成耶答只由椽等諸緣不作故舍義得成所以然者若椽作舍去即失本椽法故舍義不得成今由不作故椽等諸緣現前由此現前故舍義得成矣又若不作舍緣等不名緣今既得緣名明知定作舍即失本緣法古本與演義皆緣字今椽字誤問若不成者有何失答有斷常過何者舍本依椽等諸緣成今既並不作不得有舍故是斷也本以成舍名為椽今既不作舍故即無椽亦是斷若不成者舍無因有故是常也又椽不作舍得椽名者亦是常也第六壞相者椽等諸緣各住自法本不作故問現見椽等諸緣作舍成就何故乃說本不作耶答只由不作舍法得成若作舍去不住自法者舍義即不成何以故作去失法舍不成故今既舍成明知不作也古本云不住自法者今云有字又作去失本法今脫本字問若作去有何失答有斷常二失若言椽作去即失椽法失椽法故舍即無緣不得有故是斷也若失椽法而有舍者無緣有故是常也此上文顯但曉緣起相由諸緣各異互徧相資俱存無礙等自然造入又總即一舍別即諸緣同即互不相違異即諸緣各別成即諸緣辨果壞即各住自法乃為頌曰一即具多名總相多即非一是別相多類自同成於總各體別異顯於同一多緣起理妙成壞住自法常不作唯智境界非事識以此方便會一乘清凉云總則攬別而成別則分總為別同則別別帶總異則別別互乖成則雙攬同異方成若無異相總不成故如舍椽梁總皆相似終不成舍壞則唯別各住自性故此三對歷然不同孔目云依六相總別義即是一乘隨相行布義即是三乘此約教分說又云若欲識華嚴無盡教義者當依六相因陀羅微細智及陀羅尼自在法智知以此方便會一乘者欲識別教一乘當以六相十玄作入法方便也文類云華嚴六相頌終南山儼尊者述義分齊中承用賢首自云具錄和尚徵言勒成義紀今云復古者以先師專用搜探二玄孔目問答等解釋前代諸師作記全不體其本故多註誤可堂和尚乾道丙成譔此記文至斷惑分齊第二斷惑得果偶疾而終不復畢矣自茲以下門人善喜用讀其後以全部帙庶廣流通慶元丁巳四年立夏日比丘善憙施財刊板比丘惠淨敬書五教章奧書延應元年己亥五月十二日於西山栂尾之禪房依兩三人之慇懃勸進拭老眼加假名之點了大旨以古來點為本少少私有交加之點矣後賢必可糺定矣喜海復古記奧書建保四年二月四日於高山寺草菴以新渡御本如形書寫畢隆辨
